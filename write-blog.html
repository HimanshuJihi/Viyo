<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish - Viyou.in</title>
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Modern Futuristic Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Modern Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .lucide { width: 1.2em; height: 1.2em; vertical-align: middle; stroke-width: 2; }
        .lucide-fill { fill: currentColor; }
        .theme-dropdown { max-height: 75vh; overflow-y: auto; overflow-x: hidden; }
        .theme-dropdown::-webkit-scrollbar { width: 4px; }
        .theme-dropdown::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const observer = new MutationObserver((mutations) => {
                if (mutations.some(m => m.addedNodes.length > 0)) {
                    observer.disconnect();
                    lucide.createIcons();
                    observer.observe(document.body, { childList: true, subtree: true });
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>
    <link rel="stylesheet" href="assets/css/write-blog.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4993635171115303"
     crossorigin="anonymous"></script>
</head>
<body>
    <!-- Upload Progress Overlay -->
    <div id="upload-progress-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; flex-direction: column;">
        <h2 style="color: white; margin-bottom: 15px;">Uploading Video...</h2>
        <div style="width: 80%; max-width: 400px; background: #333; border-radius: 10px; height: 20px; overflow: hidden; border: 1px solid #555;">
            <div id="upload-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); transition: width 0.3s;"></div>
        </div>
        <p id="upload-progress-text" style="color: white; margin-top: 10px; font-weight: bold;">0%</p>
        <button type="button" id="cancel-upload-btn" class="btn" style="margin-top: 20px; background: #dc3545; width: auto; padding: 8px 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(220,53,69,0.3);"><i data-lucide="x" style="width: 16px; height: 16px;"></i> Cancel Upload</button>
    </div>

    <div class="container">
        <h1>Add Your Post</h1>
        
        <div class="tabs-container" style="display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #df1616; padding-bottom: 10px;">
            <button type="button" id="tab-blog" onclick="window.switchPostType('blog')" style="flex: 1; padding: 12px; background: transparent; color: #a70000; border: none; border-bottom: 2px solid #6366f1; cursor: pointer; font-weight: bold; transition: 0.3s;"><i data-lucide="edit-3"></i> Blog Post</button>
            <button type="button" id="tab-video" onclick="window.switchPostType('video')" style="flex: 1; padding: 12px; background: transparent; color: #af0404; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-weight: bold; transition: 0.3s;"><i data-lucide="play-circle"></i> Long Video</button>
            <button type="button" id="tab-flick" onclick="window.switchPostType('flick')" style="flex: 1; padding: 12px; background: transparent; color: #af0303; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-weight: bold; transition: 0.3s;"><i data-lucide="zap"></i> Flick</button>
        </div>

        <form id="blogForm">
            <div class="form-group">
                <label for="title"><span id="title-label-text">शीर्षक (Title)</span> <span id="title-char-counter" style="font-size: 0.85rem; color: #aaa; font-weight: normal;">(0 / 100)</span></label>
                <input type="text" id="title" required maxlength="100" placeholder="Ex: भारत की शानदार जीत...">
            </div>

            <div class="form-group">
                <label for="category">श्रेणी (Category)</label>
                <select id="category" required>
                    <option value="Entertainment">Entertainment (मनोरंजन)</option>
                    <option value="Music">Music (संगीत)</option>
                    <option value="Gaming">Gaming (गेमिंग)</option>
                    <option value="Education">Education (शिक्षा)</option>
                    <option value="Sports">Sports (खेल)</option>
                    <option value="News & Politics">News & Politics (समाचार और राजनीति)</option>
                    <option value="Science & Technology">Science & Technology (विज्ञान और तकनीक)</option>
                    <option value="Comedy">Comedy (कॉमेडी)</option>
                    <option value="Travel & Events">Travel & Events (यात्रा और घटनाक्रम)</option>
                    <option value="Fashion & Beauty">Fashion & Beauty (फैशन और सौंदर्य)</option>
                    <option value="Food">Food (भोजन)</option>
                    <option value="Devotional">Devotional (भक्ति)</option>
                    <option value="Gym & Fitness">Gym & Fitness (जिम और फिटनेस)</option>
                    <option value="Health">Health (स्वास्थ्य)</option>
                    <option value="Podcasts">Podcasts (पॉडकास्ट)</option>
                    <option value="Others" selected>Others (अन्य)</option>
                </select>
            </div>

            <input type="hidden" id="author" required>
            <div class="form-group">
                <label for="content"><span id="content-label-text">सामग्री (Content)</span> <span id="char-counter" style="font-size: 0.85rem; color: #aaa; font-weight: normal;">(0 / 5000)</span></label>
                <textarea id="content" required maxlength="5000" placeholder="यहाँ अपने विचार लिखें..."></textarea>
            </div>

            <div id="blog-specific-fields">
                <div class="form-group">
                    <label for="image">तस्वीरें (Images - Max 5, Auto-compressed)</label>
                    <input type="file" id="image" accept="image/*" multiple>
                </div>
            <div class="form-group" id="youtube-url-group">
                    <label for="youtube-url">YouTube वीडियो URL (Optional)</label>
                    <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=...">
                </div>
                <div class="form-group">
                    <button type="button" id="add-poll-btn" class="btn btn-transparent"><i data-lucide="bar-chart-2"></i> Add Poll</button>
                    <div id="poll-creator" style="display: none; margin-top: 15px; padding: 15px; border: 1px dashed #555; border-radius: 5px;">
                        <label for="poll-question">Poll Question</label>
                        <input type="text" id="poll-question" placeholder="e.g., Who will win today?">
                        <label for="poll-options" style="margin-top:10px;">Poll Options (min 2)</label>
                        <input type="text" class="poll-option" placeholder="Option 1" style="margin-bottom: 5px;">
                        <input type="text" class="poll-option" placeholder="Option 2" style="margin-bottom: 5px;">
                        <input type="text" class="poll-option" placeholder="Option 3 (optional)" style="margin-bottom: 5px;">
                        <input type="text" class="poll-option" placeholder="Option 4 (optional)">
                    </div>
                </div>
            </div>

            <div id="video-specific-fields" style="display: none;">
                <div class="form-group">
                    <label id="video-upload-label" for="video-upload">वीडियो अपलोड करें (Video - Max 800KB)</label>
                    <input type="file" id="video-upload" accept="video/mp4,video/webm,video/ogg">
                    <video id="video-preview" controls style="width: 100%; max-height: 250px; display: none; margin-top: 10px; border-radius: 8px; border: 1px solid #555; background: #000;"></video>
                    
                    <!-- Flicks Video Trimmer UI -->
                    <div id="flick-trim-group" style="display: none; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.1);">
                        <label style="color: #f59e0b; margin-bottom: 10px;"><i data-lucide="scissors"></i> फ़्लिक का हिस्सा चुनें (Max 30s)</label>
                        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 10px;">
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <label style="width: 40px; margin: 0; font-size: 0.85rem; color: #aaa;">Start</label>
                                <input type="range" id="flick-trim-start" min="0" max="100" value="0" step="0.1" style="flex: 1;">
                                <span id="trim-start-val" style="width: 45px; text-align: right; font-size: 0.85rem; color: #fff; font-weight: bold;">0.0s</span>
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <label style="width: 40px; margin: 0; font-size: 0.85rem; color: #aaa;">End</label>
                                <input type="range" id="flick-trim-end" min="0" max="100" value="30" step="0.1" style="flex: 1;">
                                <span id="trim-end-val" style="width: 45px; text-align: right; font-size: 0.85rem; color: #fff; font-weight: bold;">30.0s</span>
                            </div>
                        </div>
                        <p id="trim-duration-display" style="font-size: 0.85rem; color: #10b981; margin-top: 15px; font-weight: bold; text-align: center; background: rgba(16, 185, 129, 0.1); padding: 5px; border-radius: 4px;">Selected Duration: 30.0s</p>
                    </div>
                </div>
                <div class="form-group" id="thumbnail-group" style="display: none;">
                    <label for="thumbnail-upload">थंबनेल (Thumbnail - Auto Compress &lt; 500KB)</label>
                    <input type="file" id="thumbnail-upload" accept="image/*">
                    <img id="thumbnail-preview" src="" style="max-height: 150px; display: none; margin-top: 10px; border-radius: 8px; border: 1px solid #555;">
                </div>
            </div>

            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button type="submit" id="publish-btn" class="btn btn-transparent"><img src="publish-icon.png" alt="Publish" style="width: 20px; height: 20px; margin-right: 5px; vertical-align: middle;"> Publish Blog</button>
                <button type="button" id="save-draft-btn" class="btn btn-transparent"><i data-lucide="save"></i> Save Draft</button>
                <a href="index.html" class="btn btn-transparent"><i data-lucide="x"></i> Cancel</a>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <div class="theme-dropdown-container">
                    <button type="button" id="theme-toggle" class="btn theme-btn" style="padding: 8px 12px; width: auto;"><i data-lucide="palette"></i></button>
                    <div id="theme-dropdown" class="theme-dropdown">
                        <button type="button" class="theme-option" data-theme="dark" style="background: #050505; color: #e2e8f0;"><i data-lucide="moon" style="width: 16px;"></i> Dark</button>
                        <button type="button" class="theme-option" data-theme="light" style="background: #f4f7f6; color: #333;"><i data-lucide="sun" style="width: 16px;"></i> Light</button>
                        <button type="button" class="theme-option" data-theme="cyberpunk" style="background: #120422; color: #ff007c;"><i data-lucide="zap" style="width: 16px;"></i> Cyber</button>
                        <button type="button" class="theme-option" data-theme="matrix" style="background: #0a140a; color: #00ff41;"><i data-lucide="terminal" style="width: 16px;"></i> Matrix</button>
                        <button type="button" class="theme-option" data-theme="ocean" style="background: #021024; color: #00e5ff;"><i data-lucide="droplet" style="width: 16px;"></i> Ocean</button>
                        <button type="button" class="theme-option" data-theme="dracula" style="background: #282a36; color: #ff79c6;"><i data-lucide="ghost" style="width: 16px;"></i> Dracula</button>
                        <button type="button" class="theme-option" data-theme="solar" style="background: #2a0800; color: #ffb703;"><i data-lucide="sun-dim" style="width: 16px;"></i> Solar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc, setDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { firebaseConfig, storage } from "./firebase-config.js";


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let isUserVerified = false;
        let currentPostType = 'blog';
        window.maxUploadSizeMB = 5; // Default max upload size
        window.maxVideoUploadSizeMB = 500;
        window.maxFlickUploadSizeMB = 50;
        let videoDurationForTrim = 0;

        // --- Toast Notification Logic ---
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let iconClass = 'info';
            if (type === 'success') iconClass = 'check-circle';
            if (type === 'error') iconClass = 'x-circle';

            toast.innerHTML = `<span class="toast-icon"><i data-lucide="${iconClass}"></i></span><span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => { toast.classList.add('show'); }, 100);

            setTimeout(() => {
                toast.classList.remove('show');
                toast.addEventListener('transitionend', () => { if (toast.parentNode) toast.parentNode.removeChild(toast); });
            }, 4000);
        }

        // --- Character Counter Logic ---
        const contentArea = document.getElementById('content');
        const charCounter = document.getElementById('char-counter');
        const titleInput = document.getElementById('title');
        const titleCharCounter = document.getElementById('title-char-counter');
        
        function updateCharCounter() {
            if (contentArea && charCounter) {
                const maxLength = contentArea.getAttribute('maxlength') || 5000;
                const currentLength = contentArea.value.length;
                charCounter.textContent = `(${currentLength} / ${maxLength})`;
                if (currentLength > maxLength * 0.9) {
                    charCounter.style.color = '#ffc107'; // Yellow warning
                } else {
                    charCounter.style.color = '#aaa'; // Default
                }
            }
            if (titleInput && titleCharCounter) {
                const maxLength = titleInput.getAttribute('maxlength') || 100;
                const currentLength = titleInput.value.length;
                titleCharCounter.textContent = `(${currentLength} / ${maxLength})`;
                if (currentLength > maxLength * 0.9) {
                    titleCharCounter.style.color = '#ffc107';
                } else {
                    titleCharCounter.style.color = '#aaa';
                }
            }
        }
        
        if (contentArea) {
            contentArea.addEventListener('input', updateCharCounter);
        }
        if (titleInput) {
            titleInput.addEventListener('input', updateCharCounter);
        }
            
        // Helper function to get video from IndexedDB
        function retrieveVideoFromIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("ViyouMediaDB", 1);
                request.onsuccess = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("videos")) {
                        resolve(null); return;
                    }
                    const tx = db.transaction("videos", "readwrite");
                    const store = tx.objectStore("videos");
                    const getReq = store.get("exported_video");
                    getReq.onsuccess = () => {
                        // Clean up database after taking the video so it doesn't take space
                        store.delete("exported_video");
                        resolve(getReq.result);
                    };
                    getReq.onerror = () => reject(getReq.error);
                };
                request.onerror = () => reject(request.error);
            });
        }

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeDropdown = document.getElementById('theme-dropdown');
        const body = document.body;

        function applyTheme(theme) {
            body.classList.remove('light-mode', 'cyberpunk-mode', 'matrix-mode', 'ocean-mode', 'dracula-mode', 'solar-mode');
            if (theme && theme !== 'dark') {
                body.classList.add(theme + '-mode');
            }
            localStorage.setItem('theme', theme || 'dark');
            if (window.lucide) window.lucide.createIcons();

            document.querySelectorAll('.theme-option').forEach(btn => {
                if (btn.getAttribute('data-theme') === (theme || 'dark')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        themeToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeDropdown.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!themeToggleBtn.contains(e.target) && !themeDropdown.contains(e.target)) {
                themeDropdown.classList.remove('show');
            }
        });

        document.querySelectorAll('.theme-option').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const newTheme = btn.getAttribute('data-theme');
                applyTheme(newTheme);
                themeDropdown.classList.remove('show');

                if (auth.currentUser) {
                    try {
                        const userRef = doc(db, "users", auth.currentUser.uid);
                        await setDoc(userRef, { theme: newTheme }, { merge: true });
                    } catch (e) {
                        console.error("Error saving theme preference:", e);
                    }
                }
            });
        });

        window.switchPostType = function(type) {
            currentPostType = type;
            document.getElementById('video-upload').value = ''; // Clear video input to enforce new ratio validation
            
            document.getElementById('video-preview').style.display = 'none';
            document.getElementById('video-preview').src = '';
            const trimGroup = document.getElementById('flick-trim-group');
            if (trimGroup) trimGroup.style.display = 'none';
            
            const vidPreview = document.getElementById('video-preview');
            const thumbPreview = document.getElementById('thumbnail-preview');
            if (type === 'flick') {
                vidPreview.style.objectFit = 'cover';
                vidPreview.style.aspectRatio = '9/16';
                vidPreview.style.width = '140px';
                vidPreview.style.margin = '10px auto';
                thumbPreview.style.objectFit = 'cover';
                thumbPreview.style.aspectRatio = '9/16';
                thumbPreview.style.width = '100px';
            } else {
                vidPreview.style.objectFit = 'contain';
                vidPreview.style.aspectRatio = 'auto';
                vidPreview.style.width = '100%';
                vidPreview.style.margin = '10px 0';
                thumbPreview.style.objectFit = 'contain';
                thumbPreview.style.aspectRatio = 'auto';
                thumbPreview.style.width = 'auto';
            }
            
            document.getElementById('tab-blog').style.color = type === 'blog' ? 'red' : '#888';
            document.getElementById('tab-blog').style.borderBottomColor = type === 'blog' ? '#6366f1' : 'transparent';
            document.getElementById('tab-video').style.color = type === 'video' ? 'red' : '#888';
            document.getElementById('tab-video').style.borderBottomColor = type === 'video' ? '#6366f1' : 'transparent';
            document.getElementById('tab-flick').style.color = type === 'flick' ? 'red' : '#888';
            document.getElementById('tab-flick').style.borderBottomColor = type === 'flick' ? '#6366f1' : 'transparent';

            const blogFields = document.getElementById('blog-specific-fields');
            const videoFields = document.getElementById('video-specific-fields');
            const thumbnailGroup = document.getElementById('thumbnail-group');
            
            if (type === 'blog') {
                blogFields.style.display = 'block';
                videoFields.style.display = 'none';
                document.getElementById('content-label-text').innerText = 'सामग्री (Content)';
                document.getElementById('title').required = true;
                document.getElementById('content').required = true;
                document.getElementById('content').setAttribute('maxlength', '5000');
                document.getElementById('title').placeholder = 'Ex: भारत की शानदार जीत...';
                document.getElementById('content').placeholder = 'यहाँ अपने विचार लिखें...';
            } else if (type === 'video') {
                blogFields.style.display = 'none';
                videoFields.style.display = 'block';
                thumbnailGroup.style.display = 'block';
                document.getElementById('content-label-text').innerText = 'विवरण (Description) - Optional';
                document.getElementById('video-upload-label').innerText = `Long Video अपलोड करें (Max ${window.maxVideoUploadSizeMB}MB)`;
                document.getElementById('title').required = false;
                document.getElementById('content').required = false;
                document.getElementById('content').setAttribute('maxlength', '1000');
                document.getElementById('title').placeholder = 'Ex: My Long Video Title (Optional)';
                document.getElementById('content').placeholder = 'Description for your video... (Optional 1000 characters max)';
            } else if (type === 'flick') {
                blogFields.style.display = 'none';
                videoFields.style.display = 'block';
                thumbnailGroup.style.display = 'block';
                document.getElementById('content-label-text').innerText = 'विवरण (Description) - Optional';
                document.getElementById('video-upload-label').innerText = `Flick Video अपलोड करें (Max ${window.maxFlickUploadSizeMB}MB)`;
                document.getElementById('title').required = false;
                document.getElementById('content').required = false;
                document.getElementById('content').setAttribute('maxlength', '1000');
                document.getElementById('title').placeholder = 'Ex: My Flick Title (Optional - Max 100 characters)';
                document.getElementById('content').placeholder = 'Description for your flick... (Optional 1000 characters max)';
            }
            updateCharCounter();
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const authorInput = document.getElementById('author');
                
                // Fetch Unique ID (Username)
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().username) {
                    if (authorInput) {
                        authorInput.value = userDoc.data().username;
                        authorInput.readOnly = true; // Lock author name to Unique ID
                        updateCharCounter(); // Set initial count to (0 / 5000)
                    }
                    if (userDoc.data().isVerified) isUserVerified = true;
                } else {
                    alert("Please create a Unique ID (Username) in your profile first.");
                    window.location.href = "profile.html?requireUsername=true";
                    return;
                }

                // Fetch Max Upload Size from Settings
                try {
                    const genDoc = await getDoc(doc(db, "settings", "general"));
                    if (genDoc.exists() && genDoc.data().maxUploadSizeMB) {
                        window.maxUploadSizeMB = genDoc.data().maxUploadSizeMB;
                    }
                    if (genDoc.exists() && genDoc.data().maxVideoSizeMB) window.maxVideoUploadSizeMB = genDoc.data().maxVideoSizeMB;
                    if (genDoc.exists() && genDoc.data().maxFlickSizeMB) window.maxFlickUploadSizeMB = genDoc.data().maxFlickSizeMB;
                    if (genDoc.exists() && genDoc.data().enableYoutubeLinks === false) {
                        document.getElementById('youtube-url-group').style.display = 'none';
                    } else {
                        document.getElementById('youtube-url-group').style.display = 'block';
                    }
                } catch(e) { console.error("Error fetching general settings:", e); }
                
                // Check if we are editing an existing blog
                const urlParams = new URLSearchParams(window.location.search);
                const editId = urlParams.get('id');
                if (editId) loadBlogForEdit(editId, user);
                
                // --- Step 4: Import Rendered Video from Editor ---
                const importVideo = urlParams.get('importVideo');
                const importType = urlParams.get('type');

                if (importVideo === 'true') {
                    window.switchPostType(importType || 'video');
                    try {
                        const blob = await retrieveVideoFromIndexedDB();
                        if (blob) {
                            const file = new File([blob], "Viyou_Edited_Video.webm", { type: blob.type });
                            const dataTransfer = new DataTransfer();
                            dataTransfer.items.add(file);
                            const videoInput = document.getElementById('video-upload');
                            videoInput.files = dataTransfer.files;
                            
                            // Trigger change event to run validations if any
                            const event = new Event('change');
                            videoInput.dispatchEvent(event);
                            
                            showToast("Your edited video has been attached successfully!", "success");
                        }
                    } catch(err) {
                        console.error("Failed to retrieve imported video", err);
                        showToast("Failed to load the edited video.", "error");
                    }
                }
                // Load theme preference
                try {
                    const userDocRef = doc(db, "users", user.uid);

    function uploadVideoToServer(file) {
        return new Promise((resolve, reject) => {
            const overlay = document.getElementById('upload-progress-overlay');
            const bar = document.getElementById('upload-progress-bar');
            const text = document.getElementById('upload-progress-text');
            const cancelBtn = document.getElementById('cancel-upload-btn');
            overlay.style.display = 'flex';

            const xhr = new XMLHttpRequest();
            xhr.timeout = 0; // Prevent browser from dropping connection on large files
            const formData = new FormData();
            formData.append('video', file);

            // ==========================================
            // 1️⃣ LOCAL TESTING URL (Mobile/PC local test ke liye is line se // hatayein aur Live wale ko comment karein)
            // const BACKEND_URL = 'http://192.168.1.5:3000/api/upload'; 

            // 2️⃣ LIVE PRODUCTION URL (Live internet par publish karne ke liye isko on rakhein)
            const BACKEND_URL = 'https://viyou-in-backend.onrender.com/api/upload'; 
            // ==========================================

            const cancelUpload = () => {
                xhr.abort();
                overlay.style.display = 'none';
                reject(new Error("Upload cancelled by user"));
                cancelBtn.removeEventListener('click', cancelUpload);
            };
            cancelBtn.addEventListener('click', cancelUpload);

            let startTime = Date.now();

            xhr.upload.onprogress = (event) => {
                if (event.lengthComputable) {
                    const progress = (event.loaded / event.total) * 100;
                    bar.style.width = progress + '%';
                    
                    const timeElapsed = (Date.now() - startTime) / 1000;
                    if (progress >= 100) {
                        text.innerText = "100%  •  Publishing on Viyou.in... Please wait.";
                    } else if (timeElapsed > 0.5 && event.loaded > 0) {
                        const speedBps = event.loaded / timeElapsed;
                        let speedText = speedBps > 1048576 ? (speedBps / 1048576).toFixed(2) + ' MB/s' : (speedBps / 1024).toFixed(0) + ' KB/s';
                        const secRemaining = (event.total - event.loaded) / speedBps;
                        let etaText = secRemaining > 60 ? Math.floor(secRemaining / 60) + 'm ' + Math.floor(secRemaining % 60) + 's left' : Math.ceil(secRemaining) + 's left';
                        text.innerText = `${Math.round(progress)}%  •  ${speedText}  •  ${etaText}`;
                    } else {
                        text.innerText = Math.round(progress) + '%';
                    }
                }
            };

            xhr.onload = () => {
                cancelBtn.removeEventListener('click', cancelUpload);
                if (xhr.status === 200) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        if (response.success) {
                            text.innerText = "Video Uploaded! Finalizing Post...";
                            
                            // Viyo Server Proxy Stream Link use karein (Bypasses Google Drive limits & CORS)
                            let streamLink = response.webContentLink; // Fallback
                            if (response.webViewLink) {
                                const match = response.webViewLink.match(/\/file\/d\/(.*?)\/view/);
                                if (match && match[1]) {
                                    const serverBase = BACKEND_URL.replace('/api/upload', '');
                                    streamLink = `${serverBase}/api/stream/${match[1]}`;
                                }
                            }
                            resolve(streamLink || response.webViewLink);
                        } else {
                            overlay.style.display = 'none';
                            reject(new Error(response.error || "Upload failed on server"));
                        }
                    } catch (e) {
                        overlay.style.display = 'none';
                        reject(new Error("Invalid response from server"));
                    }
                } else if (xhr.status === 503) {
                    overlay.style.display = 'none';
                    reject(new Error("Free server is waking up! Please wait 30 seconds and click Publish again."));
                } else {
                    overlay.style.display = 'none';
                    reject(new Error(`Server error: ${xhr.status}`));
                }
            };

            xhr.onerror = () => {
                overlay.style.display = 'none';
                cancelBtn.removeEventListener('click', cancelUpload);
                reject(new Error("Network error (or server waking up). Wait 30 seconds and try again."));
            };

            xhr.open('POST', BACKEND_URL, true);
            xhr.send(formData);
        });
    }

        // Image Compression Function
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const maxWidth = 800;
                const maxHeight = 800;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        let quality = 0.8;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        while(dataUrl.length > 135000 && quality > 0.1) { // Compress to ~100KB
                            quality -= 0.1;
                            dataUrl = canvas.toDataURL('image/jpeg', quality);
                        }
                        resolve(dataUrl);
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        function compressThumbnail(file) {
            return new Promise((resolve, reject) => {
                const maxWidth = 1280;
                const maxHeight = 720;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                        else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        let quality = 0.8;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        while(dataUrl.length > 115000 && quality > 0.1) { // Compress to ~100KB
                            quality -= 0.1;
                            dataUrl = canvas.toDataURL('image/jpeg', quality);
                        }
                        resolve(dataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

                        const vFile = videoInput.files[0];
                        let limitMB = currentPostType === 'flick' ? window.maxFlickUploadSizeMB : window.maxVideoUploadSizeMB;
                        if (vFile.size > limitMB * 1024 * 1024) {
                            showToast(`Video size is too large! Max ${limitMB}MB allowed for ${currentPostType === 'flick' ? 'Flicks' : 'Long Videos'}.`, 'error');
                            submitBtn.innerHTML = originalBtnContent;
                            submitBtn.disabled = false;
                            return;
                        }
                    videoPromise = uploadVideoToServer(vFile);
                    }
                }

                let thumbnailPromise = Promise.resolve(null);
                if ((currentPostType === 'video' || currentPostType === 'flick') && document.getElementById('thumbnail-upload').files.length > 0) {
                    thumbnailPromise = compressThumbnail(document.getElementById('thumbnail-upload').files[0]);
                }
                
                Promise.all([Promise.all(imagePromises), videoPromise, thumbnailPromise]).then(([imageResults, videoResult, thumbnailResult]) => {

                    let totalSize = JSON.stringify(imageResults).length + content.length + (videoResult ? videoResult.length : 0) + (thumbnailResult ? thumbnailResult.length : 0) + 1000;
                    if (totalSize > 1024 * 1024) { // 1MB limit
                        showToast("Total data size is too large (Max 1MB).", 'error');
                        submitBtn.innerHTML = originalBtnContent;
                        submitBtn.disabled = false;
                        return;
                    }
                    processBlog(imageResults.length > 0 ? imageResults : null, youtubeUrl, pollData, videoResult, thumbnailResult);
                }).catch(err => {
                    console.error(err);
                    document.getElementById('upload-progress-overlay').style.display = 'none';
                    showToast("Error processing media: " + err.message, 'error');
                    submitBtn.innerHTML = originalBtnContent;
                    submitBtn.disabled = false;
                });
            }
        });
    </script>
</body>
</html>
