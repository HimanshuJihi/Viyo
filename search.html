<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Viyou</title>
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Modern Futuristic Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Modern Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .lucide { width: 1.2em; height: 1.2em; vertical-align: middle; stroke-width: 2; }
        .lucide-fill { fill: currentColor; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const observer = new MutationObserver((mutations) => {
                if (mutations.some(m => m.addedNodes.length > 0)) {
                    observer.disconnect();
                    lucide.createIcons();
                    observer.observe(document.body, { childList: true, subtree: true });
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>
    <style>
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: #050505;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }
        .header a {
            color: white;
            font-size: 1.5rem;
        }
        .search-box {
            display: flex;
            flex-grow: 1;
            position: relative;
        }
        .search-box input {
            flex-grow: 1;
            padding: 10px 15px;
            border-radius: 20px 0 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border-right: none;
        }
        .search-box button {
            padding: 10px 15px;
            border-radius: 0 20px 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: none;
            background: rgba(255, 255, 255, 0.1);
            color: #a855f7;
            cursor: pointer;
        }
        .search-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-btn {
            padding: 10px 15px;
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab-btn:hover {
            color: #fff;
        }
        .tab-btn.active {
            color: #fff;
            border-bottom-color: #f59e0b;
        }
        #results-container h2 {
            color: #f59e0b;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }
        .result-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .result-item:hover {
            background-color: rgba(255,255,255,0.05);
        }
        .result-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }
        .result-item .user-img {
            border-radius: 50%;
        }
        .result-item-info h3 {
            margin: 0 0 5px;
            font-size: 1.2rem;
        }
        .result-item-info p {
            margin: 0;
            color: #aaa;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* Dropdown Styles */
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; display: none; z-index: 1000; max-height: 300px; overflow-y: auto; margin-top: 5px; }
        .search-result-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .search-result-item:hover { background: #333; }
        
        /* Light Mode updates for dropdown */
        body.light-mode .search-results { background: #fff; border-color: #ccc; }
        body.light-mode .search-result-item { border-bottom-color: #eee; color: #333; }
        body.light-mode .search-result-item:hover { background: #f8f9fa; }

        /* Custom Animated Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(245, 158, 11, 0.2);
            border-top: 4px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        .loading-container { text-align: center; padding: 40px; color: #aaa; }
        
        /* Recent Searches Styles */
        .recent-search-header { 
            padding: 10px 15px; font-size: 0.85rem; color: #888; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .clear-recent { 
            color: #ff6b6b; cursor: pointer; background: none; border: none; padding: 0; font-size: 0.85rem; 
        }
        .clear-recent:hover { text-decoration: underline; }
        .recent-search-item { 
            padding: 12px 15px; border-bottom: 1px solid #333; cursor: pointer; 
            display: flex; align-items: center; gap: 15px; color: #ccc; transition: background 0.2s;
        }
        .recent-search-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        body.light-mode .recent-search-item { border-bottom-color: #eee; color: #555; }
        body.light-mode .recent-search-item:hover { background: #f8f9fa; color: #000; }
        body.light-mode .recent-search-header { border-bottom-color: #eee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html"><i data-lucide="arrow-left"></i></a>
            <form id="search-form" class="search-box">
                <input type="text" id="search-input" placeholder="Search" autocomplete="off">
                <button type="submit"><i data-lucide="search"></i></button>
                <div id="search-dropdown" class="search-results"></div>
            </form>
        </div>
        <div class="search-tabs">
            <button class="tab-btn active" data-tab="all">All</button>
            <button class="tab-btn" data-tab="accounts">Accounts</button>
            <button class="tab-btn" data-tab="content">Content</button>
        </div>
        <div id="results-container">
            <div id="loading" class="loading-container">
                <div class="spinner"></div>
                <div>Searching...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const searchInput = document.getElementById('search-input');
        const searchForm = document.getElementById('search-form');
        const resultsContainer = document.getElementById('results-container');
        const loadingEl = document.getElementById('loading');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const searchDropdown = document.getElementById('search-dropdown');
        let searchTimeout = null;
        const searchCache = new Map();

        // --- Recent Searches Logic ---
        function getRecentSearches() {
            return JSON.parse(localStorage.getItem('viyou_recent_searches') || '[]');
        }
        
        function saveRecentSearch(term) {
            if (!term) return;
            let searches = getRecentSearches();
            // Remove duplicate if it exists, to bring it to the top
            searches = searches.filter(s => s.toLowerCase() !== term.toLowerCase());
            searches.unshift(term);
            // Keep only the last 10 searches
            if (searches.length > 10) searches.pop();
            localStorage.setItem('viyou_recent_searches', JSON.stringify(searches));
        }
        
        window.clearRecentSearches = function(e) {
            if(e) e.stopPropagation();
            localStorage.removeItem('viyou_recent_searches');
            searchDropdown.style.display = 'none';
            searchInput.focus();
        };
        
        function showRecentSearches() {
            const searches = getRecentSearches();
            if (searches.length === 0) {
                searchDropdown.style.display = 'none';
                return;
            }
            let html = `<div class="recent-search-header"><span>Recent Searches</span><button class="clear-recent" onclick="window.clearRecentSearches(event)">Clear All</button></div>`;
            searches.forEach(s => {
                html += `<div class="recent-search-item" onclick="window.location.href='search.html?q=${encodeURIComponent(s)}'"><i data-lucide="history" style="color:#888;"></i><span>${s}</span></div>`;
            });
            searchDropdown.innerHTML = html;
            searchDropdown.style.display = 'block';
        }

        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim().length < 2) showRecentSearches();
        });

        // Real-time suggestions (Dropdown)
        searchInput.addEventListener('input', async (e) => {
            const term = e.target.value.trim().toLowerCase();
            
            if (searchTimeout) clearTimeout(searchTimeout);

            if (term.length < 2) {
                showRecentSearches();
                return;
            }

            searchTimeout = setTimeout(async () => {
                if (searchCache.has(term)) {
                    renderDropdown(searchCache.get(term), term);
                    return;
                }

                searchDropdown.innerHTML = '<div class="loading-container" style="padding: 20px;"><i data-lucide="loader" class="fa-spin" style="width: 25px; height: 25px; color: #f59e0b;"></i><div style="font-size: 0.9rem; margin-top: 10px;">Searching...</div></div>';
                searchDropdown.style.display = 'block';

                let resultsFound = false;
                let resultsHTML = '';

                try {
                    const highlight = (str) => str.replace(new RegExp(`(${term})`, 'gi'), '<span style="color: #f59e0b;">$1</span>');

                    const userQuery = query(collection(db, "users"), 
                        where("usernameLower", ">=", term), 
                        where("usernameLower", "<=", term + "\uf8ff"), limit(3));
                    
                    const contentQuery = query(collection(db, "blogs"), 
                        where("titleLower", ">=", term), 
                        where("titleLower", "<=", term + "\uf8ff"),
                        where("status", "==", "published"), limit(3));
                    
                    let keywordQuery = null;
                    if (!term.includes(' ')) {
                        keywordQuery = query(collection(db, "blogs"), 
                            where("keywords", "array-contains", term),
                            where("status", "==", "published"), limit(3));
                    }

                    const [userSnap, contentSnap, keywordSnap] = await Promise.all([
                        getDocs(userQuery),
                        getDocs(contentQuery),
                        keywordQuery ? getDocs(keywordQuery) : Promise.resolve({ empty: true, forEach: () => {} })
                    ]);

                    if (!userSnap.empty) {
                        resultsFound = true;
                        userSnap.forEach(doc => {
                            const u = doc.data();
                            const photo = (u.photoURL && u.photoURL !== 'null') ? u.photoURL : 'logo.png';
                            resultsHTML += `
                                <div class="search-result-item" onclick="window.location.href='profile.html?uid=${doc.id}'">
                                    <img src="${photo}" style="width:30px; height:30px; border-radius:50%; object-fit: cover;">
                                    <div>
                                        <div style="font-weight:bold; color:white;">${highlight(u.name || '')}</div>
                                        <div style="font-size:0.8rem; color:#aaa;">@${highlight(u.username || '')}</div>
                                    </div>
                                </div>
                            `;
                        });
                    }

                    if (!contentSnap.empty || (keywordSnap && !keywordSnap.empty)) {
                        if(resultsFound) resultsHTML += `<hr style="border-color: #444; margin: 5px 0;">`;
                        resultsFound = true;
                        const renderedDocs = new Set();
                        
                        const renderDropdownContent = (doc, isKeywordMatch) => {
                            if (renderedDocs.has(doc.id)) return;
                            renderedDocs.add(doc.id);
                            const blog = doc.data();
                            resultsHTML += `
                                <div class="search-result-item" onclick="window.location.href='search.html?q=${encodeURIComponent(blog.title)}'">
                                    <i data-lucide="newspaper" style="color:#ccc; width: 30px; text-align: center;"></i>
                                            <i data-lucide="tag" style="color:#6366f1; width: 30px; text-align: center;"></i>
                                    <div>
                                        <div style="font-weight:bold; color:white;">${highlight(blog.title)}</div>
                                        <div style="font-size:0.8rem; color:#aaa;">by @${highlight(blog.author || '')}</div>
                                    </div>
                                </div>
                            `;
                        };

                        contentSnap.forEach(doc => renderDropdownContent(doc, false));
                        if(keywordSnap) keywordSnap.forEach(doc => renderDropdownContent(doc, true));
                    }

                    searchCache.set(term, { found: resultsFound, html: resultsHTML });
                    renderDropdown(searchCache.get(term), term);

                } catch (error) {
                    console.error("Search error:", error);
                    searchDropdown.innerHTML = '<div style="padding: 10px; color: #ff6b6b; text-align: center;">Error performing search</div>';
                }
            }, 400);
        });

        function renderDropdown(resultData, term) {
            searchDropdown.innerHTML = '';
            if (resultData.found) {
                searchDropdown.innerHTML = resultData.html;
                searchDropdown.style.display = 'block';
            } else {
                searchDropdown.innerHTML = `<div style="padding: 10px; color: #aaa; text-align: center;">No results for "${term}"</div>`;
                searchDropdown.style.display = 'block';
            }
        }

        document.addEventListener('click', function(event) {
            const isClickInside = searchDropdown.contains(event.target) || searchInput.contains(event.target);
            if (!isClickInside) {
                searchDropdown.style.display = 'none';
            }
        });

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                const tab = button.getAttribute('data-tab');
                const usersSection = document.querySelector('.results-section-users');
                const contentSection = document.querySelector('.results-section-content');

                if (usersSection) {
                    usersSection.style.display = (tab === 'all' || tab === 'accounts') ? 'block' : 'none';
                }
                if (contentSection) {
                    contentSection.style.display = (tab === 'all' || tab === 'content') ? 'block' : 'none';
                }
            });
        });

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const term = searchInput.value.trim();
            if (term) {
                // Update URL and reload to perform a new search
                window.location.href = `search.html?q=${encodeURIComponent(term)}`;
            }
        });

        async function performSearch() {
            const urlParams = new URLSearchParams(window.location.search);
            const searchTerm = urlParams.get('q');

            if (!searchTerm) {
                loadingEl.innerText = 'Please enter a search term.';
                return;
            }

            searchInput.value = searchTerm;
            saveRecentSearch(searchTerm); // Save to history
            resultsContainer.innerHTML = '<div class="loading-container"><div class="spinner"></div><div>Searching...</div></div>';

            const term = searchTerm.toLowerCase();
            let resultsFound = false;

            // --- Search Accounts ---
            const userQuery = query(collection(db, "users"), 
                where("usernameLower", ">=", term), 
                where("usernameLower", "<=", term + "\uf8ff"),
                limit(10));

            // --- Search Content ---
            const contentQuery = query(collection(db, "blogs"), 
                where("titleLower", ">=", term), 
                where("titleLower", "<=", term + "\uf8ff"),
                where("status", "==", "published"),
                limit(20));

            // --- Smart Search by Keywords ---
        let keywordQuery = null;
            if (!term.includes(' ')) {
            keywordQuery = query(collection(db, "blogs"), 
                    where("keywords", "array-contains", term),
                    where("status", "==", "published"),
                    limit(20));
            }

            // Execute all queries concurrently for maximum speed
        const [userSnap, contentSnap, keywordSnap] = await Promise.all([
            getDocs(userQuery),
            getDocs(contentQuery),
            keywordQuery ? getDocs(keywordQuery) : Promise.resolve({ empty: true, forEach: () => {} })
        ]);

            // Clear loading
            resultsContainer.innerHTML = '';
            const highlight = (str) => str.replace(new RegExp(`(${term})`, 'gi'), '<span style="color: #f59e0b;">$1</span>');

            if (!userSnap.empty) {
                resultsFound = true;
                const usersSection = document.createElement('div');
                usersSection.className = 'results-section-users';
                usersSection.innerHTML = '<h2>Accounts</h2>';
                userSnap.forEach(doc => {
                    const u = doc.data();
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.onclick = () => window.location.href = `profile.html?uid=${doc.id}`;
                    div.innerHTML = `
                        <img src="${u.photoURL || 'logo.png'}" class="user-img" style="width: 60px; height: 60px;">
                        <div class="result-item-info">
                            <h3>${u.name || 'User'}</h3>
                            <p>@${u.username}</p>
                        </div>
                    `;
                    usersSection.appendChild(div);
                });
                resultsContainer.appendChild(usersSection);
            }

            if (!contentSnap.empty || (keywordSnap && !keywordSnap.empty)) {
                resultsFound = true;
                const contentSection = document.createElement('div');
                contentSection.className = 'results-section-content';
                contentSection.innerHTML = '<h2 style="margin-top: 30px;">Content</h2>';
                
                const renderedDocs = new Set();
                
                const renderContent = (doc, isKeywordMatch) => {
                    if (renderedDocs.has(doc.id)) return;
                    renderedDocs.add(doc.id);
                    
                    const blog = doc.data();
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    
                    let targetUrl = `index.html?blogId=${doc.id}`;
                    if (blog.isFlicker) {
                        targetUrl = `flicks.html?id=${doc.id}`;
                    } else if (blog.video || blog.youtubeUrl) {
                        targetUrl = `watch.html?id=${doc.id}`;
                    }
                    div.onclick = () => window.location.href = targetUrl;

                    let thumb = blog.thumbnail || blog.image || 'logo.png';
                    if (blog.youtubeUrl) {
                        const videoId = blog.youtubeUrl.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
                        if(videoId) thumb = `https://img.youtube.com/vi/${videoId[1]}/mqdefault.jpg`;
                    }

                    div.innerHTML = `
                        <img src="${thumb}">
                        <div class="result-item-info">
                            <h3>${highlight(blog.title)} ${isKeywordMatch ? '<span style="font-size:0.7rem; background:#6366f1; padding:2px 6px; border-radius:10px; vertical-align:middle; margin-left:5px;">Tag Match</span>' : ''}</h3>
                            <p>by @${highlight(blog.author || '')} &bull; ${new Date(blog.date).toLocaleDateString()}</p>
                        </div>
                    `;
                    contentSection.appendChild(div);
                };

                contentSnap.forEach(doc => renderContent(doc, false));
                if (keywordSnap) keywordSnap.forEach(doc => renderContent(doc, true));

                resultsContainer.appendChild(contentSection);
            }

            if (!resultsFound) {
                resultsContainer.innerHTML = `<div class="no-results" style="text-align: center; padding: 40px; color: #aaa;">No results found for "${searchTerm}".</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', performSearch);
    </script>
</body>
</html>
