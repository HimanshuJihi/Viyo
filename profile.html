<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif; background: #050505; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background-color .3s ease, color .3s ease; }
        .container { background: rgba(20, 20, 20, 0.6); padding: 30px; border-radius: 20px; backdrop-filter: blur(20px); width: 100%; max-width: 800px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #ff9800; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; margin-top: 10px; }
        button:hover { background: #e68900; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; margin-bottom: 15px; cursor: pointer; }
        /* CropperJS CSS Fix */
        .cropper-container { max-width: 100%; max-height: 100%; }

        /* Styling for followed/blocked state of transparent buttons */
        .btn-transparent.following { color: #aaa !important; }
        .btn-transparent.following::before { background: linear-gradient(45deg, #777, #444) !important; }
        body.light-mode .btn-transparent.following { color: #666 !important; }
        body.light-mode .btn-transparent.following::before { background: linear-gradient(45deg, #aaa, #888) !important; }
        .verified-badge { color: #1da1f2; margin-left: 5px; font-size: 1rem; vertical-align: middle; }
        
        /* Badge Styles */
        .badge-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: help;
            transition: all 0.2s ease;
            margin: 5px;
        }
        .badge-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .badge-icon {
            font-size: 1rem;
        }
        .badge-title {
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .stat-label { font-size: 0.85rem; color: #aaa; }
        body.light-mode .stat-label { color: #555; font-weight: bold; }

        @media (max-width: 480px) {
            .container { width: 90%; padding: 20px; }
        }

        /* Profile Inputs & Bio Styling */
        #username, #name, #bio {
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        #username:focus, #name:focus, #bio:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
            background: rgba(0, 0, 0, 0.4);
        }
        #bio { resize: vertical; min-height: 80px; line-height: 1.5; }

        /* Light Mode */
        body.light-mode { background: #f4f7f6; color: #333; }
        body.light-mode .container { background: #fff; border-color: #ddd; }
        body.light-mode input, body.light-mode textarea { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
        
        /* Light mode for badges */
        body.light-mode .badge-item {
            background: #e9ecef;
            border-color: #dee2e6;
        }
        body.light-mode .badge-title { color: #333; }

        /* Light Mode for Inputs & Bio */
        body.light-mode #username, body.light-mode #name, body.light-mode #bio {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ced4da;
        }
        body.light-mode #username:focus, body.light-mode #name:focus, body.light-mode #bio:focus {
            border-color: #6366f1;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
            background: #fff;
        }

        body.light-mode #user-list-modal > div { background: #fff; border-color: #ddd; color: #333; }
        body.light-mode #user-list-title { color: #0d6efd; }
        body.light-mode #user-list-content > div { border-bottom-color: #eee; }
        body.light-mode #user-list-content strong { color: #000; }
        body.light-mode #password-modal > div { background: #fff; border-color: #ddd; color: #333; }
        body.light-mode #pwd-modal-title { color: #0d6efd; }
        body.light-mode #pwd-modal-desc { color: #666; }
        body.light-mode #pwd-auth-section input, body.light-mode #new-password-section input { background: #f0f0f0; border-color: #ccc; color: #333; }
        .btn {
            display: inline-block; padding: 12px 24px; font-size: 1rem; font-weight: bold; color: #fff; background: linear-gradient(135deg, #6366f1, #a855f7); border: none; border-radius: 30px !important; text-decoration: none; cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5); }

    .theme-btn {
        position: relative;
        z-index: 1;
        border: none !important;
        background: transparent !important;
        color: #fff !important;
        font-size: 1.5rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .theme-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 15px rgba(255, 193, 7, 0.2);
    }
    
    .btn-transparent {
        position: relative;
        background: transparent !important;
        color: #fff !important;
        border: none !important;
        border-radius: 30px !important;
        z-index: 1;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-transparent::before, .theme-btn::before {
        content: "";
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        border-radius: 30px;
        padding: 1.5px;
        background: linear-gradient(45deg, #00f3ff, #b5179e);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        z-index: -1;
        pointer-events: none;
    }
    .btn-transparent:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 20px rgba(0, 243, 255, 0.3);
    }
    body.light-mode .theme-btn { color: #333 !important; }
    body.light-mode .btn-transparent { color: #333 !important; }

        /* Theme Dropdown Styles */
        .theme-dropdown-container { position: relative; display: inline-block; width: 100%; margin-top: 10px; }
        .theme-dropdown { position: absolute; bottom: 100%; right: 0; left: 0; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 10px; display: none; flex-direction: column; gap: 8px; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); margin-bottom: 5px; }
        .theme-dropdown.show { display: flex; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .theme-option { padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; font-weight: bold; text-align: left; display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.2s, box-shadow 0.2s; font-family: inherit; font-size: 0.9rem; }
        .theme-option:hover { transform: scale(1.05); }
        .theme-option.active { border: 2px solid #f59e0b; box-shadow: 0 0 12px rgba(245, 158, 11, 0.4); transform: scale(1.02); }

        /* 5 New Futuristic Themes */
        body.cyberpunk-mode { background: radial-gradient(circle at top right, #3a0ca3, #050505); color: #ff007c; }
        body.cyberpunk-mode .container { border-color: rgba(255, 0, 124, 0.2); }
        body.cyberpunk-mode .btn { background: linear-gradient(135deg, #f72585, #4361ee); box-shadow: 0 4px 15px rgba(247, 37, 133, 0.3); }
        body.matrix-mode { background: radial-gradient(circle at top, #003300, #050505); color: #00ff41; }
        body.matrix-mode .container { border-color: rgba(0, 255, 65, 0.2); }
        body.matrix-mode .btn { background: linear-gradient(135deg, #00b4d8, #00ff41); box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3); color: #000; }
        body.ocean-mode { background: radial-gradient(circle at top left, #0077b6, #050505); color: #90e0ef; }
        body.ocean-mode .btn { background: linear-gradient(135deg, #0077b6, #00b4d8); box-shadow: 0 4px 15px rgba(0, 119, 182, 0.3); }
        body.dracula-mode { background: #282a36; color: #f8f8f2; }
        body.dracula-mode .btn { background: linear-gradient(135deg, #bd93f9, #ff79c6); box-shadow: 0 4px 15px rgba(189, 147, 249, 0.3); }
        body.solar-mode { background: radial-gradient(circle at center, #370617, #03071e); color: #ffba08; }
        body.solar-mode .btn { background: linear-gradient(135deg, #dc2f02, #ffba08); box-shadow: 0 4px 15px rgba(220, 47, 2, 0.3); }

    /* Promote Button Styling */
    .btn-promote {
        background: linear-gradient(45deg, #ff0050, #8e44ad);
        border: none; color: white; padding: 6px 15px; border-radius: 20px;
        font-size: 0.85rem; font-weight: bold; cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 10px rgba(255, 0, 80, 0.4);
    }
    .btn-promote:hover {
        transform: scale(1.05); box-shadow: 0 6px 15px rgba(255, 0, 80, 0.6);
    }

        /* Styles from news.html for blog cards */
        .news-card {
            background: rgba(20, 20, 20, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 20px;
        }
        .news-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(99, 102, 241, 0.1);
        }
        .news-card img.card-img-top {
            width: 100%;
            height: auto;
            object-fit: cover;
            max-height: 400px;
        }
        .news-card-content { padding: 25px; }
        .news-card-content h2 { font-size: 1.75rem; margin-top: 0; margin-bottom: 10px; }
        .news-card-content h2 a { color: #fff; text-decoration: none; transition: color 0.2s ease; }
        .news-card-content h2 a:hover { color: #ddd; text-decoration: underline; }
        .article-meta { font-size: 0.85rem; color: #ddd; margin-bottom: 15px; display: block; }
        .news-card-content p { font-size: 1.05rem; color: #eee; margin-bottom: 1em; }
        .carousel-container { position: relative; }
        .image-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 10px; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .image-carousel img { flex: 0 0 100%; scroll-snap-align: center; max-height: 300px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .image-carousel::-webkit-scrollbar { display: none; }
        .image-carousel { -ms-overflow-style: none; scrollbar-width: none; }
        .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; cursor: pointer; z-index: 5; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: background 0.3s; }
        .carousel-btn:hover { background: rgba(0,0,0,0.9); }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }
        .comment-actions { display: flex; gap: 15px; margin-top: 8px; font-size: 0.85rem; color: #aaa; }
        .comment-action-btn { background: none; border: none; color: inherit; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 5px; transition: color 0.2s; }
        .comment-action-btn:hover { color: #fff; }
        .replies-list { margin-left: 20px; margin-top: 10px; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 10px; }
        .pinned-badge { background: #ffd700; color: #000; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; margin-left: 8px; font-weight: bold; vertical-align: middle; }
        .follow-btn.in-card { padding: 2px 8px; font-size: 0.7rem; border-radius: 10px; border: 1px solid #0d6efd; background: transparent; color: #0d6efd; cursor: pointer; margin-left: 10px; transition: all 0.2s; }
        .follow-btn.in-card.following { background: #0d6efd; color: white; }

        /* Light mode for blog cards */
        body.light-mode .news-card { background: #fff; border-color: #ddd; }
        body.light-mode .news-card-content h2 a { color: #333; }
        body.light-mode .news-card-content p { color: #555; }
        body.light-mode .article-meta { color: #666; }
        body.light-mode .comment-actions { color: #666; }
        body.light-mode .comment-action-btn:hover { color: #000; }
        body.light-mode .replies-list { border-left-color: #eee; }

        /* Lightbox styles */
        body.light-mode .replies-list { border-left-color: #eee; }

        /* Lightbox styles */
        .lightbox-modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 30%; overflow: hidden; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox-content { display: block; max-width: 90vw; max-height: 85vh; object-fit: contain; transition: transform 0.3s ease; }
        .profile-lightbox {  border-radius: 50%;left:0; top:0; width: 100%; height: 70%; max-width: 400px; max-height: 400px; object-fit: cover; align-items: center; justify-content: center; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: #f1f1f1; font-size: 40px; font-weight: bold; transition: 0.3s; cursor: pointer; z-index: 2001; }
        .close-lightbox:hover { color: #bbb; }        

        /* Profile Tabs Styles */
        .profile-tabs { display: flex; border-bottom: 1px solid #444; margin-top: 30px; margin-bottom: 20px; }
        .profile-tab-btn { flex: 1; padding: 12px; background: transparent; color: #888; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .profile-tab-btn.active { color: #fff; border-bottom-color: #6366f1; }
        .profile-tab-btn:hover { color: #ccc; }
        body.light-mode .profile-tabs { border-bottom-color: #ddd; }
        body.light-mode .profile-tab-btn { color: #666; }
        body.light-mode .profile-tab-btn.active { color: #6366f1; border-bottom-color: #6366f1; }
        body.light-mode .profile-tab-btn:hover { color: #333; }
        .profile-tab-content { display: none; text-align: left; }
        .profile-tab-content.active { display: block; }

        /* Grid View Styles for Videos and Flicks */
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .flicks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .yt-grid-item { cursor: pointer; text-align: left; display: flex; flex-direction: column; transition: transform 0.2s; }
        .yt-grid-item:hover { transform: scale(1.02); }
        .video-thumbnail { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 8px; background: #222; border: 1px solid #444; }
        .flick-thumbnail { width: 100%; aspect-ratio: 9 / 16; object-fit: cover; border-radius: 8px; background: #222; border: 1px solid #444; }
        .yt-grid-item h4 { margin: 8px 0 4px 0; font-size: 0.95rem; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .yt-grid-item p { margin: 0; font-size: 0.8rem; color: #aaa; }
        body.light-mode .yt-grid-item h4 { color: #333; }
        body.light-mode .yt-grid-item p { color: #666; }
        body.light-mode .video-thumbnail, body.light-mode .flick-thumbnail { border-color: #ddd; }
    </style>
    <!-- Modern Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .lucide { width: 1.2em; height: 1.2em; vertical-align: middle; stroke-width: 2; }
        .lucide-fill { fill: currentColor; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const observer = new MutationObserver((mutations) => {
                if (mutations.some(m => m.addedNodes.length > 0)) {
                    observer.disconnect();
                    lucide.createIcons();
                    observer.observe(document.body, { childList: true, subtree: true });
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>

    <!-- Fluid Player for VAST Ads -->
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <!-- CropperJS for Profile Photo Edit -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

     crossorigin="anonymous"></script>
</head>
<body>

<div class="container">
    <h2>My Profile</h2>
    <img id="preview" src="https://via.placeholder.com/100" class="profile-pic" onclick="window.openLightbox(this.src, true)" title="View Photo">
    <input type="file" id="file-input" style="display: none;" accept="image/*">
    <div id="profile-action-buttons" style="margin-top: 10px; display: none;">
        <button id="follow-btn" class="btn-transparent" style="display: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Follow</button>
        <button id="message-profile-btn" class="btn-transparent" style="display: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px;"><img src="messages-icon.png" alt="Message" height="20px" width="20px" style="vertical-align: middle;"> Message</button>
        <button id="block-btn" class="btn-transparent" style="display: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px;"><img src="block-icon.png" alt="Block" height="20px" width="20px" style="vertical-align: middle;"> Block</button>
    </div>
    <p id="photo-hint" style="font-size: 0.9rem; color: #87ceeb; cursor: pointer; margin-top: -5px; " onclick="document.getElementById('file-input').click()"><img src="camera-icon.png" alt="Change Photo" height="20px" width="20px" style="vertical-align: middle;"> Change Photo</p>
    
    <!-- Status display removed from profile, will be handled by stories on news page -->
    <!-- Followers/Following Stats -->
    <div style="display: flex; gap: 30px; margin: 15px 0; justify-content: center; width: 100%;">
        <div id="followers-box" onclick="window.showUserList('followers')" style="cursor: pointer; text-align: center;">
            <span id="followers-count" style="font-size: 1.4rem; font-weight: bold; color: #f59e0b;">0</span><br>
            <span class="stat-label">Followers</span>
        </div>
        <div id="following-box" onclick="window.showUserList('following')" style="cursor: pointer; text-align: center;">
            <span id="following-count" style="font-size: 1.4rem; font-weight: bold; color: #f59e0b;">0</span><br>
            <span class="stat-label">Following</span>
        </div>
        <div style="text-align: center;">
            <span id="blogs-count" style="font-size: 1.4rem; font-weight: bold; color: #f59e0b;">0</span><br>
            <span class="stat-label">Blogs</span>
        </div>
        <div style="text-align: center;">
            <span id="likes-count" style="font-size: 1.4rem; font-weight: bold; color: #f59e0b;">0</span><br>
            <span class="stat-label">Likes</span>
        </div>
    </div>

    <div id="verified-indicator" style="display:none; color:#1da1f2; font-weight:bold; margin: 5px 0;"><img src="verify-icon.png" alt="Verified" height="20px" width="20px" style="vertical-align: middle;"> Verified Account</div>
    
    <div id="badges-section" style="margin: 20px 0; text-align: center;">
        <!-- Badges will be populated by JavaScript -->
    </div>

    <input type="text" id="username" placeholder="Unique ID (e.g. @creator_name)">
    <input type="text" id="name" placeholder="Display Name">
    <textarea id="bio" rows="3" placeholder="Bio (e.g. Content Creator from Mumbai)"></textarea>
    
    <button id="create-story-btn" class="btn" style="background-color: #f59e0b; color: black; margin-top: 20px; width: 100%; display: none;" onclick="window.location.href='story-editor.html'"><i data-lucide="plus"></i> Create New Post</button>
    <button id="studio-btn" class="btn" style="background: linear-gradient(45deg, #9b59b6, #8e44ad); margin-top: 10px; width: 100%; display: none;" onclick="window.location.href='studio.html'"><i data-lucide="line-chart"></i> Creator Studio</button>
    
    <button id="save-btn" class="btn-transparent"><img src="save-icon.png" alt="Save Profile" height="30px" width="30px" style="vertical-align: middle;"> Save Profile</button>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <div class="theme-dropdown-container" style="flex: 1;">
            <button id="main-menu-toggle" class="btn theme-btn" style="width: 100%;"><i data-lucide="menu"></i> Menu</button>
            <div id="main-menu-dropdown" class="theme-dropdown">
                <a href="about-us.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="info" style="width: 16px;"></i> About Us</a>
                <a href="contact-us.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="mail" style="width: 16px;"></i> Contact Us</a>
                <a href="privacy.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="shield" style="width: 16px;"></i> Privacy Policy</a>
                <a href="terms.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="file-text" style="width: 16px;"></i> Terms of Service</a>

<script type="module">
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, deleteDoc, updateDoc, arrayUnion, arrayRemove, addDoc, onSnapshot, deleteField, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, updateProfile, deleteUser, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { db, auth } from "./firebase-config.js";
    let currentUser = null;
    let currentProfileData = {}; // Store loaded profile data for lists
    let profilePageBlogs = [];
    let isUserVerified = false; // Flag to check if current user (owner) is verified
    let isViewerAdmin = false;
    let isProfileOwner = false;

    let globalAdConfig = { showAds: false, vastUrl: '' };

    async function loadAdSettings() {
        try {
            const adDoc = await getDoc(doc(db, "settings", "ads"));
            if (adDoc.exists()) {
                globalAdConfig = adDoc.data();
            }
        } catch(e) { console.error("Error loading ad settings:", e); }
    }

    // Theme Toggle Logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeDropdown = document.getElementById('theme-dropdown');
    const mainMenuToggleBtn = document.getElementById('main-menu-toggle');
    const mainMenuDropdown = document.getElementById('main-menu-dropdown');
    const body = document.body;

    function applyTheme(theme) {
        body.classList.remove('light-mode', 'cyberpunk-mode', 'matrix-mode', 'ocean-mode', 'dracula-mode', 'solar-mode');
        if (theme && theme !== 'dark') {
            body.classList.add(theme + '-mode');
        }
        localStorage.setItem('theme', theme || 'dark');
        if (window.lucide) window.lucide.createIcons();

        document.querySelectorAll('.theme-option').forEach(btn => {
            if (btn.getAttribute('data-theme') === (theme || 'dark')) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    themeToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        themeDropdown.classList.toggle('show');
        if (mainMenuDropdown) mainMenuDropdown.classList.remove('show');
    });

    mainMenuToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        mainMenuDropdown.classList.toggle('show');
        if (themeDropdown) themeDropdown.classList.remove('show');
    });

    document.addEventListener('click', (e) => {
        if (!themeToggleBtn.contains(e.target) && !themeDropdown.contains(e.target)) {
            themeDropdown.classList.remove('show');
        }
        if (mainMenuToggleBtn && !mainMenuToggleBtn.contains(e.target) && mainMenuDropdown && !mainMenuDropdown.contains(e.target)) {
            mainMenuDropdown.classList.remove('show');
        }
    });

    document.querySelectorAll('.theme-option').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const newTheme = btn.getAttribute('data-theme');
            applyTheme(newTheme);
            themeDropdown.classList.remove('show');

            if (auth.currentUser) {
                try {
                    const userRef = doc(db, "users", auth.currentUser.uid);
                    await setDoc(userRef, { theme: newTheme }, { merge: true });
                } catch (e) {
                    console.error("Error saving theme preference:", e);
                }
            }
        });
    });

    // Handle Image Selection
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    let base64Image = null;

    // Cropper variables
    let cropper;
    const cropperModal = document.getElementById('cropper-modal');
    const cropperImage = document.getElementById('cropper-image');
    const btnCrop = document.getElementById('btn-crop');
    const btnCancelCrop = document.getElementById('btn-cancel-crop');

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                cropperImage.src = e.target.result;
                cropperModal.style.display = 'flex';
                if(cropper) cropper.destroy();
                cropper = new Cropper(cropperImage, {
                    aspectRatio: 1,
                    viewMode: 1,
                    autoCropArea: 1,
                    background: false,
                });
            };
            reader.readAsDataURL(file);
        }
        fileInput.value = ''; // Allow re-selecting same file
    });

    btnCancelCrop.addEventListener('click', () => {
        cropperModal.style.display = 'none';
        if(cropper) cropper.destroy();
    });

    btnCrop.addEventListener('click', () => {
        if(!cropper) return;
        
        // Get cropped canvas (limit size to 200x200 for profile pic to save DB space)
        const canvas = cropper.getCroppedCanvas({
            width: 200,
            height: 200,
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high',
        });

        // Compress to under 15KB to avoid 1MB document limit on comments
        let quality = 0.8;
        let dataURL = canvas.toDataURL('image/jpeg', quality);
        
        // 15KB approx 20,000 base64 chars
        while (dataURL.length > 20000 && quality > 0.1) {
            quality -= 0.1;
            dataURL = canvas.toDataURL('image/jpeg', quality);
        }

        preview.src = dataURL;
        base64Image = dataURL;
        
        cropperModal.style.display = 'none';
        cropper.destroy();
    });

    onAuthStateChanged(auth, async (user) => {
        const urlParams = new URLSearchParams(window.location.search);
        const viewUid = urlParams.get('uid');

        let currentUserFollowing = []; // Keep track of who the current user follows
        if (user) {
            currentUser = user;
            // Check if the person viewing the page is an admin
            const viewerDoc = await getDoc(doc(db, "users", user.uid));
            if (viewerDoc.exists() && viewerDoc.data().isAdmin) {
                isViewerAdmin = true;
            }
            // Load theme preference
            try {
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);
                let themeToApply = 'dark'; // default
                if (userDocSnap.exists() && userDocSnap.data().theme) {
                    themeToApply = userDocSnap.data().theme;
                } else {
                    const localTheme = localStorage.getItem('theme');
                    if (localTheme) {
                        themeToApply = localTheme;
                        await setDoc(userDocRef, { theme: themeToApply }, { merge: true });
                    }
                }
                applyTheme(themeToApply);
            } catch(e) {
                console.error("Error loading theme preference:", e);
                applyTheme(localStorage.getItem('theme') || 'dark');
            }
        }

        if (viewUid && (!user || viewUid !== user.uid)) {
            // View Mode (Guest or viewing someone else)
            document.querySelector('h2').innerText = "User Profile";
            document.getElementById('save-btn').style.display = 'none';
            document.getElementById('theme-toggle').style.display = 'none'; // Hide theme toggle in view mode
            document.getElementById('change-pwd-btn').style.display = 'none';
            document.getElementById('profile-action-buttons').style.display = 'block';
            document.getElementById('delete-acc-btn').style.display = 'none';
            document.getElementById('preview').onclick = function() {
                window.openLightbox(this.src, true);
            };
            document.getElementById('preview').style.cursor = 'pointer';
            document.getElementById('preview').style.border = '3px solid #87ceeb';
            document.getElementById('followers-box').style.cursor = 'default';
            document.getElementById('following-box').style.cursor = 'default';
            
            ['username', 'name', 'bio'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.readOnly = true;
                    el.style.border = 'none';
                    el.style.background = 'transparent';
                    el.style.textAlign = 'center';
                }
            });

            // Load my data first to check for blocks
            if (user) {
                const myDocSnap = await getDoc(doc(db, "users", user.uid));
                if (myDocSnap.exists() && myDocSnap.data().blockedBy && myDocSnap.data().blockedBy.includes(viewUid)) {
                    handleBlockedProfile("This user has blocked you.");
                    return;
                }
            }
            document.getElementById('photo-hint').style.display = 'none'; // Hide hint in view mode

            isProfileOwner = false;
            loadProfileData(viewUid, user);
            renderUserBlogs(viewUid, false);
            
            // Setup Follow Button
            if (user) { // Only show follow/message if logged in
                const followBtn = document.getElementById('follow-btn');
                followBtn.style.display = 'inline-block';
                
                const messageBtn = document.getElementById('message-profile-btn');
                messageBtn.style.display = 'inline-block';
                messageBtn.onclick = () => {
                    window.location.href = `chat.html?uid=${viewUid}`;
                };

                // Check if already following
                try {
                    const myDoc = await getDoc(doc(db, "users", user.uid));
                    if (myDoc.exists()) {
                        const myData = myDoc.data();
                        const isFollowing = myData.following && myData.following.includes(viewUid);
                        updateFollowButton(isFollowing);
                        followBtn.onclick = () => toggleFollow(viewUid, isFollowing);

                        const isBlocked = myData.blockedUsers && myData.blockedUsers.includes(viewUid);
                        setupBlockButton(viewUid, isBlocked);
                    }
                    // Fetch current user's following list to manage follow button state
                    const myDocSnap = await getDoc(doc(db, "users", user.uid));
                    if (myDocSnap.exists()) {
                        currentUserFollowing = myDocSnap.data().following || [];
                        updateFollowButton(currentUserFollowing.includes(viewUid));
                    }
                    if (isViewerAdmin) {
                        setupAdminActions(viewUid, document.getElementById('username').value);
                    }
                } catch(e) { console.error(e); }
            }
        } else if (user) {
            // Edit Mode (My Profile)
            // Load existing profile
                document.getElementById('studio-btn').style.display = 'block';
                document.getElementById('create-story-btn').style.display = 'block';
                document.getElementById('profile-action-buttons').style.display = 'none';
                document.getElementById('btn-tab-liked').style.display = 'inline-block';

                isProfileOwner = true;
            
            // Also load my following list if I am viewing my own profile (for my blogs)
            if (user) {
                const myDocSnap = await getDoc(doc(db, "users", user.uid));
                if (myDocSnap.exists()) currentUserFollowing = myDocSnap.data().following || [];
            }

                loadProfileData(user.uid, user);
                renderUserBlogs(user.uid, true);
                renderLikedContent(user.uid);

                // Check if username is required
                if (urlParams.get('requireUsername') === 'true' && !document.getElementById('username').value) {
                    alert("Please create a Unique ID (Username) to continue.");
                    document.getElementById('username').focus();
                    document.getElementById('back-to-news-btn').style.display = 'none'; // Hide back button to enforce creation
                }
        } else {
                window.location.href = 'index.html';
        }
    });

    function handleBlockedProfile(message) {
        document.querySelector('.container').innerHTML = `
            <h2 style="color: #ff6b6b;">Access Denied</h2>
            <p style="color: #ccc;">${message}</p>
            <button class="btn-transparent" style="margin-top: 10px; width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="window.location.href='index.html'"><i data-lucide="arrow-left"></i> Back to Home</button>
        `;
    }

    function setupBlockButton(targetUid, isBlocked) {
        const blockBtn = document.getElementById('block-btn');
        blockBtn.style.display = 'inline-block';
        updateBlockButton(isBlocked);
        blockBtn.onclick = () => toggleBlock(targetUid, isBlocked);
    }

    function updateFollowButton(isFollowing) {
        const btn = document.getElementById('follow-btn');
        if (isFollowing) {
            btn.innerText = "Following";
            btn.classList.add('following');
        } else {
            btn.innerText = "Follow";
            btn.classList.remove('following');
        }
    }

    function updateBlockButton(isBlocked) {
        const btn = document.getElementById('block-btn');
        const followBtn = document.getElementById('follow-btn');
        const messageBtn = document.getElementById('message-profile-btn');

        btn.innerText = isBlocked ? "Unblock" : "Block";
        btn.classList.toggle('following', isBlocked); // Use same style for visual cue
        followBtn.style.display = isBlocked ? 'none' : 'inline-block';
        messageBtn.style.display = isBlocked ? 'none' : 'inline-block';
    }

    function toggleFollow(targetUid, isCurrentlyFollowing) {
        if (!currentUser) return;
        const myUid = currentUser.uid;
        const userRef = doc(db, 'users', myUid);
        const targetRef = doc(db, 'users', targetUid);
        
        const isUnfollowing = isCurrentlyFollowing;

        // --- Optimistic UI Update ---
        updateFollowButton(!isUnfollowing);
        document.getElementById('follow-btn').onclick = () => toggleFollow(targetUid, !isUnfollowing);
        const followersCountEl = document.getElementById('followers-count');
        const originalFollowers = parseInt(followersCountEl.innerText.replace(/,/g, ''));
        followersCountEl.innerText = (isUnfollowing ? Math.max(0, originalFollowers - 1) : originalFollowers + 1).toLocaleString();

        // --- Background DB Update ---
        (async () => {
            try {
                if (isUnfollowing) {
                    await updateDoc(userRef, { following: arrayRemove(targetUid) });
                    await updateDoc(targetRef, { followers: arrayRemove(myUid) });
                } else {
                    await updateDoc(userRef, { following: arrayUnion(targetUid) });
                    await updateDoc(targetRef, { followers: arrayUnion(myUid) });
                    const targetDocSnap = await getDoc(targetRef);
                    if (targetDocSnap.exists() && (targetDocSnap.data().followers || []).length >= 200 && !targetDocSnap.data().isVerified) {
                        await updateDoc(targetRef, { isVerified: true });
                        await addDoc(collection(db, "notifications"), { recipientUid: targetUid, senderName: "System", type: "verification", date: new Date().toISOString(), read: false });
                    }
                    await addDoc(collection(db, "notifications"), { recipientUid: targetUid, senderUid: myUid, senderName: currentUser.displayName || "Someone", type: "follow", date: new Date().toISOString(), read: false });
                }
                setTimeout(() => loadProfileData(targetUid, currentUser), 2000);
            } catch(e) { console.error("Follow error:", e); alert("Error updating follow status"); updateFollowButton(isUnfollowing); document.getElementById('follow-btn').onclick = () => toggleFollow(targetUid, isUnfollowing); followersCountEl.innerText = originalFollowers.toLocaleString(); }
        })();
    }

    async function toggleBlock(targetUid, isCurrentlyBlocked) {
        if (!currentUser) return;
        const myUid = currentUser.uid;
        const userRef = doc(db, "users", myUid);
        const targetRef = doc(db, "users", targetUid);

        try {
            if (isCurrentlyBlocked) {
                await updateDoc(userRef, { blockedUsers: arrayRemove(targetUid) });
                await updateDoc(targetRef, { blockedBy: arrayRemove(myUid) });
                updateBlockButton(false);
                document.getElementById('block-btn').onclick = () => toggleBlock(targetUid, false);
            } else {
                if (confirm(`Are you sure you want to block this user? You won't see their posts, and they won't be able to message you.`)) {
                    await updateDoc(userRef, { blockedUsers: arrayUnion(targetUid), following: arrayRemove(targetUid) }); // Also unfollow
                    await updateDoc(targetRef, { blockedBy: arrayUnion(myUid), followers: arrayRemove(myUid) }); // Also remove from their followers
                    updateBlockButton(true);
                    document.getElementById('block-btn').onclick = () => toggleBlock(targetUid, true);
                }
            }
        } catch (e) { console.error("Block error:", e); alert("Error updating block status."); }
    }

    async function loadProfileData(uid, viewerUser) {
        let data = {};
        let totalBlogs = 0;
        let totalLikes = 0;
        let isVerifiedDisplay = false;

        try {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                data = docSnap.data();

                // If viewing someone else's profile, check if they have blocked you.
                if (viewerUser && viewerUser.uid !== uid) {
                    if (data.blockedUsers && data.blockedUsers.includes(viewerUser.uid)) {
                        handleBlockedProfile("You have been blocked by this user.");
                        return;
                    }
                }

                currentProfileData = data; // Store for list access
                document.getElementById('name').value = data.name || "";
                document.getElementById('username').value = data.username || "";
                document.getElementById('bio').value = data.bio || "";
                if (data.photoURL) {
                    document.getElementById('preview').src = data.photoURL;
                    if (currentUser && uid === currentUser.uid) base64Image = data.photoURL;
                    if (currentUser && uid === currentUser.uid) base64Image = data.photoURL; // For my profile
                }
                
                // Update Counts
                const actualFollowers = data.followers ? data.followers.length : 0;
                const displayFollowers = data.followerCountOverride !== undefined ? Number(data.followerCountOverride) : actualFollowers;
                const following = data.following || [];
                document.getElementById('followers-count').innerText = displayFollowers.toLocaleString();
                document.getElementById('following-count').innerText = following.length.toLocaleString();

                // Hide 'Following' count from other users
                if (viewerUser && viewerUser.uid === uid) {
                    document.getElementById('following-box').style.display = 'block';
                } else {
                    document.getElementById('following-box').style.display = 'none';
                }

                // Verified Badge
                isVerifiedDisplay = data.isVerified || displayFollowers >= 200;
                if (isVerifiedDisplay) {
                    document.getElementById('verified-indicator').style.display = 'block';
                } else {
                    document.getElementById('verified-indicator').style.display = 'none';
                }

            } else if (currentUser && uid === currentUser.uid) {
                document.getElementById('name').value = currentUser.displayName;
                if (currentUser.photoURL) document.getElementById('preview').src = currentUser.photoURL;
            }

            // Fetch and display blog stats
            try {
                const blogsQuery = query(collection(db, "blogs"), where("authorUid", "==", uid), where("status", "!=", "draft"));
                const blogsSnapshot = await getDocs(blogsQuery);

                totalBlogs = blogsSnapshot.size;
                blogsSnapshot.forEach(blogDoc => {
                    const blogData = blogDoc.data();
                    totalLikes += Array.isArray(blogData.likes) ? blogData.likes.length : (typeof blogData.likes === 'number' && !isNaN(blogData.likes) ? blogData.likes : 0);
                });

                document.getElementById('blogs-count').innerText = totalBlogs;
                document.getElementById('likes-count').innerText = totalLikes;
            } catch (e) { console.error("Error fetching blog stats:", e); }

            data.isVerified = isVerifiedDisplay;
            // NEW: Display badges based on stats
            displayBadges(data, totalBlogs, totalLikes);

        } catch (e) { console.error("Error loading profile:", e); }
    }

                color: '#ff6b6b',
                description: 'Received over 500 likes on their blog posts.'
            });
        }

        const actualFollowers = userData.followers ? userData.followers.length : 0;
        const displayFollowers = userData.followerCountOverride !== undefined ? Number(userData.followerCountOverride) : actualFollowers;

        if (displayFollowers >= 1000) {

                icon: '🏛️',
                title: 'Community Pillar',
                color: '#f1c40f', // A golden yellow

            });
        }
        
        // 4. Prolific Writer Badge
        if (blogCount >= 25) {
             badges.push({
                icon: '✍️',
                title: 'Prolific Writer',
                color: '#9b59b6', // A nice purple
                description: 'Published 25 or more blog posts.'
            });
        }

        // 5. First Post Badge
        if (blogCount > 0) {
            badges.push({
                icon: '🎉',
                title: 'Contributor',
                color: '#2ecc71', // A friendly green
                description: 'Published their first blog post.'
            });
        }

        if (badges.length > 0) {
            const header = document.createElement('h3');
            header.innerText = 'Badges';
            header.classList.add('gold-text');
            header.style.marginBottom = '10px';
            header.style.marginTop = '0';

            const badgeContainer = document.createElement('div');
            badgeContainer.style.display = 'flex';

    function getYoutubeVideoId(url) {
        if (!url) return null;
        const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    function escapeHTML(str) {
        const div = document.createElement('div');

    async function renderLikedContent(uid) {
        const list = document.getElementById('my-liked-list');
        list.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1 / -1;">Loading liked posts...</p>';

        try {
            // Query liked posts (using array-contains, sorting locally to avoid complex index requirements)
            const q = query(collection(db, "blogs"), where("likes", "array-contains", uid));
            const querySnapshot = await getDocs(q);

            list.innerHTML = '';
            if (querySnapshot.empty) {
                list.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1 / -1;">You haven\'t liked any posts yet.</p>';
                return;
            }

            let likedPosts = [];
            querySnapshot.forEach(doc => {
                likedPosts.push({ id: doc.id, ...doc.data() });
            });

            window.likedPostsData = likedPosts;
            // Sort posts by date descending
            likedPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

            likedPosts.forEach(blog => {
                let category = 'blogs';
                if (blog.isFlicker) category = 'flicks';
                else if (blog.video || blog.youtubeUrl) category = 'videos';

                const item = document.createElement('div');
                item.className = 'yt-grid-item';
                
                let thumbHtml = '';
                if (blog.youtubeUrl) {
                    const videoId = getYoutubeVideoId(blog.youtubeUrl);
                    thumbHtml = `<img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}">`;
                } else if (blog.video) {
                    if (blog.thumbnail) {
                        thumbHtml = `<img src="${blog.thumbnail}" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}">`;
                    } else {
                        thumbHtml = `<video src="${blog.video}#t=0.1" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}" muted playsinline preload="metadata"></video>`;
                    }
                } else if (blog.image && blog.image !== 'logo.png') {
                    thumbHtml = `<img src="${blog.image}" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}">`;
                } else {
                    thumbHtml = `<div class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}" style="display:flex; align-items:center; justify-content:center; background:#222; border: 1px solid #444;"><i data-lucide="newspaper" style="font-size:2rem; color:#555;"></i></div>`;
                }

                let icon = category === 'flicks' ? '<i data-lucide="zap" class="lucide-fill" style="color: #ff0050;"></i>' : (category === 'videos' ? '<i data-lucide="play" class="lucide-fill"></i>' : '<i data-lucide="newspaper"></i>');
                let targetAction = '';
                if (category === 'flicks') targetAction = `window.location.href='flicks.html?id=${blog.id}'`;
                else if (category === 'videos') targetAction = `window.location.href='watch.html?id=${blog.id}'`;
                else targetAction = `window.viewLikedBlog('${blog.id}')`;

                item.innerHTML = `<div style="position: relative;" onclick="${targetAction}">${thumbHtml}<div style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; color: white; font-size: 0.8rem;">${icon}</div></div><h4 onclick="${targetAction}">${blog.title || 'Untitled'}</h4><p>@${blog.author || 'User'} • ❤️ ${Array.isArray(blog.likes) ? blog.likes.length : 0}</p>`;
                list.appendChild(item);

        } catch (e) {
            console.error("Error fetching liked content:", e);
            list.innerHTML = '<p style="color:red; grid-column: 1 / -1; text-align:center;">Error loading liked posts.</p>';

    window.likeUserBlog = async function(id) {
        if (!auth.currentUser) { alert("Please login to like posts!"); return; }
        
        let blog = null;
        let isLikedView = false;
        const blogIndex = profilePageBlogs.findIndex(b => b.id === id);
        if (blogIndex !== -1) {
            blog = profilePageBlogs[blogIndex];
        } else if (window.likedPostsData) {
            const likedIndex = window.likedPostsData.findIndex(b => b.id === id);
            if (likedIndex !== -1) {
                blog = window.likedPostsData[likedIndex];
                isLikedView = true;
            }
        }
        if (!blog) return;

        const blogRef = doc(db, "blogs", id);
        
        const uid = auth.currentUser.uid;
        let isLiking = false;

        if (Array.isArray(blog.likes)) {
            const likedIndex = blog.likes.indexOf(uid);
            isLiking = likedIndex === -1;

            if (isLiking) {
                blog.likes.push(uid);
            } else {
                blog.likes.splice(likedIndex, 1);
            }
        } else {
            let likedPosts = JSON.parse(localStorage.getItem('viyou_user_liked_posts') || '[]');
            const likedIndex = likedPosts.indexOf(id);
            let currentLikes = typeof blog.likes === 'number' ? blog.likes : 0;
            
            if (likedIndex === -1) {
                currentLikes++;
                likedPosts.push(id);
            } else {
                currentLikes = Math.max(0, currentLikes - 1);
                likedPosts.splice(likedIndex, 1);
            }
            
            blog.likes = currentLikes;
            localStorage.setItem('viyou_user_liked_posts', JSON.stringify(likedPosts));
        }
        
        // Optimistic UI update (ताकि लाइक नंबर तुरंत स्क्रीन पर बदल जाए)
        if (isLikedView) {
            window.viewLikedBlog(id);
        } else {
            renderBlogsOnProfile(isProfileOwner);
            if (document.getElementById('my-blogs-single').style.display === 'block') {
                window.viewMyBlog(id);
            }
        }

        // Background Firestore Update
        try {
            if (Array.isArray(blog.likes)) {
                if (isLiking) {
                    await updateDoc(blogRef, { likes: arrayUnion(uid) });
                } else {
                    await updateDoc(blogRef, { likes: arrayRemove(uid) });
                }
            } else {
                await updateDoc(blogRef, { likes: blog.likes });
            }
        } catch(e) {
            console.error("Error updating likes:", e);
        }
    };

        const text = input.value.trim();
        if (!text) return;

        let authorName = auth.currentUser.displayName || "User";
        let authorPhoto = "https://via.placeholder.com/40";
        try {
            const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.name) authorName = userData.name;
                if (userData.photoURL) authorPhoto = userData.photoURL;
            }
        } catch(e) {}

        const newComment = {
            author: authorName,
            userUid: auth.currentUser.uid,
            photo: authorPhoto,
            text: text,
            date: new Date().toISOString(), // Store as ISO string
            likes: [] // Store UIDs of users who liked this comment
        };

        const blogRef = doc(db, "blogs", blogId);

        let blog = null;
        let isLikedView = false;
        const blogIndex = profilePageBlogs.findIndex(b => b.id === blogId);
        if (blogIndex !== -1) {
            blog = profilePageBlogs[blogIndex];
        } else if (window.likedPostsData) {
            blog = window.likedPostsData.find(b => b.id === blogId);
            if (blog) isLikedView = true;
        }

        if (blog) {
            if (!blog.comments) {
                blog.comments = [];
            }
            blog.comments.push(newComment);
            if (isLikedView) {
                window.viewLikedBlog(blogId);
            } else {
                renderBlogsOnProfile(isProfileOwner);
                if (document.getElementById('my-blogs-single').style.display === 'block') {
                    window.viewMyBlog(blogId);
                }
            }
            input.value = '';
        }

        await updateDoc(blogRef, { comments: arrayUnion(newComment) });

        // Send Notification
        const blogSnap = await getDoc(blogRef);
        if (blogSnap.exists()) {
            const blogData = blogSnap.data();
            if (blogData.authorUid && blogData.authorUid !== auth.currentUser.uid) {

    document.getElementById('save-btn').addEventListener('click', async () => {
        if (!currentUser) return;
        
        const name = document.getElementById('name').value;
        const username = document.getElementById('username').value.trim();
        const bio = document.getElementById('bio').value;
        const photoURL = base64Image || currentUser.photoURL;
        const actualFollowers = currentProfileData.followers ? currentProfileData.followers.length : 0;
        const displayFollowers = currentProfileData.followerCountOverride !== undefined ? Number(currentProfileData.followerCountOverride) : actualFollowers;
        let isVerified = displayFollowers >= 200;
        
        const saveBtn = document.getElementById('save-btn');
        const originalBtnContent = saveBtn.innerHTML;
        saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
        saveBtn.disabled = true;
        saveBtn.style.opacity = '0.7';

        try {
            // 1. Update Firebase Auth Profile (for basic display)
            // Note: We don't update photoURL here because Firebase Auth has a small limit.
            // The large base64 image is stored in Firestore below.
            await updateProfile(currentUser, {
                displayName: name
            });

            // Check Username
            if (username !== currentProfileData.username) {
                // Username has changed, so validate it fully
                if (!username) {
                    alert("Unique ID (Username) is required!");
                    return;
                }
                if (username.length > 20 || !/^[a-zA-Z0-9_]+$/.test(username)) {
                    alert("Username can only contain letters, numbers, and underscores, and be max 20 characters.");
                    return;
                }

                const q = query(collection(db, "users"), where("usernameLower", "==", username.toLowerCase()));
                const snap = await getDocs(q);
                let isTaken = false;
                snap.forEach(d => { if (d.id !== currentUser.uid) isTaken = true; });

                if (isTaken) {
                    alert("Username '" + username + "' is already taken. Please choose another.");
                    return;
                }
            } else if (!username) {
                // Username is unchanged but empty. This is an error state for any user.
                alert("Unique ID (Username) is required!");
                return;
            }

            // 2. Save detailed profile to Firestore
            await setDoc(doc(db, "users", currentUser.uid), {
                name: name,
                username: username,
                usernameLower: username.toLowerCase(),
                bio: bio,
                photoURL: photoURL,
                email: currentUser.email,
                isVerified: isVerified
            }, { merge: true });

            // Update author details in all existing blogs AND comments
            const allBlogsSnapshot = await getDocs(collection(db, "blogs"));
            
            const updatePromises = [];
            
            allBlogsSnapshot.forEach((blogDoc) => {
                const blogData = blogDoc.data();
                const updates = {};
                let needsUpdate = false;

                // 1. Update Blog Author info if this user is the author
                if (blogData.authorUid === currentUser.uid) {
                    updates.author = name;
                    updates.authorPhoto = photoURL;
                    updates.authorVerified = isVerified;
                    needsUpdate = true;
                }

                // 2. Update Comments info if this user commented
                if (blogData.comments && Array.isArray(blogData.comments)) {
                    let commentsChanged = false;
                    const updatedComments = blogData.comments.map(comment => {
                        let c = { ...comment };
                        let cChanged = false;

                        if (c.userUid === currentUser.uid) {
                            c.author = name;
                            c.photo = photoURL;
                            c.userVerified = isVerified;
                            cChanged = true;
                        }

                        if (c.replies && Array.isArray(c.replies)) {
                            const newReplies = c.replies.map(reply => {
                                if (reply.userUid === currentUser.uid) {
                                    cChanged = true;
                                    return { ...reply, author: name, photo: photoURL, userVerified: isVerified };
                                }
                                return reply;
                            });
                            if (cChanged) c.replies = newReplies;
                        }

                        if (cChanged) commentsChanged = true;
                        return c;
                    });

                    if (commentsChanged) {
                        updates.comments = updatedComments;
                        needsUpdate = true;
                    }
                }

                if (needsUpdate) {
                    updatePromises.push(updateDoc(doc(db, "blogs", blogDoc.id), updates));
                }
            });
            await Promise.all(updatePromises);

            alert("Profile Saved Successfully!");
            window.location.href = 'index.html';
        } catch (error) {
            console.error("Error saving profile:", error);
            alert("Error saving profile: " + error.message);
        } finally {
            saveBtn.innerHTML = originalBtnContent;
            saveBtn.disabled = false;
            saveBtn.style.opacity = '1';
        }
    });

        currentAction = 'change_pwd';
        document.getElementById('pwd-modal-title').innerText = "Change Password";
        document.getElementById('pwd-modal-desc').innerText = "Please enter your current password to verify identity, then enter your new password.";
        document.getElementById('new-password-section').style.display = 'block';
        pwdActionBtn.innerText = "Update Password";
        pwdActionBtn.style.backgroundColor = "#198754";
        pwdActionBtn.style.color = "white";
        
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        pwdModal.style.display = 'flex';
    });

    document.getElementById('delete-acc-btn').addEventListener('click', async () => {
        currentAction = 'delete_acc';
        document.getElementById('pwd-modal-title').innerText = "Delete Account";
        document.getElementById('pwd-modal-desc').innerText = "WARNING: This action is irreversible. Enter your password to confirm deletion.";
        document.getElementById('new-password-section').style.display = 'none';
        pwdActionBtn.innerText = "Delete Forever";
        pwdActionBtn.style.backgroundColor = "#dc3545";
        pwdActionBtn.style.color = "white";
        
        document.getElementById('current-password').value = '';
        pwdModal.style.display = 'flex';
    });

    pwdActionBtn.addEventListener('click', async () => {
        if (!currentUser) return;
        const currentPwd = document.getElementById('current-password').value;
        if (!currentPwd) { alert("Please enter your current password."); return; }

        const credential = EmailAuthProvider.credential(currentUser.email, currentPwd);
        
        try {
            // 1. Re-authenticate
            await reauthenticateWithCredential(currentUser, credential);

            if (currentAction === 'delete_acc') {
                await deleteDoc(doc(db, "users", currentUser.uid));
                await deleteUser(currentUser);
                alert("Account deleted successfully.");
                window.location.href = 'index.html';
            } else if (currentAction === 'change_pwd') {
                const newPwd = document.getElementById('new-password').value;
                const confirmPwd = document.getElementById('confirm-password').value;
                
                if (newPwd !== confirmPwd) { alert("New passwords do not match."); return; }
                if (newPwd.length < 6) { alert("Password must be at least 6 characters."); return; }
                
                await updatePassword(currentUser, newPwd);
                alert("Password updated successfully!");
                pwdModal.style.display = 'none';
            }
        } catch (error) {
            console.error("Action error:", error);
            alert("Error: " + error.message);
        }
    });
</script>
</body>
</html>
