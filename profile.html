    <style>

        .lucide-fill { fill: currentColor; }

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const observer = new MutationObserver((mutations) => {
                if (mutations.some(m => m.addedNodes.length > 0)) {
                    observer.disconnect();
                    lucide.createIcons();
                    observer.observe(document.body, { childList: true, subtree: true });
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });

        window.timeAgo = function(dateParam) {
            if (!dateParam) return '';
            const date = new Date(dateParam);
            const seconds = Math.max(0, Math.floor((new Date() - date) / 1000));
            let interval = seconds / 31536000;
            if (interval >= 1) return Math.floor(interval) + " year" + (Math.floor(interval) > 1 ? "s" : "") + " ago";
            interval = seconds / 2592000;
            if (interval >= 1) return Math.floor(interval) + " month" + (Math.floor(interval) > 1 ? "s" : "") + " ago";
            interval = seconds / 604800;
            if (interval >= 1) return Math.floor(interval) + " week" + (Math.floor(interval) > 1 ? "s" : "") + " ago";
            interval = seconds / 86400;
            if (interval >= 1) return Math.floor(interval) + " day" + (Math.floor(interval) > 1 ? "s" : "") + " ago";
            interval = seconds / 3600;
            if (interval >= 1) return Math.floor(interval) + " hour" + (Math.floor(interval) > 1 ? "s" : "") + " ago";
            interval = seconds / 60;
            if (interval >= 1) return Math.floor(interval) + " minute" + (Math.floor(interval) > 1 ? "s" : "") + " ago";
            return "Just now";
        };
        });
    </script>

<script type="module">
    import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, deleteDoc, updateDoc, arrayUnion, arrayRemove, addDoc, onSnapshot, deleteField, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, updateProfile, deleteUser, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { db, auth } from "./firebase-config.js";
    let currentUser = null;
    let currentProfileData = {}; // Store loaded profile data for lists
    let profilePageBlogs = [];
    let isUserVerified = false; // Flag to check if current user (owner) is verified
    let isViewerAdmin = false;
    let isProfileOwner = false;

    let globalAdConfig = { showAds: false, vastUrl: '' };
    
    window.getProxiedVideoUrl = function(url) {
        if (!url) return url;
        let fileId = null;
        
        const driveMatch = url.match(/drive\.google\.com\/file\/d\/(.*?)\/view/);
        if (driveMatch && driveMatch[1]) fileId = driveMatch[1];
        
        const ucMatch = url.match(/[?&]id=([^&]+)/);
        if (ucMatch && ucMatch[1]) fileId = ucMatch[1];
        
        const renderMatch = url.match(/api\/stream\/([a-zA-Z0-9_-]+)/);
        if (renderMatch && renderMatch[1]) fileId = renderMatch[1];

        if (fileId) {
            // 👇 Yahan apna naya Cloudflare Worker URL daalein 👇
                return `https://viyou-video-proxy.nshuhima246.workers.dev/${fileId}`;
        }
        return url;
    };

    window.enableYoutubeLinks = true;

    // Handle Image Selection
    const fileInput = document.getElementById('file-input');

    // Cropper variables
    let cropper;
    const cropperModal = document.getElementById('cropper-modal');
    const cropperImage = document.getElementById('cropper-image');
    const btnCrop = document.getElementById('btn-crop');
    const btnCancelCrop = document.getElementById('btn-cancel-crop');

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                cropperImage.src = e.target.result;
                cropperModal.style.display = 'flex';
                if(cropper) cropper.destroy();
                cropper = new Cropper(cropperImage, {
                    aspectRatio: 1,
                    viewMode: 1,
                    autoCropArea: 1,
                    background: false,
                });
            };
            reader.readAsDataURL(file);
        }
        fileInput.value = ''; // Allow re-selecting same file
    });

    btnCancelCrop.addEventListener('click', () => {
        cropperModal.style.display = 'none';
        if(cropper) cropper.destroy();
    });

    btnCrop.addEventListener('click', () => {
        if(!cropper) return;
        
        // Get cropped canvas (limit size to 200x200 for profile pic to save DB space)
        const canvas = cropper.getCroppedCanvas({
            width: 200,
            height: 200,
            imageSmoothingEnabled: true,
            imageSmoothingQuality: 'high',
        });

        // Compress to under 15KB to avoid 1MB document limit on comments
        let quality = 0.8;
        let dataURL = canvas.toDataURL('image/jpeg', quality);
        
        while (dataURL.length > 20000 && quality > 0.1) {
            quality -= 0.1;
            dataURL = canvas.toDataURL('image/jpeg', quality);
        }

        preview.src = dataURL;
        base64Image = dataURL;
        
        cropperModal.style.display = 'none';
        cropper.destroy();

        if (auth.currentUser) {
            (async () => {
                try {
                    await setDoc(doc(db, "users", auth.currentUser.uid), { photoURL: dataURL }, { merge: true });
                    
                    const allBlogsSnapshot = await getDocs(collection(db, "blogs"));
                    const updatePromises = [];
                    allBlogsSnapshot.forEach((blogDoc) => {
                        const blogData = blogDoc.data();
                        const updates = {}; let needsUpdate = false;
                        if (blogData.authorUid === auth.currentUser.uid) {
                            updates.authorPhoto = dataURL; needsUpdate = true;
                        }
                        if (blogData.comments && Array.isArray(blogData.comments)) {
                            let commentsChanged = false;
                            const updatedComments = blogData.comments.map(comment => {
                                let c = { ...comment }; let cChanged = false;
                                if (c.userUid === auth.currentUser.uid) { c.photo = dataURL; cChanged = true; }
                                if (c.replies && Array.isArray(c.replies)) {
                                    const newReplies = c.replies.map(reply => {
                                        if (reply.userUid === auth.currentUser.uid) { cChanged = true; return { ...reply, photo: dataURL }; }
                                        return reply;
                                    });
                                    if (cChanged) c.replies = newReplies;
                                }
                                if (cChanged) commentsChanged = true;
                                return c;
                            });
                            if (commentsChanged) { updates.comments = updatedComments; needsUpdate = true; }
                        }
                        if (needsUpdate) updatePromises.push(updateDoc(doc(db, "blogs", blogDoc.id), updates));
                    });
                    
                    const allStoriesSnapshot = await getDocs(collection(db, "stories"));
                    allStoriesSnapshot.forEach((storyDoc) => {
                        if (storyDoc.data().authorUid === auth.currentUser.uid) {
                            updatePromises.push(updateDoc(doc(db, "stories", storyDoc.id), { authorPhoto: dataURL }));
                        }
                    });
                    await Promise.all(updatePromises);
                } catch(e) { console.error("Error saving photo in background:", e); }
            })();
        }
    });

    function updateFollowButton(isFollowing) {

    function updateBlockButton(isBlocked) {
        const btn = document.getElementById('block-btn');
        const followBtn = document.getElementById('follow-btn');
        const messageBtn = document.getElementById('message-profile-btn');

        btn.innerText = isBlocked ? "Unblock" : "Block";
        btn.classList.toggle('following', isBlocked); // Use same style for visual cue
        followBtn.style.display = isBlocked ? 'none' : 'inline-block';
        messageBtn.style.display = isBlocked ? 'none' : 'inline-block';
    }

    function toggleFollow(targetUid, isCurrentlyFollowing) {
        if (!currentUser) return;
        const myUid = currentUser.uid;
        const userRef = doc(db, 'users', myUid);
        const targetRef = doc(db, 'users', targetUid);
        
        const isUnfollowing = isCurrentlyFollowing;

        // --- Optimistic UI Update ---
        updateFollowButton(!isUnfollowing);
        document.getElementById('follow-btn').onclick = () => toggleFollow(targetUid, !isUnfollowing);
        const followersCountEl = document.getElementById('followers-count');
        const originalFollowers = parseInt(followersCountEl.innerText.replace(/,/g, ''));
        followersCountEl.innerText = (isUnfollowing ? Math.max(0, originalFollowers - 1) : originalFollowers + 1).toLocaleString();

        // --- Background DB Update ---
        (async () => {
            try {
                if (isUnfollowing) {
                    await updateDoc(userRef, { following: arrayRemove(targetUid) });
                    await updateDoc(targetRef, { followers: arrayRemove(myUid) });
                } else {
                    await updateDoc(userRef, { following: arrayUnion(targetUid) });
                    await updateDoc(targetRef, { followers: arrayUnion(myUid) });
                    const targetDocSnap = await getDoc(targetRef);
                    if (targetDocSnap.exists() && (targetDocSnap.data().followers || []).length >= 200 && !targetDocSnap.data().isVerified) {
                        await updateDoc(targetRef, { isVerified: true });
                        await addDoc(collection(db, "notifications"), { recipientUid: targetUid, senderName: "System", type: "verification", date: new Date().toISOString(), read: false });
                    }
                    await addDoc(collection(db, "notifications"), { recipientUid: targetUid, senderUid: myUid, senderName: currentUser.displayName || "Someone", type: "follow", date: new Date().toISOString(), read: false });
                }
                setTimeout(() => loadProfileData(targetUid, currentUser), 2000);
            } catch(e) { console.error("Follow error:", e); alert("Error updating follow status"); updateFollowButton(isUnfollowing); document.getElementById('follow-btn').onclick = () => toggleFollow(targetUid, isUnfollowing); followersCountEl.innerText = originalFollowers.toLocaleString(); }
        })();
    }

    async function toggleBlock(targetUid, isCurrentlyBlocked) {
        if (!currentUser) return;
        const myUid = currentUser.uid;
        const userRef = doc(db, "users", myUid);
        const targetRef = doc(db, "users", targetUid);

        try {
            if (isCurrentlyBlocked) {
                await updateDoc(userRef, { blockedUsers: arrayRemove(targetUid) });
                await updateDoc(targetRef, { blockedBy: arrayRemove(myUid) });
                updateBlockButton(false);
                document.getElementById('block-btn').onclick = () => toggleBlock(targetUid, false);
            } else {
                    if (await window.viyouConfirm(`Are you sure you want to block this user? You won't see their posts, and they won't be able to message you.`)) {
                        await updateDoc(userRef, { blockedUsers: arrayUnion(targetUid), following: arrayRemove(targetUid) }); // Also unfollow
                    await updateDoc(targetRef, { blockedBy: arrayUnion(myUid), followers: arrayRemove(myUid) }); // Also remove from their followers
                    updateBlockButton(true);
                    document.getElementById('block-btn').onclick = () => toggleBlock(targetUid, true);
                }
            }
        } catch (e) { console.error("Block error:", e); await window.viyouAlert("Error updating block status."); }
    }

    async function loadProfileData(uid, viewerUser) {
        let data = {};
        let totalBlogs = 0;
        let totalLikes = 0;
        let isVerifiedDisplay = false;

        try {
            const docRef = doc(db, "users", uid);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                data = docSnap.data();

                // If viewing someone else's profile, check if they have blocked you.
                if (viewerUser && viewerUser.uid !== uid) {
                    if (data.blockedUsers && data.blockedUsers.includes(viewerUser.uid)) {
                        handleBlockedProfile("You have been blocked by this user.");
                        return;
                    }
                }

                currentProfileData = data; // Store for list access
                document.getElementById('name').value = data.name || "";
                document.getElementById('username').value = data.username || "";
                document.getElementById('bio').value = data.bio || "";
                
                document.getElementById('display-name').innerText = data.name || "User";
                document.getElementById('display-username').innerText = data.username ? "@" + data.username : "";
                document.getElementById('display-bio').innerText = data.bio || "";
                if (data.photoURL) {
                    document.getElementById('preview').src = data.photoURL;
                    if (currentUser && uid === currentUser.uid) base64Image = data.photoURL;
                    if (currentUser && uid === currentUser.uid) base64Image = data.photoURL; // For my profile
                }
                
                // Update Counts
                const actualFollowers = data.followers ? data.followers.length : 0;
                const displayFollowers = data.followerCountOverride !== undefined ? Number(data.followerCountOverride) : actualFollowers;
                const following = data.following || [];
                document.getElementById('followers-count').innerText = displayFollowers.toLocaleString();
                document.getElementById('following-count').innerText = following.length.toLocaleString();

                // Hide 'Following' count from other users
                if (viewerUser && viewerUser.uid === uid) {
                    document.getElementById('following-box').style.display = 'block';
                } else {
                    document.getElementById('following-box').style.display = 'none';
                }

                // Verified Badge
                isVerifiedDisplay = data.isVerified || displayFollowers >= 200;
                const verifiedIndicator = document.getElementById('verified-indicator');
                if (verifiedIndicator) {
                    if (isVerifiedDisplay) {
                        verifiedIndicator.style.display = 'block';
                    } else {
                        verifiedIndicator.style.display = 'none';
                    }
                }

            } else if (currentUser && uid === currentUser.uid) {
                document.getElementById('name').value = currentUser.displayName;
                if (currentUser.photoURL) document.getElementById('preview').src = currentUser.photoURL;
            }

            // Fetch and display blog stats
            try {
                const blogsQuery = query(collection(db, "blogs"), where("authorUid", "==", uid), where("status", "!=", "draft"));
                const blogsSnapshot = await getDocs(blogsQuery);

                totalBlogs = blogsSnapshot.size;
                blogsSnapshot.forEach(blogDoc => {
                    const blogData = blogDoc.data();
                    totalLikes += Array.isArray(blogData.likes) ? blogData.likes.length : (typeof blogData.likes === 'number' && !isNaN(blogData.likes) ? blogData.likes : 0);
                });

                if (document.getElementById('blogs-count')) {
                    document.getElementById('blogs-count').innerText = totalBlogs;
                }
                if (document.getElementById('likes-count')) {
                    document.getElementById('likes-count').innerText = totalLikes;
                }
            } catch (e) { console.error("Error fetching blog stats:", e); }

            data.isVerified = isVerifiedDisplay;
            // NEW: Display badges based on stats
            displayBadges(data, totalBlogs, totalLikes);

        } catch (e) { console.error("Error loading profile:", e); }
    }

    window.playFlickPreview = function(el) {

        if (vid) {
            const start = parseFloat(vid.getAttribute('data-start')) || 0;
            vid.currentTime = start;
            vid.play().catch(e => {});
            vid.ontimeupdate = () => {
                const end = parseFloat(vid.getAttribute('data-end')) || vid.duration;
                if (vid.currentTime >= end) { vid.currentTime = start; vid.play().catch(()=>{}); }
            };
        }
        if (img) img.style.opacity = '0';
    };

    window.stopFlickPreview = function(el) {
        const vid = el.querySelector('video');
        const img = el.querySelector('.flick-thumb-img');
        if (vid) { vid.pause(); vid.ontimeupdate = null; vid.currentTime = parseFloat(vid.getAttribute('data-start')) || 0; }
        if (img) img.style.opacity = '1';
    };

    function getYoutubeVideoId(url) {
        if (!url) return null;
        const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    // Helper function to escape HTML for XSS prevention
    function escapeHTML(str) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }
    window.scrollCarousel = function(btn, direction) {
        const container = btn.parentElement.querySelector('.image-carousel');
        const scrollAmount = container.clientWidth;
        container.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
    };

    async function renderLikedContent(uid) {
        const list = document.getElementById('my-liked-list');
        list.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1 / -1;">Loading liked posts...</p>';

        try {
            await globalSettingsPromise;
            // Query liked posts (using array-contains, sorting locally to avoid complex index requirements)
            const q = query(collection(db, "blogs"), where("likes", "array-contains", uid));
            const querySnapshot = await getDocs(q);

            list.innerHTML = '';
            if (querySnapshot.empty) {
                list.innerHTML = '<p style="text-align:center; color:#aaa; grid-column: 1 / -1;">You haven\'t liked any posts yet.</p>';
                return;
            }

            let likedPosts = [];
            querySnapshot.forEach(doc => {
                if (!window.enableYoutubeLinks && doc.data().youtubeUrl) return;
                likedPosts.push({ id: doc.id, ...doc.data() });
            });

            window.likedPostsData = likedPosts;
            // Sort posts by date descending
            likedPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

            likedPosts.forEach(blog => {
                let category = 'blogs';
                if (blog.isFlicker) category = 'flicks';
                else if (blog.video || blog.youtubeUrl) category = 'videos';

                const item = document.createElement('div');
                item.className = 'yt-grid-item';
                
                let thumbHtml = '';
                if (blog.youtubeUrl) {
                    const videoId = getYoutubeVideoId(blog.youtubeUrl);
                    thumbHtml = `<img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}">`;
                } else if (blog.video) {
                    let vidSrc = window.getProxiedVideoUrl(blog.video);
                    if (blog.thumbnail) {
                        thumbHtml = `<img src="${blog.thumbnail}" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}">`;
                    } else {
                        thumbHtml = `<video src="${vidSrc}#t=0.1" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}" muted playsinline preload="metadata"></video>`;
                    }
                } else if (blog.images && blog.images.length > 0) {
                    thumbHtml = `<img src="${blog.images[0]}" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}">`;
                } else if (blog.image && blog.image !== 'logo.png') {
                    thumbHtml = `<img src="${blog.image}" class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}">`;
                } else {
                    thumbHtml = `<div class="${category === 'flicks' ? 'flick-thumbnail' : 'video-thumbnail'}" style="display:flex; align-items:center; justify-content:center; background:#222; border: 1px solid #444;"><i data-lucide="newspaper" style="font-size:2rem; color:#555;"></i></div>`;
                }

                let icon = category === 'flicks' ? '<i data-lucide="zap" class="lucide-fill" style="color: #ff0050;"></i>' : (category === 'videos' ? '<i data-lucide="play" class="lucide-fill"></i>' : '<i data-lucide="newspaper"></i>');
                let targetAction = '';
                if (category === 'flicks') targetAction = `window.location.href='flicks.html?id=${blog.id}'`;
                else if (category === 'videos') targetAction = `window.location.href='watch.html?id=${blog.id}'`;
                else targetAction = `window.location.href='index.html?view=blog&id=${blog.id}'`;

                const authorPhoto = (blog.authorPhoto && blog.authorPhoto !== 'null') ? blog.authorPhoto : 'logo.png';
                item.innerHTML = `
                    <div style="position: relative;" onclick="${targetAction}">
                        ${thumbHtml}
                        <div style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; color: white; font-size: 0.8rem;">${icon}</div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <img src="${authorPhoto}" style="width: 36px; height: 36px; border-radius: 50%; object-fit: cover; cursor: pointer; flex-shrink: 0; border: 1px solid #444;" onclick="event.stopPropagation(); window.location.href='profile.html?uid=${blog.authorUid}'" alt="DP">
                        <div style="display: flex; flex-direction: column; overflow: hidden; flex: 1;">
                            <h4 class="grid-title-text" onclick="${targetAction}" style="margin: 0 0 4px 0; cursor: pointer;">${blog.title || 'Untitled'}</h4>
                            <p style="margin: 0; font-size: 0.85rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;" onclick="event.stopPropagation(); window.location.href='profile.html?uid=${blog.authorUid}'">@${blog.author || 'User'}</p>

        }

            content.innerHTML = '<p style="color:red;">Blog not found in current view.</p>';

    window.likeUserBlog = async function(id) {
                if (!auth.currentUser) { await window.viyouAlert("Please login to like comments!"); return; }
        
        let blog = null;
        let isLikedView = false;
        const blogIndex = profilePageBlogs.findIndex(b => b.id === id);
        if (blogIndex !== -1) {
            blog = profilePageBlogs[blogIndex];
        } else if (window.likedPostsData) {
            const likedIndex = window.likedPostsData.findIndex(b => b.id === id);
            if (likedIndex !== -1) {
                blog = window.likedPostsData[likedIndex];
                isLikedView = true;
            }
        }
        if (!blog) return;

        const blogRef = doc(db, "blogs", id);
        
        const uid = auth.currentUser.uid;
        let isLiking = false;

        if (Array.isArray(blog.likes)) {
            const likedIndex = blog.likes.indexOf(uid);
            isLiking = likedIndex === -1;

            if (isLiking) {
                blog.likes.push(uid);
            } else {
                blog.likes.splice(likedIndex, 1);
            }
        } else {
            let likedPosts = JSON.parse(localStorage.getItem('viyou_user_liked_posts') || '[]');
            const likedIndex = likedPosts.indexOf(id);
            let currentLikes = typeof blog.likes === 'number' ? blog.likes : 0;
            
            if (likedIndex === -1) {
                currentLikes++;
                likedPosts.push(id);
            } else {
                currentLikes = Math.max(0, currentLikes - 1);
                likedPosts.splice(likedIndex, 1);
            }
            
            blog.likes = currentLikes;
            localStorage.setItem('viyou_user_liked_posts', JSON.stringify(likedPosts));
        }
        
        // Optimistic UI update (ताकि लाइक नंबर तुरंत स्क्रीन पर बदल जाए)
        if (isLikedView) {
            window.viewLikedBlog(id);
        } else {
            renderBlogsOnProfile(isProfileOwner);
            if (document.getElementById('my-blogs-single').style.display === 'block') {
                window.viewMyBlog(id);
            }
        }

        // Background Firestore Update
        try {
            if (Array.isArray(blog.likes)) {
                if (isLiking) {
                    await updateDoc(blogRef, { likes: arrayUnion(uid) });
                } else {
                    await updateDoc(blogRef, { likes: arrayRemove(uid) });
                }
            } else {
                await updateDoc(blogRef, { likes: blog.likes });
            }
        } catch(e) {
            console.error("Error updating likes:", e);
        }
    };

    window.addBlogComment = async function(blogId) {
                if (!auth.currentUser) { await window.viyouAlert("Please login to comment!"); return; }
                const input = document.getElementById(`comment-input-${blogId}`);
        const text = input.value.trim();
        if (!text) return;

        let authorName = auth.currentUser.displayName || "User";
        let authorPhoto = "https://via.placeholder.com/40";
        try {
            const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.name) authorName = userData.name;
                if (userData.photoURL) authorPhoto = userData.photoURL;
            }
        } catch(e) {}

        const newComment = {
            id: Date.now().toString(36) + Math.random().toString(36).substring(2),
            author: authorName,
            userUid: auth.currentUser.uid,
            photo: authorPhoto,
            text: text,
            date: new Date().toISOString(), // Store as ISO string
            likes: [] // Store UIDs of users who liked this comment
        };

        const blogRef = doc(db, "blogs", blogId);

        let blog = null;
        let isLikedView = false;
        const blogIndex = profilePageBlogs.findIndex(b => b.id === blogId);
        if (blogIndex !== -1) {
            blog = profilePageBlogs[blogIndex];
        } else if (window.likedPostsData) {
            blog = window.likedPostsData.find(b => b.id === blogId);
            if (blog) isLikedView = true;
        }

        if (blog) {
            if (!blog.comments) {
                blog.comments = [];
            }
            blog.comments.push(newComment);
            if (isLikedView) {
                window.viewLikedBlog(blogId);
            } else {
                renderBlogsOnProfile(isProfileOwner);
                if (document.getElementById('my-blogs-single').style.display === 'block') {
                    window.viewMyBlog(blogId);
                }
            }
            input.value = '';
        }

        await updateDoc(blogRef, { comments: arrayUnion(newComment) });

        // Send Notification
        const blogSnap = await getDoc(blogRef);
        if (blogSnap.exists()) {
            const blogData = blogSnap.data();
            if (blogData.authorUid && blogData.authorUid !== auth.currentUser.uid) {
                await addDoc(collection(db, "notifications"), {
                    recipientUid: blogData.authorUid,
                    senderUid: auth.currentUser.uid,
                    senderName: authorName,

                    blogTitle: blogData.title,

                    read: false

        }

    window.toggleCommentLike = async function(blogId, commentIdOrIndex) {
        if (!auth.currentUser) { alert("Please login to like comments!"); return; }

        let blog = null;
        let isLikedView = false;
        const blogIndex = profilePageBlogs.findIndex(b => b.id === blogId);
        if (blogIndex !== -1) {
            blog = profilePageBlogs[blogIndex];
        } else if (window.likedPostsData) {
            blog = window.likedPostsData.find(b => b.id === blogId);
            if (blog) isLikedView = true;
        }
        
        if (!blog) return;

        let comment = blog.comments.find((c, i) => (c.id || i) == commentIdOrIndex);
        if (!comment) return;

        if (!comment.likes) comment.likes = [];
        const uid = auth.currentUser.uid;
        const likedIndex = comment.likes.indexOf(uid);
        const isLiking = likedIndex === -1;

        if (isLiking) {
            comment.likes.push(uid);
        } else {
            comment.likes.splice(likedIndex, 1);
        }
        
        // Optimistic UI update
        if (isLikedView) {
            window.viewLikedBlog(blogId);
        } else {
            renderBlogsOnProfile(isProfileOwner);
            if (document.getElementById('my-blogs-single').style.display === 'block') {
                window.viewMyBlog(blogId);
            }
        }

        // Update Firestore
        try {
            const blogRef = doc(db, "blogs", blogId);
            const docSnap = await getDoc(blogRef);
            if (docSnap.exists()) {
                let blogData = docSnap.data();
                const dbCommentIndex = blogData.comments.findIndex((c, i) => (c.id || i) == commentIdOrIndex);
                if (dbCommentIndex > -1) blogData.comments[dbCommentIndex] = comment;
                await updateDoc(blogRef, { comments: blogData.comments });
            }
        } catch (e) {
            console.error("Error toggling comment like:", e);
                    await window.viyouAlert("Failed to update comment like.");

            }
        }

        try {
            const blogRef = doc(db, "blogs", blogId);
            const docSnap = await getDoc(blogRef);
            if (docSnap.exists()) {
                let blogData = docSnap.data();
                const dbCommentIndex = blogData.comments.findIndex((c, i) => (c.id || i) == commentIdOrIndex);
                if (dbCommentIndex > -1) blogData.comments.splice(dbCommentIndex, 1);
                await updateDoc(blogRef, { comments: blogData.comments });
            }
        } catch (e) {
            console.error("Error deleting comment:", e);
                    await window.viyouAlert("Failed to delete comment.");
                }
    };

    // Global functions for buttons
    window.editMyBlog = (id) => {
        window.location.href = `write-blog.html?id=${id}`;
    };

    window.deleteMyBlog = async (id) => {
        if(await window.viyouConfirm("Are you sure you want to delete this post?")) {
            try {
                const docRef = doc(db, "blogs", id);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() && docSnap.data().video && docSnap.data().video.includes('api/stream/')) {
                    const match = docSnap.data().video.match(/api\/stream\/([a-zA-Z0-9_-]+)/);
                    if (match && match[1]) {
                        await fetch(`https://viyou-in-backend.onrender.com/api/file/${match[1]}`, { method: 'DELETE' }).catch(e=>{});
                    }
                }
                await deleteDoc(doc(db, "blogs", id));
                if(currentUser) renderUserBlogs(currentUser.uid, true);
            } catch(e) { alert("Error: " + e.message); }
        }
    };

    // Function to show Followers/Following list
    window.showUserList = async (type) => {
        if (!isProfileOwner) {
            return; // Exit completely if the viewer is not the profile owner
        }
        
        const modal = document.getElementById('user-list-modal');
        const title = document.getElementById('user-list-title');
        const content = document.getElementById('user-list-content');
        
        modal.style.display = 'flex';
        title.innerText = type === 'followers' ? 'Followers' : 'Following';
        content.innerHTML = '<p style="text-align:center; color:#aaa;">Loading...</p>';
        
        const uids = (type === 'followers' ? currentProfileData.followers : currentProfileData.following) || [];
        
        if (uids.length === 0) {
            content.innerHTML = '<p style="text-align:center; color:#aaa;">No users found.</p>';
            return;
        }

        try {
            content.innerHTML = '';
            // Fetch details for each user
            const promises = uids.map(uid => getDoc(doc(db, "users", uid)));
            const snapshots = await Promise.all(promises);
            
            snapshots.forEach(snap => {
                if (snap.exists()) {
                    const u = snap.data();
                    const div = document.createElement('div');
                    div.style.cssText = "display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1); cursor:pointer;";
                    div.onclick = () => window.location.href = `profile.html?uid=${snap.id}`;
                    

                    div.innerHTML = `
                        <img src="${u.photoURL || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid #555;">
                        <div>
                            <strong style="color:#fff;">${u.name || 'User'}</strong>
                            <div style="font-size:0.8rem; color:#aaa;">${u.username || ''}</div>
                        </div>
                    `;
                    content.appendChild(div);
                }
            });
        } catch (e) { console.error(e); content.innerHTML = '<p style="color:red;">Error loading list.</p>'; }
    };

    document.getElementById('save-btn').addEventListener('click', async () => {
        if (!currentUser) return;
        
        const name = document.getElementById('name').value;
        const username = document.getElementById('username').value.trim();
        const bio = document.getElementById('bio').value;
        const photoURL = base64Image || currentUser.photoURL;
        const actualFollowers = currentProfileData.followers ? currentProfileData.followers.length : 0;
        const displayFollowers = currentProfileData.followerCountOverride !== undefined ? Number(currentProfileData.followerCountOverride) : actualFollowers;
        let isVerified = displayFollowers >= 200;
        
        const saveBtn = document.getElementById('save-btn');
        const originalBtnContent = saveBtn.innerHTML;
        saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
        saveBtn.disabled = true;
        saveBtn.style.opacity = '0.7';

        try {
            // 1. Update Firebase Auth Profile (for basic display)
            // Note: We don't update photoURL here because Firebase Auth has a small limit.
            // The large base64 image is stored in Firestore below.
            await updateProfile(currentUser, {
                displayName: name
            });

            // Check Username
            if (username !== currentProfileData.username) {
                // Username has changed, so validate it fully
                if (!username) {
                        await window.viyouAlert("Unique ID (Username) is required!");
                    return;
                }
                if (username.length > 20 || !/^[a-zA-Z0-9_]+$/.test(username)) {
                        await window.viyouAlert("Username can only contain letters, numbers, and underscores, and be max 20 characters.");
                    return;
                }

                const q = query(collection(db, "users"), where("usernameLower", "==", username.toLowerCase()));
                const snap = await getDocs(q);
                let isTaken = false;
                snap.forEach(d => { if (d.id !== currentUser.uid) isTaken = true; });

                if (isTaken) {
                        await window.viyouAlert("Username '" + username + "' is already taken. Please choose another.");
                    return;
                }
                            
                            changeHistory.push(now);
                            currentProfileData.usernameChangeHistory = changeHistory;
            } else if (!username) {
                // Username is unchanged but empty. This is an error state for any user.
                    await window.viyouAlert("Unique ID (Username) is required!");
                return;
            }

            // 2. Save detailed profile to Firestore
            await setDoc(doc(db, "users", currentUser.uid), {
                name: name,
                username: username,
                usernameLower: username.toLowerCase(),
                bio: bio,
                photoURL: photoURL,
                email: currentUser.email,
                            isVerified: isVerified,
                            usernameChangeHistory: currentProfileData.usernameChangeHistory || []
            }, { merge: true });

            // Update author details in all existing blogs AND comments
            const allBlogsSnapshot = await getDocs(collection(db, "blogs"));
            
            const updatePromises = [];
            
            allBlogsSnapshot.forEach((blogDoc) => {
                const blogData = blogDoc.data();
                const updates = {};
                let needsUpdate = false;

                // 1. Update Blog Author info if this user is the author
                if (blogData.authorUid === currentUser.uid) {
                    updates.author = name;
                    updates.authorPhoto = photoURL;
                    updates.authorVerified = isVerified;
                    needsUpdate = true;
                }

                // 2. Update Comments info if this user commented
                if (blogData.comments && Array.isArray(blogData.comments)) {
                    let commentsChanged = false;
                    const updatedComments = blogData.comments.map(comment => {
                        let c = { ...comment };
                        let cChanged = false;

                        if (c.userUid === currentUser.uid) {
                            c.author = name;
                            c.photo = photoURL;
                            c.userVerified = isVerified;
                            cChanged = true;
                        }

                        if (c.replies && Array.isArray(c.replies)) {
                            const newReplies = c.replies.map(reply => {
                                if (reply.userUid === currentUser.uid) {
                                    cChanged = true;
                                    return { ...reply, author: name, photo: photoURL, userVerified: isVerified };
                                }
                                return reply;
                            });
                            if (cChanged) c.replies = newReplies;
                        }

                        if (cChanged) commentsChanged = true;
                        return c;
                    });

                    if (commentsChanged) {
                        updates.comments = updatedComments;
                        needsUpdate = true;
                    }
                }

                if (needsUpdate) {
                    updatePromises.push(updateDoc(doc(db, "blogs", blogDoc.id), updates));
                }
            });
            
            const allStoriesSnapshot = await getDocs(collection(db, "stories"));
            allStoriesSnapshot.forEach((storyDoc) => {
                if (storyDoc.data().authorUid === currentUser.uid) {
                    updatePromises.push(updateDoc(doc(db, "stories", storyDoc.id), {
                        authorName: name,
                        authorPhoto: photoURL
                    }));
                }
            });
            await Promise.all(updatePromises);

                await window.viyouAlert("Profile Saved Successfully!");
            window.closeSettingsPage();
            loadProfileData(currentUser.uid, currentUser);
        } catch (error) {
            console.error("Error saving profile:", error);
                await window.viyouAlert("Error saving profile: " + error.message);
        } finally {
            saveBtn.innerHTML = originalBtnContent;
            saveBtn.disabled = false;
            saveBtn.style.opacity = '1';
        }
    });

    // Password Modal Logic
    const pwdModal = document.getElementById('password-modal');
    const pwdActionBtn = document.getElementById('pwd-action-btn');
    let currentAction = null; // 'change_pwd' or 'delete_acc'

    document.getElementById('change-pwd-btn').addEventListener('click', () => {
        // Check if user is using password provider
        const isPasswordUser = currentUser.providerData.some(p => p.providerId === 'password');
        if (!isPasswordUser) {
                window.viyouAlert("You are logged in with a social account (e.g., Google). Please manage your password through that provider.");
            return;
        }

        currentAction = 'change_pwd';
        document.getElementById('pwd-modal-title').innerText = "Change Password";
        document.getElementById('pwd-modal-desc').innerText = "Please enter your current password to verify identity, then enter your new password.";
        document.getElementById('new-password-section').style.display = 'block';
        pwdActionBtn.innerText = "Update Password";
        pwdActionBtn.style.backgroundColor = "#198754";
        pwdActionBtn.style.color = "white";
        
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
        pwdModal.style.display = 'flex';
    });

    document.getElementById('delete-acc-btn').addEventListener('click', async () => {
        currentAction = 'delete_acc';
        document.getElementById('pwd-modal-title').innerText = "Delete Account";
        document.getElementById('pwd-modal-desc').innerText = "WARNING: This action is irreversible. Enter your password to confirm deletion.";
        document.getElementById('new-password-section').style.display = 'none';
        pwdActionBtn.innerText = "Delete Forever";
        pwdActionBtn.style.backgroundColor = "#dc3545";
        pwdActionBtn.style.color = "white";
        
        document.getElementById('current-password').value = '';
        pwdModal.style.display = 'flex';
    });

    pwdActionBtn.addEventListener('click', async () => {
        if (!currentUser) return;
        const currentPwd = document.getElementById('current-password').value;
            if (!currentPwd) { await window.viyouAlert("Please enter your current password."); return; }

        const credential = EmailAuthProvider.credential(currentUser.email, currentPwd);
        
        try {
            // 1. Re-authenticate
            await reauthenticateWithCredential(currentUser, credential);

            if (currentAction === 'delete_acc') {
                await deleteDoc(doc(db, "users", currentUser.uid));
                await deleteUser(currentUser);
                        await window.viyouAlert("Account deleted successfully.");
                        window.location.href = 'index.html';
                    } else if (currentAction === 'change_pwd') {
                const newPwd = document.getElementById('new-password').value;
                const confirmPwd = document.getElementById('confirm-password').value;
                
                if (newPwd !== confirmPwd) { alert("New passwords do not match."); return; }
                if (newPwd.length < 6) { alert("Password must be at least 6 characters."); return; }
                
                await updatePassword(currentUser, newPwd);
                        await window.viyouAlert("Password updated successfully!");
                        pwdModal.style.display = 'none';
                    }
        } catch (error) {
            console.error("Action error:", error);
                    await window.viyouAlert("Error: " + error.message);
                }
            });
</script>

    <!-- Custom Viyou Popup -->
    <div id="viyou-custom-popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999999; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div style="background:#1e1e1e; padding:25px; border-radius:12px; width:90%; max-width:400px; text-align:center; border:1px solid #444; box-shadow:0 10px 30px rgba(0,0,0,0.5); color:#fff; font-family:'Outfit', sans-serif;">
            <h3 id="viyou-popup-title" style="margin-top:0; color:#f59e0b; font-size:1.3rem;">Notification</h3>
            <p id="viyou-popup-message" style="margin-bottom:20px; color:#ddd; font-size:1rem; line-height:1.4; word-wrap:break-word;"></p>
            <input type="text" id="viyou-popup-input" style="display:none; width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #555; background:#333; color:#fff; box-sizing:border-box; font-size:1rem; outline:none;" autocomplete="off">
            <div style="display:flex; justify-content:center; gap:15px;">
                <button id="viyou-popup-cancel" style="display:none; flex:1; padding:12px; background:#444; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size:1rem; transition:0.2s;">Cancel</button>
                <button id="viyou-popup-ok" style="flex:1; padding:12px; background:linear-gradient(135deg, #6366f1, #a855f7); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size:1rem; transition:0.2s;">OK</button>
            </div>
        </div>
    </div>
    <script>
        window.viyouAlert = function(message, title = "Notification") {
            return new Promise(resolve => {
                const popup = document.getElementById('viyou-custom-popup');
                document.getElementById('viyou-popup-title').innerText = title;
                document.getElementById('viyou-popup-message').innerText = message;
                document.getElementById('viyou-popup-input').style.display = 'none';
                document.getElementById('viyou-popup-cancel').style.display = 'none';
                document.getElementById('viyou-popup-ok').onclick = () => { popup.style.display = 'none'; resolve(); };
                popup.style.display = 'flex';
    });
        };
        window.viyouConfirm = function(message, title = "Confirm") {
            return new Promise(resolve => {
                const popup = document.getElementById('viyou-custom-popup');
                document.getElementById('viyou-popup-title').innerText = title;
                document.getElementById('viyou-popup-message').innerText = message;
                document.getElementById('viyou-popup-input').style.display = 'none';
                document.getElementById('viyou-popup-cancel').style.display = 'block';
                document.getElementById('viyou-popup-cancel').onclick = () => { popup.style.display = 'none'; resolve(false); };
                document.getElementById('viyou-popup-ok').onclick = () => { popup.style.display = 'none'; resolve(true); };
                popup.style.display = 'flex';
            });
        };
        window.viyouPrompt = function(message, defaultText = "", title = "Input Required") {
            return new Promise(resolve => {
                const popup = document.getElementById('viyou-custom-popup');
                document.getElementById('viyou-popup-title').innerText = title;
                document.getElementById('viyou-popup-message').innerText = message;
                const input = document.getElementById('viyou-popup-input');
                input.style.display = 'block';
                input.value = defaultText;
                document.getElementById('viyou-popup-cancel').style.display = 'block';
                document.getElementById('viyou-popup-cancel').onclick = () => { popup.style.display = 'none'; resolve(null); };
                document.getElementById('viyou-popup-ok').onclick = () => { popup.style.display = 'none'; resolve(input.value); };
                popup.style.display = 'flex';
                input.focus();
            });
        };
    </script>
