<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flicks - Viyou</title>
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Modern Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <style>
        .lucide { width: 1.2em; height: 1.2em; vertical-align: middle; stroke-width: 2; }
        .lucide-fill { fill: currentColor; }
        .theme-dropdown { max-height: 75vh; overflow-y: auto; overflow-x: hidden; }
        .theme-dropdown::-webkit-scrollbar { width: 4px; }
        .theme-dropdown::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const observer = new MutationObserver((mutations) => {
                if (mutations.some(m => m.addedNodes.length > 0)) {
                    observer.disconnect();
                    lucide.createIcons();
                    observer.observe(document.body, { childList: true, subtree: true });
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>
    <!-- Fluid Player for VAST Ads -->
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js" defer></script>
    <link rel="stylesheet" href="assets/css/flicks.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4993635171115303"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="navbar">
        <a href="index.html"><i data-lucide="arrow-left"></i></a>
        <span>Flicks</span>
        <div class="theme-dropdown-container">
            <button id="main-menu-toggle" class="theme-btn"><i data-lucide="menu"></i></button>
            <div id="main-menu-dropdown" class="theme-dropdown">
                <a href="about-us.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="info" style="width: 16px;"></i> About Us</a>
                <a href="contact-us.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="mail" style="width: 16px;"></i> Contact Us</a>
                <a href="privacy.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="shield" style="width: 16px;"></i> Privacy Policy</a>
                <a href="terms.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="file-text" style="width: 16px;"></i> Terms of Service</a>
                <a href="monetization-policy.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="indian-rupee" style="width: 16px;"></i> Monetization Policy</a>
                <a href="advertise.html" class="theme-option" style="text-decoration: none; color: inherit;"><i data-lucide="megaphone" style="width: 16px;"></i> Advertise with Us</a>
                <div style="padding: 10px; text-align: center; font-size: 0.75rem; color: #888; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 5px;">&copy; Viyou. All Rights Reserved.</div>
            </div>
        </div>
    </div>
    <div id="flicks-comments-panel" style="display:none; position: fixed; bottom: 0; left: 0; width: 100%; height: 60%; background: #1e1e1e; border-top-left-radius: 15px; border-top-right-radius: 15px; z-index: 101; flex-direction: column; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); transform: translateY(100%); transition: transform 0.3s ease-out;">
        <!-- Comment Panel Content will be injected by JS -->
    </div>
    <div class="flicks-container" id="flicks-container">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; color: #aaa;">Loading Flicks...</div>
    </div>

    <!-- Send Flick Modal -->
    <div id="send-flick-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:102; flex-direction:column; align-items:center; justify-content:center;" onclick="if(event.target === this) this.style.display='none'">
        <div style="width:90%; max-width:400px; background:#1e1e1e; border: 1px solid #444; border-radius:12px; padding:20px; max-height:70vh; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <h3 style="margin:0; color:gold;">Send to...</h3>
                <button onclick="document.getElementById('send-flick-modal').style.display='none'" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div id="send-flick-user-list" style="overflow-y:auto; flex:1; padding-right: 5px;">Loading...</div>
        </div>
    </div>

    <script type="module">
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, increment, getDoc, arrayUnion, arrayRemove, addDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { db, auth } from "./firebase-config.js";

        // Helper function to escape HTML for XSS prevention
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
        let flicks = [];
        let currentFlickId = null;
        let viewedFlicks = new Set();
        let currentUserFollowing = [];

        // --- Menu Logic ---
        const mainMenuToggleBtn = document.getElementById('main-menu-toggle');
        const mainMenuDropdown = document.getElementById('main-menu-dropdown');

        mainMenuToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mainMenuDropdown.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (mainMenuDropdown && !mainMenuToggleBtn.contains(e.target) && !mainMenuDropdown.contains(e.target)) {
                mainMenuDropdown.classList.remove('show');
            }
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        async function loadFlicks() {
            try {
                const q = query(collection(db, "blogs"), where("isFlicker", "==", true));
                const snap = await getDocs(q);
                snap.forEach(doc => {
                    const data = doc.data();
                    if(data.status !== 'draft') flicks.push({ id: doc.id, ...data });
                });

                const urlParams = new URLSearchParams(window.location.search);
                const targetId = urlParams.get('id');

                // Reorder array: Requested flick comes first, the rest are shuffled (Random feed)
                let targetFlick = null;
                if (targetId) {
                    const idx = flicks.findIndex(f => f.id === targetId);
                    if (idx > -1) { targetFlick = flicks.splice(idx, 1)[0]; }
                }
                shuffleArray(flicks);
                if (targetFlick) { flicks.unshift(targetFlick); }

                const container = document.getElementById('flicks-container');
                container.innerHTML = ''; // Clear loading text
                
                if (flicks.length === 0) {
                    container.innerHTML = '<div style="height:100vh; display:flex; align-items:center; justify-content:center; color:#aaa;">No flicks available.</div>';
                    return;
                }

                flicks.forEach((flick) => {
                    const div = document.createElement('div');
                    div.className = 'flick-item';
                    div.id = `flick-item-${flick.id}`;
                    const likesCount = Array.isArray(flick.likes) ? flick.likes.length : (flick.likes || 0);
                    
                    const isLiked = auth.currentUser && Array.isArray(flick.likes) && flick.likes.includes(auth.currentUser.uid);
                    const heartColor = isLiked ? '#ff0050' : 'white';
                    const fillClass = isLiked ? 'lucide-fill' : '';
                    
                    let titleText = flick.title || '';
                    let showMoreHtml = '';
                    if (titleText.length > 60) {
                        showMoreHtml = `<button class="show-more-flick" id="flick-btn-${flick.id}" onclick="toggleFlickDesc('${flick.id}', event)">more</button>`;
                    }
                    
                    div.innerHTML = `
                        <video src="${flick.video}" loop playsinline data-id="${flick.id}"></video>
                        <div class="overlay">
                            <div class="author-row" onclick="window.location.href='profile.html?uid=${flick.authorUid}'">
                                <img src="${flick.authorPhoto || 'https://via.placeholder.com/45'}">
                                <strong>@${flick.author}</strong>
                            </div>
                            <div style="pointer-events: auto;">
                                <div class="title" id="flick-title-${flick.id}">${escapeHTML(titleText)}</div>
                                ${showMoreHtml}
                            </div>
                        </div>
                        <div class="sidebar">
                            <div class="action-wrapper">
                                <button class="action-btn" onclick="window.likeFlick('${flick.id}', this)"><i data-lucide="heart" class="${fillClass}" style="color: ${heartColor};"></i></button>
                                <span id="like-count-${flick.id}">${likesCount}</span>
                            </div>
                            <div class="action-wrapper">
                                <button class="action-btn" onclick="window.openFlickComments()"><i data-lucide="message-circle"></i></button>
                                <span id="comment-count-${flick.id}">${(flick.comments || []).length}</span>
                            </div>
                            <div class="action-wrapper">
                                <button class="action-btn" onclick="shareFlick('${flick.id}')"><i data-lucide="share-2"></i></button>
                                <span>Share</span>
                            </div>
                            <div class="action-wrapper">
                                <button class="action-btn" onclick="window.openSendFlickModal('${flick.id}')"><i data-lucide="send"></i></button>
                                <span>Send</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });

                setupScrollObserver();
            } catch (e) {
                console.error("Error loading flicks:", e);
            }
        }
        
        window.toggleFlickDesc = function(id, event) {
            if (event) event.stopPropagation();
            const titleEl = document.getElementById(`flick-title-${id}`);
            const btn = document.getElementById(`flick-btn-${id}`);
            const isExpanded = titleEl.classList.toggle('expanded');
            btn.innerText = isExpanded ? 'less' : 'more';
        };

       window.likeFlick = async (id, btn) => {
            if (!auth.currentUser) { alert('Log in to like.'); return; }
            const icon = btn.querySelector('svg') || btn.querySelector('i');
            const countSpan = btn.nextElementSibling;
            let currentLikes = parseInt(countSpan.innerText);

            const ref = doc(db, "blogs", id);
            try {
                const snap = await getDoc(ref);
                let likes = snap.data().likes || [];
                const isLiking = !likes.includes(auth.currentUser.uid);

                if (isLiking) {
                    likes.push(auth.currentUser.uid);
                    icon.style.color = '#ff0050';
                    icon.classList.add('lucide-fill');
                    countSpan.innerText = currentLikes + 1;
                } else {
                    likes = likes.filter(uid => uid !== auth.currentUser.uid);
                    icon.style.color = 'white';
                    icon.classList.remove('lucide-fill');
                    countSpan.innerText = Math.max(0, currentLikes - 1);
                }
                await updateDoc(ref, { likes });
            } catch(e) { console.error(e); }
        };

        window.shareFlick = (id) => {
            const url = window.location.origin + window.location.pathname + "?id=" + id;
            navigator.clipboard.writeText(url);
            alert("Link copied!");
        };

        function setupScrollObserver() {
            const videos = document.querySelectorAll('video');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const vid = entry.target;
                    if (entry.isIntersecting) {
                        vid.play().catch(e=>{});
                        const id = vid.getAttribute('data-id');
                        currentFlickId = id;
                        if (id && !viewedFlicks.has(id)) {
                            if (vid._viewTimerFn) vid.removeEventListener('timeupdate', vid._viewTimerFn);
                            vid._viewTimerFn = function() {
                                if (vid.currentTime >= 5 && !viewedFlicks.has(id)) {
                                    viewedFlicks.add(id);
                                    updateDoc(doc(db, "blogs", id), { views: increment(1) }).catch(e=>{});
                                    vid.removeEventListener('timeupdate', vid._viewTimerFn);
                                }
                            };
                            vid.addEventListener('timeupdate', vid._viewTimerFn);
                        }
                    } else {
                        vid.pause();
                        vid.currentTime = 0;
                    }
                });
            }, { threshold: 0.6 }); // Play when 60% is visible

            videos.forEach(vid => {
                observer.observe(vid);
                vid.addEventListener('click', () => { if (vid.paused) vid.play(); else vid.pause(); });
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        currentUserFollowing = userDoc.data().following || [];
                    }
                } catch(e) { console.error("Error loading following list:", e); }
            } else {
                currentUserFollowing = [];
            }
            loadFlicks();
        });

        window.openFlickComments = function() {
            const panel = document.getElementById('flicks-comments-panel');
            if (!panel) return;
            panel.style.display = 'flex';
            setTimeout(() => {
                panel.style.transform = 'translateY(0)';
            }, 10);
            renderFlickComments();
        }

        function closeFlickComments() {
            const panel = document.getElementById('flicks-comments-panel');
            if (!panel) return;
            panel.style.transform = 'translateY(100%)';
            setTimeout(() => panel.style.display = 'none', 300);
        }
        
        async function parseMentions(text) {
            const mentionRegex = /@([\w_]+)/g;
            const mentions = [...new Set([...text.matchAll(mentionRegex)].map(m => m[1].toLowerCase()))];
            let mentionedUids = [];
            let mentionMap = {};
            if (mentions.length > 0) {
                const q = query(collection(db, "users"), where("usernameLower", "in", mentions.slice(0, 30)));
                const usersSnap = await getDocs(q);
                usersSnap.forEach(d => {
                    mentionedUids.push(d.id);
                    mentionMap[d.data().usernameLower] = d.id;
                });
            }
            return { mentionedUids, mentionMap };
        }

        const renderMentionsText = (text, mentionMap) => {
            let safeText = (text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
            if (mentionMap) {
                return safeText.replace(/@([\w_]+)/g, (match, username) => {
                    const uid = mentionMap[username.toLowerCase()];
                    if (uid) return `<a href="profile.html?uid=${uid}" class="mention-link" onclick="event.stopPropagation();">${match}</a>`;
                    return match;
                });
            }
            return safeText;
        };

        window.handleFlickMentionInput = async function(e, dropdownId) {
            const input = e.target;
            const text = input.value;
            const cursorPosition = input.selectionStart;
            const currentWord = text.substring(0, cursorPosition).split(/\s+/).pop();
            const dropdown = document.getElementById(dropdownId);
            if (!dropdown) return;
            
            if (currentWord.startsWith('@') && currentWord.length > 1) {
                const searchTerm = currentWord.substring(1).toLowerCase();
                if (window.flickMentionTimer) clearTimeout(window.flickMentionTimer);
                window.flickMentionTimer = setTimeout(async () => {
                    const q = query(collection(db, "users"), where("usernameLower", ">=", searchTerm), where("usernameLower", "<=", searchTerm + "\uf8ff"), limit(5));
                    const snap = await getDocs(q);
                    if (snap.empty) { dropdown.style.display = 'none'; return; }
                    dropdown.innerHTML = '';
                    snap.forEach(docSnap => {
                        const u = docSnap.data();
                        const div = document.createElement('div');
                        div.className = 'mention-item';
                        div.innerHTML = `<img src="${u.photoURL || 'game-logo.png'}" style="width:25px;height:25px;border-radius:50%;"><div style="font-size:0.85rem;"><strong>${u.name||'User'}</strong> <span style="color:#aaa;">@${u.username}</span></div>`;
                        div.onclick = (event) => {
                            event.stopPropagation();
                            const replaceText = `@${u.username} `;
                            input.value = text.substring(0, cursorPosition - currentWord.length) + replaceText + text.substring(cursorPosition);
                            dropdown.style.display = 'none';
                            input.focus();
                        };
                        dropdown.appendChild(div);
                    });
                    dropdown.style.display = 'block';
                }, 300);
            } else {
                dropdown.style.display = 'none';
            }
        };

        async function renderFlickComments() {
            const panel = document.getElementById('flicks-comments-panel');
            const flick = flicks.find(f => f.id === currentFlickId);
            if (!flick || !panel) return;
            
            const user = auth.currentUser;
            const comments = flick.comments || [];
            const sortedComments = [...comments].sort((a, b) => new Date(b.date) - new Date(a.date));

            panel.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #333;">
                    <h3 style="margin: 0; font-size: 1.1rem; color: white;">Comments (${(flick.comments || []).length})</h3>
                    <button onclick="(${closeFlickComments.toString()})()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
                </div>
                <div id="flicks-comments-list" style="flex: 1; overflow-y: auto; padding: 20px; color: white;">
                    ${sortedComments.map(c => {
                        const isOwner = user && c.userUid === user.uid;
                        const isLiked = user && (c.likes || []).includes(user.uid);
                        const authorLiked = (c.likes || []).includes(flick.authorUid);
                        const authorLikeBadge = authorLiked ? `<span class="author-liked-badge"><img src="${flick.authorPhoto || 'game-logo.png'}"> Liked by author</span>` : '';
                        
                        const repliesHtml = (c.replies || []).map(r => {
                            const rIsOwner = user && r.userUid === user.uid;
                            const rIsLiked = user && (r.likes || []).includes(user.uid);
                            const rAuthorLiked = (r.likes || []).includes(flick.authorUid);
                            const rAuthorLikeBadge = rAuthorLiked ? `<span class="author-liked-badge"><img src="${flick.authorPhoto || 'game-logo.png'}"> Liked by author</span>` : '';
                            return `
                            <div class="comment-wrapper" style="margin-bottom: 12px;">
                                <img src="${r.photo || 'logo.png'}" class="comment-avatar" style="width: 28px; height: 28px;" onclick="window.location.href='profile.html?uid=${r.userUid}'">
                                <div class="comment-body">
                                    <div class="comment-header">
                                        <div>
                                            <span class="comment-author" onclick="window.location.href='profile.html?uid=${r.userUid}'">${r.author}</span>
                                            ${r.userUid === flick.authorUid ? '<span style="background: #555; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; margin-left: 4px;">Author</span>' : ''}
                                        </div>
                                        <span class="comment-date">${new Date(r.date).toLocaleDateString()} ${r.isEdited ? '<span style="font-style: italic; font-size: 0.7rem;">(edited)</span>' : ''}</span>
                                    </div>
                                    <p class="comment-text">${renderMentionsText(r.text, r.mentionMap)}</p>
                                    <div class="comment-actions">
                                        <button class="comment-action-btn" onclick="window.toggleFlickCommentLike('${c.id}', '${r.id}')" style="color: ${rIsLiked ? '#ff0050' : '#aaa'}"><i data-lucide="heart" class="${rIsLiked ? 'lucide-fill' : ''}"></i> ${(r.likes || []).length || 0}</button>
                                        ${rAuthorLikeBadge}
                                        ${rIsOwner ? `<button class="comment-action-btn" onclick="window.editFlickReply('${c.id}', '${r.id}')"><i data-lucide="pen" style="width:1em;height:1em;"></i> Edit</button> <button class="comment-action-btn" onclick="window.deleteFlickReply('${c.id}', '${r.id}')"><i data-lucide="trash-2" style="width:1em;height:1em;"></i> Delete</button>` : ''}
                                    </div>
                                </div>
                            </div>`;
                        }).join('');

                        return `
                        <div class="comment-wrapper">
                            <img src="${c.photo || 'logo.png'}" class="comment-avatar" onclick="window.location.href='profile.html?uid=${c.userUid}'">
                            <div class="comment-body">
                                <div class="comment-header">
                                    <div>
                                        <span class="comment-author" onclick="window.location.href='profile.html?uid=${c.userUid}'">${c.author}</span>
                                        ${c.userUid === flick.authorUid ? '<span style="background: #555; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; margin-left: 4px;">Author</span>' : ''}
                                    </div>
                                    <span class="comment-date">${new Date(c.date).toLocaleDateString()} ${c.isEdited ? '<span style="font-style: italic; font-size: 0.7rem;">(edited)</span>' : ''}</span>
                                </div>
                                <p class="comment-text">${renderMentionsText(c.text, c.mentionMap)}</p>
                                <div class="comment-actions">
                                    <button class="comment-action-btn" onclick="window.toggleFlickCommentLike('${c.id}')" style="color: ${isLiked ? '#ff0050' : '#aaa'}"><i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-heart"></i> ${(c.likes || []).length || 0}</button>
                                    <button class="comment-action-btn" onclick="document.getElementById('flick-reply-container-${c.id}').style.display='flex'">Reply</button>
                                    ${authorLikeBadge}
                                    ${isOwner ? `<button class="comment-action-btn" onclick="window.editFlickComment('${c.id}')">Edit</button> <button class="comment-action-btn" onclick="window.deleteFlickComment('${c.id}')">Delete</button>` : ''}
                                </div>
                                
                                <div id="flick-reply-container-${c.id}" class="reply-input-container">
                                    <div id="flick-reply-dropdown-${c.id}" class="mention-dropdown" style="bottom: 100%;"></div>
                                    <input type="text" id="flick-reply-input-${c.id}" placeholder="Add a reply..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #444; background: #222; color: white; font-size: 0.9rem;" oninput="window.handleFlickMentionInput(event, 'flick-reply-dropdown-${c.id}')" autocomplete="off">
                                    <button onclick="window.submitFlickReply('${c.id}')" style="background: #0d6efd; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; border: none; cursor: pointer;">Reply</button>
                                </div>

                                ${c.replies && c.replies.length > 0 ? `<div class="reply-list">${repliesHtml}</div>` : ''}
                            </div>
                        </div>`;
                    }).join('') || '<p style="text-align:center; color:#aaa;">No comments yet.</p>'}
                </div>
                ${user ? `
                <div style="padding: 15px; border-top: 1px solid #333; position: relative;">
                    <div id="flicks-main-mention-dropdown" class="mention-dropdown" style="bottom: 100%;"></div>
                    <div style="display: flex; gap: 12px;">
                        <img src="${user.photoURL || 'logo.png'}" class="comment-avatar">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                            <input type="text" id="flicks-comment-input" placeholder="Add a comment..." style="width: 100%; padding: 12px 16px; border-radius: 24px; border: 1px solid #444; background: #222; color: white; font-size: 0.95rem; box-sizing: border-box;" oninput="window.handleFlickMentionInput(event, 'flicks-main-mention-dropdown')" autocomplete="off">
                            <div style="display: flex; justify-content: flex-end;">
                                <button onclick="window.addFlickComment()" style="background: #0d6efd; color: white; padding: 8px 20px; border-radius: 24px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem;">Comment</button>
                            </div>
                        </div>
                    </div>
                </div>
                ` : `
                <div style="padding: 15px; border-top: 1px solid #333; text-align: center;">
                    <p style="color:#aaa; margin: 0;">Please <a href="index.html" style="color:#0d6efd; text-decoration: none;">login</a> to comment.</p>
                </div>
                `}
            `;
        }

        window.addFlickComment = async function() {
            if (!auth.currentUser) { alert("Please login to comment!"); return; }
            const input = document.getElementById('flicks-comment-input');
            const text = input.value.trim();
            if (!text) return;
            const flick = flicks.find(f => f.id === currentFlickId);
            if (!flick) return;

            const { mentionedUids, mentionMap } = await parseMentions(text);
            const newComment = {
                id: Date.now().toString(), author: auth.currentUser.displayName || "User", userUid: auth.currentUser.uid,
                photo: auth.currentUser.photoURL || "logo.png", text, date: new Date().toISOString(),
                likes: [], replies: [], mentionedUids, mentionMap
            };

            if (!flick.comments) flick.comments = [];
            flick.comments.push(newComment);
            document.getElementById(`comment-count-${flick.id}`).innerText = flick.comments.length;
            renderFlickComments();
            try { await updateDoc(doc(db, "blogs", flick.id), { comments: arrayUnion(newComment) }); } catch(e) { console.error(e); }
        };

        window.submitFlickReply = async function(commentId) {
            if (!auth.currentUser) return;
            const flick = flicks.find(f => f.id === currentFlickId);
            const input = document.getElementById(`flick-reply-input-${commentId}`);
            const text = input.value.trim();
            if (!text || !flick) return;
            const { mentionedUids, mentionMap } = await parseMentions(text);
            const newReply = {
                id: Date.now().toString(), author: auth.currentUser.displayName || "User", userUid: auth.currentUser.uid,
                photo: auth.currentUser.photoURL || "logo.png", text, date: new Date().toISOString(),
                likes: [], mentionedUids, mentionMap
            };
            const c = flick.comments.find(x => x.id === commentId);
            if (!c) return;
            if (!c.replies) c.replies = [];
            c.replies.push(newReply);
            renderFlickComments();
            try { await updateDoc(doc(db, "blogs", flick.id), { comments: flick.comments }); } catch(e) { console.error(e); }
        };

        window.toggleFlickCommentLike = async function(commentId, replyId = null) {
            if (!auth.currentUser) { alert("Please login to like"); return; }
            const flick = flicks.find(f => f.id === currentFlickId);
            const uid = auth.currentUser.uid;
            const c = flick.comments.find(x => x.id === commentId);
            let target = replyId ? c?.replies?.find(x => x.id === replyId) : c;
            if (!target) return;
            
            if (!target.likes) target.likes = [];
            const idx = target.likes.indexOf(uid);
            if (idx === -1) target.likes.push(uid); else target.likes.splice(idx, 1);
            renderFlickComments();
            try { await updateDoc(doc(db, "blogs", flick.id), { comments: flick.comments }); } catch(e) { console.error(e); }
        };

        window.editFlickComment = async function(commentId) {
            const flick = flicks.find(f => f.id === currentFlickId);
            const c = flick.comments.find(x => x.id === commentId);
            if (!c || c.userUid !== auth.currentUser.uid) return;
            const newText = prompt("Edit your comment:", c.text);
            if (newText && newText.trim() !== c.text) {
                c.text = newText.trim(); c.isEdited = true; renderFlickComments();
                try { await updateDoc(doc(db, "blogs", flick.id), { comments: flick.comments }); } catch(e) { console.error(e); }
            }
        };
        window.deleteFlickComment = async function(commentId) {
            if (!confirm("Delete this comment?")) return;
            const flick = flicks.find(f => f.id === currentFlickId);
            flick.comments = flick.comments.filter(x => x.id !== commentId); 
            document.getElementById(`comment-count-${flick.id}`).innerText = flick.comments.length;
            renderFlickComments();
            try { await updateDoc(doc(db, "blogs", flick.id), { comments: flick.comments }); } catch(e) { console.error(e); }
        };
        window.editFlickReply = async function(commentId, replyId) {
            const flick = flicks.find(f => f.id === currentFlickId);
            const c = flick.comments.find(x => x.id === commentId);
            const r = c?.replies?.find(x => x.id === replyId);
            if (!r || r.userUid !== auth.currentUser.uid) return;
            const newText = prompt("Edit your reply:", r.text);
            if (newText && newText.trim() !== r.text) {
                r.text = newText.trim(); r.isEdited = true; renderFlickComments();
                try { await updateDoc(doc(db, "blogs", flick.id), { comments: flick.comments }); } catch(e) { console.error(e); }
            }
        };
        window.deleteFlickReply = async function(commentId, replyId) {
            if (!confirm("Delete this reply?")) return;
            const flick = flicks.find(f => f.id === currentFlickId);
            const c = flick.comments.find(x => x.id === commentId);
            if (c) c.replies = c.replies.filter(x => x.id !== replyId); renderFlickComments();
            try { await updateDoc(doc(db, "blogs", flick.id), { comments: flick.comments }); } catch(e) { console.error(e); }
        };

        // Add a global click listener to close mention dropdowns when clicking outside
        document.addEventListener('click', function(event) {
            const isMentionInput = event.target.matches('input[oninput*="handleFlickMentionInput"]');
            const isMentionDropdown = event.target.closest('.mention-dropdown');

            // If the click is not on a mention input or within a mention dropdown, hide all dropdowns
            if (!isMentionInput && !isMentionDropdown) {
                document.querySelectorAll('.mention-dropdown').forEach(d => d.style.display = 'none');
            }
        });

        const getConversationId = (uid1, uid2) => uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;

        window.openSendFlickModal = async (flickId) => {
            if (!auth.currentUser) { alert("Please login to send Flicks!"); return; }
            const modal = document.getElementById('send-flick-modal');
            const list = document.getElementById('send-flick-user-list');
            modal.style.display = 'flex';
            list.innerHTML = '<p style="text-align:center; color:#aaa;">Loading...</p>';

            try {
                if (currentUserFollowing.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color:#aaa;">You are not following anyone to send this to.</p>';
                    return;
                }
                list.innerHTML = '';
                const promises = currentUserFollowing.map(uid => getDoc(doc(db, "users", uid)));
                const snaps = await Promise.all(promises);

                snaps.forEach(snap => {
                    if (snap.exists()) {
                        const u = snap.data();
                        const div = document.createElement('div');
                        div.style.cssText = "display:flex; align-items:center; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1);";
                        div.innerHTML = `
                            <div style="display:flex; align-items:center; gap:10px;">
                                <img src="${u.photoURL || 'logo.png'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                                <div><strong style="color:#fff;">${u.name || 'User'}</strong><br><span style="font-size:0.8rem; color:#aaa;">@${u.username || ''}</span></div>
                            </div>
                            <button class="btn" style="padding:5px 15px; background: transparent; border: 1px solid #0d6efd; color: #0d6efd; border-radius: 5px;" onclick="window.sendFlickToUser('${flickId}', '${snap.id}', this)">Send</button>
                        `;
                        list.appendChild(div);
                    }
                });
            } catch(e) { console.error(e); list.innerHTML = '<p style="color:red;">Error loading users.</p>'; }
        };

        window.sendFlickToUser = async (flickId, targetUid, btnElement) => {
            const flick = flicks.find(f => f.id === flickId);
            if (!flick || !auth.currentUser) return;
            btnElement.innerText = "Sending...";
            btnElement.disabled = true;
            const conversationId = getConversationId(auth.currentUser.uid, targetUid);
            const convRef = doc(db, "conversations", conversationId);
            const messagesRef = collection(db, "conversations", conversationId, "messages");
            try {
                await addDoc(messagesRef, { type: 'flick', flickId: flick.id, videoUrl: flick.video, title: flick.title, senderUid: auth.currentUser.uid, timestamp: serverTimestamp() });
                const partnerProfileSnap = await getDoc(doc(db, "users", targetUid));
                const myProfileSnap = await getDoc(doc(db, "users", auth.currentUser.uid));
                await setDoc(convRef, { participants: [auth.currentUser.uid, targetUid], participantDetails: { [auth.currentUser.uid]: { name: myProfileSnap.data()?.name || "User", photoURL: myProfileSnap.data()?.photoURL || null }, [targetUid]: { name: partnerProfileSnap.exists() ? partnerProfileSnap.data().name : "User", photoURL: partnerProfileSnap.exists() ? partnerProfileSnap.data().photoURL : null } }, lastMessage: { text: "Sent a Flick", senderUid: auth.currentUser.uid, timestamp: serverTimestamp(), isRead: false } }, { merge: true });
                btnElement.innerText = "Sent!"; btnElement.style.background = "#198754"; btnElement.style.borderColor = "#198754"; btnElement.style.color = "white";
            } catch (e) { console.error(e); btnElement.innerText = "Error"; }
        };
    </script>
</body>
</html>
