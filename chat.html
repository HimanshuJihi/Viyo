<html lang="hi">
<head>

    <link rel="icon" href="logo.png" type="image/png">
 <!-- Modern Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <style>
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: #121212; /* Default Dark Mode */
            color: #fff;
            transition: background 0.3s, color 0.3s;
        }
        .lucide { width: 1.2em; height: 1.2em; vertical-align: middle; stroke-width: 2; }
        .lucide-fill { fill: currentColor; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const observer = new MutationObserver((mutations) => {
                if (mutations.some(m => m.addedNodes.length > 0)) {
                    observer.disconnect();
                    lucide.createIcons();
                    observer.observe(document.body, { childList: true, subtree: true });
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .container {
            max-width: 600px; /* Optimized for chat screen */
            margin: 20px auto;
            padding: 20px 15px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            height: calc(100vh - 40px); /* Full viewport height minus margin */
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            position: relative;
            z-index: 100;
        }
        .chat-header .profile-pic {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #87ceeb;
            cursor: pointer;
        }
        .chat-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: #87ceeb;
        }
        .chat-header .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
        }
        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px; /* For scrollbar space */
            margin-bottom: 15px;
        }
        .message-item {
            display: flex;
            margin-bottom: 10px;
            align-items: center; /* Align button and message bubble */
            position: relative; /* For picker positioning */
        }
        .message-text {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .message-text img {
            max-width: 100%;
            border-radius: 10px;
            cursor: pointer;
        }
        .message-text .youtube-embed {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            border-radius: 10px;
        }
        .message-text .youtube-embed iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .message-sent {
            justify-content: flex-end;
        }
        .message-sent .message-text {
            background-color: #6366f1; /* Modern Indigo for sent messages */
            color: white;
            border-bottom-right-radius: 2px;
        }
        .message-received {
            justify-content: flex-start;
        }
        .message-received .message-text {
            background-color: rgba(255, 255, 255, 0.15); /* Lighter grey for received */
            color: white;
            border-bottom-left-radius: 2px;
        }
        .message-time {
            display: inline-block;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.6);
            float: right;
            margin-top: 8px;
            margin-left: 12px;
            line-height: 1;
        }
        body.light-mode .message-time {
            color: rgba(0, 0, 0, 0.5);
        }
        .message-date-separator {
            text-align: center;
            margin: 15px 0;
            font-size: 0.8rem;
            color: #aaa;
        }
        .message-date-separator span {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
        }
        body.light-mode .message-date-separator span {
            background: rgba(0, 0, 0, 0.05);
            color: #555;
        }
        .edit-msg-btn {
            background: none; border: none; color: #aaa; font-size: 0.9rem; cursor: pointer; padding: 0 8px; opacity: 0; transition: opacity 0.2s;
        }
        .message-sent:hover .edit-msg-btn {
            opacity: 1;
        }
        .edited-indicator {
            font-size: 0.7rem;
            color: #bbb;
        }
        .delete-msg-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 8px;
            opacity: 0; /* Hide by default */
            transition: opacity 0.2s;
        }
        .message-sent:hover .delete-msg-btn {
            opacity: 1; /* Show on hover */
        }
        .forward-msg-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 8px;
            opacity: 0;
            transition: opacity 0.2s;
            align-self: center; /* Center it vertically */
        }
        .message-item:hover .forward-msg-btn { opacity: 1; }
        .message-input-area {
            display: flex;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
        }
        .message-input-area #send-message-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message-input-area #send-message-btn:hover {
            transform: scale(1.1);
        }
        /* Light Mode */
        body.light-mode { background: #f4f7f6; color: #333; }
        body.light-mode .container { background: #fff; border-color: #ddd; }
        body.light-mode .chat-header h2 { color: #0d6efd; }
        body.light-mode .chat-header .back-btn { color: #333; }
        body.light-mode .chat-messages { border-color: #eee; }
        body.light-mode .message-received .message-text { background-color: #e9ecef; color: #333; }
        body.light-mode .message-input-area input { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
        body.light-mode .message-input-area #attach-btn { color: #555; }
        body.light-mode .message-input-area #send-message-btn { color: #333; }
        body.light-mode .edit-msg-btn {
            color: #888;
        }
        body.light-mode .delete-msg-btn {
            color: #888;
        }
        body.light-mode .edited-indicator { color: #666; }
        body.light-mode .forward-msg-btn { color: #888; }
    body.light-mode .btn-transparent { color: #333 !important; }
        body.light-mode #forward-modal > div { background: #fff; border-color: #ddd; color: #333; }
        body.light-mode #forward-modal-title { color: #0d6efd; }
        body.light-mode #forward-user-list > div { border-bottom-color: #eee; }
        body.light-mode #forward-user-list strong { color: #000; }
        body.light-mode #edit-message-modal > div { background: #fff !important; border-color: #ddd !important; }
        body.light-mode #edit-message-input { background: #f4f7f6 !important; color: #333 !important; border-color: #ccc !important; }
        /* Reaction Styles */
        .reaction-picker {
            position: absolute;
            top: -20px;
            background: #3a3a3a;
            border-radius: 15px;
            padding: 2px 4px;
            display: none;
            gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .message-sent .reaction-picker { right: 10px; }
        .message-received .reaction-picker { left: 10px; }
        .message-item:hover .reaction-picker { display: flex; }
        .reaction-picker span {
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0 3px;
            transition: transform 0.1s;
        }
        .reaction-picker span:hover { transform: scale(1.3); }

        .reactions-display { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
        .reaction-pill { background: rgba(255, 255, 255, 0.15); border-radius: 10px; padding: 2px 8px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; transition: background 0.2s; }
        .reaction-pill.user-reacted { background: #6366f1; border: 1px solid #a855f7; }
        
        /* Light mode reactions */
        body.light-mode .reaction-picker { background: #fff; border: 1px solid #ccc; }
        body.light-mode .reaction-pill { background: #e9ecef; }
        body.light-mode .reaction-pill.user-reacted { background: #0d6efd; color: white; border-color: #0d6efd; }
        body.light-mode .edited-indicator { color: #666; }
        /* Rich Link Preview Styles */
        .link-preview { border-left: 3px solid #555; padding-left: 10px; margin-top: 8px; }
        .link-preview a { text-decoration: none; color: inherit; display: block; }
        .link-preview-image { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px 8px 0 0; }
        .link-preview-content { padding: 8px; background: rgba(0,0,0,0.2); border-radius: 0 0 8px 8px; }
        .link-preview-title { font-weight: bold; font-size: 0.9rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .link-preview-desc { font-size: 0.8rem; color: #ccc; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 4px 0; }
        .link-preview-sitename { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
        body.light-mode .link-preview { border-left-color: #ccc; }
        body.light-mode .link-preview-content { background: rgba(0,0,0,0.05); }

        /* Story Reply Preview Styles */
        .story-reply-preview {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            border-left: 3px solid #ff69b4; /* Instagram like pink/purple border */
        }
        .story-reply-preview.text-only { display: block; padding: 5px 10px; cursor: default; }
        body.light-mode .story-reply-preview { background: rgba(0,0,0,0.05); }
        .story-reply-preview img {
            width: 35px; height: 35px; object-fit: cover; border-radius: 4px; margin-right: 10px; border: none !important;
        }

        /* Lightbox styles copied from index.html */
        .lightbox-modal { display: none; position: fixed; z-index: 2000; padding-top: 50px; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .lightbox-content { margin: auto; display: block; max-width: 90%; max-height: 90vh; object-fit: contain; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: #f1f1f1; font-size: 40px; font-weight: bold; transition: 0.3s; cursor: pointer; z-index: 2001; }
        .close-lightbox:hover { color: #bbb; }
        .read-receipt {
            font-size: 0.7rem;
        }
        body.light-mode .read-receipt {
            color: rgba(0,0,0,0.5) !important;
        }

        /* Theme Dropdown Styles */
        .theme-dropdown-container { position: relative; display: inline-block; }
        .theme-dropdown { position: absolute; top: 100%; right: 0; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 10px; display: none; flex-direction: column; gap: 8px; z-index: 1000; min-width: 160px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 10px; }
        .theme-dropdown.show { display: flex; animation: slideUp 0.2s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .theme-option { padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; font-weight: bold; text-align: left; display: flex; align-items: center; gap: 10px; transition: transform 0.2s, box-shadow 0.2s; font-family: inherit; font-size: 0.9rem; }
        .theme-option:hover { transform: scale(1.05); }
        .theme-option.active { border: 2px solid #f59e0b; box-shadow: 0 0 12px rgba(245, 158, 11, 0.4); transform: scale(1.02); }

        .btn-transparent { position: relative; z-index: 1; border: none !important; background: transparent !important; color: #fff !important; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .theme-btn { position: relative; z-index: 1; border: none !important; background: transparent !important; color: #fff !important; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn-transparent::before, .theme-btn::before { content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0; border-radius: 30px; padding: 1.5px; background: linear-gradient(45deg, #00f3ff, #b5179e); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; z-index: -1; pointer-events: none; }
        .btn-transparent:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(0, 243, 255, 0.3); }

        /* 5 New Futuristic Themes */
        body.cyberpunk-mode { background: radial-gradient(circle at top right, #3a0ca3, #050505); color: #ff007c; }
        body.cyberpunk-mode .container { border-color: rgba(255, 0, 124, 0.2); }
        body.cyberpunk-mode .message-sent .message-text { background-color: #f72585; }
        body.cyberpunk-mode .chat-header h2 { color: #ff007c; }
        
        body.matrix-mode { background: radial-gradient(circle at top, #003300, #050505); color: #00ff41; }
        body.matrix-mode .container { border-color: rgba(0, 255, 65, 0.2); }
        body.matrix-mode .message-sent .message-text { background-color: #008f11; color: #00ff41; }
        body.matrix-mode .chat-header h2 { color: #00ff41; }
        
        body.ocean-mode { background: radial-gradient(circle at top left, #0077b6, #050505); color: #90e0ef; }
        body.ocean-mode .message-sent .message-text { background-color: #0077b6; }
        body.ocean-mode .chat-header h2 { color: #00e5ff; }
        
        body.dracula-mode { background: #282a36; color: #f8f8f2; }
        body.dracula-mode .message-sent .message-text { background-color: #bd93f9; }
        body.dracula-mode .chat-header h2 { color: #ff79c6; }
        
        body.solar-mode { background: radial-gradient(circle at center, #370617, #03071e); color: #ffba08; }
        body.solar-mode .message-sent .message-text { background-color: #dc2f02; }
        body.solar-mode .chat-header h2 { color: #ffb703; }
    </style>

<body>
    <div class="container">
        <div class="chat-header">
        <button class="back-btn btn-transparent" style="padding: 5px 12px; border-radius: 5px;" onclick="window.history.back()"><i data-lucide="arrow-left"></i></button>
            <img id="chat-partner-pic" src="https://via.placeholder.com/40" class="profile-pic" onclick="window.viewPartnerProfile()">
            <div style="flex-grow: 1;">
                <h2 id="chat-partner-name">Loading User...</h2>
                <p id="chat-partner-status" style="font-size: 0.8rem; color: #aaa; margin: 0; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
            </div>
            <div class="theme-dropdown-container">
                <button type="button" id="theme-toggle" class="btn theme-btn" style="padding: 8px 12px; width: auto;"><i data-lucide="palette"></i></button>
                <div id="theme-dropdown" class="theme-dropdown">
                    <button type="button" class="theme-option" data-theme="dark" style="background: #050505; color: #e2e8f0;"><i data-lucide="moon" style="width: 16px;"></i> Dark</button>
                    <button type="button" class="theme-option" data-theme="light" style="background: #f4f7f6; color: #333;"><i data-lucide="sun" style="width: 16px;"></i> Light</button>
                    <button type="button" class="theme-option" data-theme="cyberpunk" style="background: #120422; color: #ff007c;"><i data-lucide="zap" style="width: 16px;"></i> Cyber</button>
                    <button type="button" class="theme-option" data-theme="matrix" style="background: #0a140a; color: #00ff41;"><i data-lucide="terminal" style="width: 16px;"></i> Matrix</button>
                    <button type="button" class="theme-option" data-theme="ocean" style="background: #021024; color: #00e5ff;"><i data-lucide="droplet" style="width: 16px;"></i> Ocean</button>
                    <button type="button" class="theme-option" data-theme="dracula" style="background: #282a36; color: #ff79c6;"><i data-lucide="ghost" style="width: 16px;"></i> Dracula</button>
                    <button type="button" class="theme-option" data-theme="solar" style="background: #2a0800; color: #ffb703;"><i data-lucide="sun-dim" style="width: 16px;"></i> Solar</button>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be dynamically loaded here by JavaScript -->
            <div id="loading-messages" style="text-align: center; padding: 20px; color: #aaa;">Loading messages...</div>
        </div>

        <div id="typing-indicator" style="height: 20px; color: #aaa; font-style: italic; padding-left: 10px; display: none; transition: opacity 0.3s;"></div>

        <div class="message-input-area">
        <button id="attach-btn" class="btn-transparent" title="Send Image or PDF" style="padding: 5px; border-radius: none; display: flex; align-items: center; justify-content: center;"><img src="attach-icon.png" alt="Attach" style="width: 34px; height: 34px;"></button>
            <input type="file" id="image-input-chat" style="display: none;" accept="image/*,application/pdf">
            <input type="text" id="message-input" placeholder="Type your message..." style="flex-grow: 1; padding: 10px 15px; border: none; background: rgba(255, 255, 255, 0.1); color: white; font-size: 1rem;">
        <button id="send-message-btn" class="btn-transparent" style="padding: 5px; border-radius: 5px; display: flex; align-items: center; justify-content: center;"><img src="send-icon.png" alt="Send" style="width: 34px; height: 34px;"></button>
        </div>

    <!-- Lightbox Modal for images -->
    <div id="lightbox-modal" class="lightbox-modal" onclick="if(event.target === this) window.closeLightbox()">
        <span class="close-lightbox" onclick="window.closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <!-- User List Modal (for forwarding message) -->
    <div id="forward-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; flex-direction:column; align-items:center; justify-content:center;" onclick="if(event.target === this) this.style.display='none'">
        <div style="width:90%; max-width:400px; background:#1e1e1e; border: 1px solid #444; border-radius:12px; padding:20px; max-height:70vh; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                
                <h3 id="forward-modal-title" style="margin:0; color:gold;">Forward to...</h3>
                <button onclick="document.getElementById('forward-modal').style.display='none'" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <div id="forward-user-list" style="overflow-y:auto; flex:1;">Loading...</div>

    <!-- Edit Message Modal -->
    <div id="edit-message-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; flex-direction:column; align-items:center; justify-content:center;" onclick="if(event.target === this) this.style.display='none'">
        <div style="width:90%; max-width:400px; background:#1e1e1e; border: 1px solid #444; border-radius:12px; padding:20px; display:flex; flex-direction:column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom: 1px solid #333; padding-bottom: 10px;">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, setDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, updateDoc, deleteDoc, getDocs, limit, deleteField, arrayUnion, arrayRemove, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let partnerUid = null;
        let conversationId = null;
        let unsubscribe = null; // To stop listening to messages on page leave
        let unsubscribeConv = null; // To stop listening to conversation doc
        let typingTimeout = null;
        let messagesCache = new Map();
        let unreadBatch = null;
        let messageToForward = null;
        let lastMessageDate = null;
        let currentEditMessageId = null;
        const TYPING_TIMEOUT_DURATION = 2000; // 2 seconds

        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-message-btn');
        const attachBtn = document.getElementById('attach-btn');
        const imageInput = document.getElementById('image-input-chat');

        // Theme Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeDropdown = document.getElementById('theme-dropdown');
        const body = document.body;

        function applyTheme(theme) {
            body.classList.remove('light-mode', 'cyberpunk-mode', 'matrix-mode', 'ocean-mode', 'dracula-mode', 'solar-mode');
            if (theme && theme !== 'dark') {
                body.classList.add(theme + '-mode');
            }
            localStorage.setItem('theme', theme || 'dark');
            if (window.lucide) window.lucide.createIcons();

            document.querySelectorAll('.theme-option').forEach(btn => {
                if (btn.getAttribute('data-theme') === (theme || 'dark')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        applyTheme(localStorage.getItem('theme') || 'dark');

        themeToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeDropdown.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!themeToggleBtn.contains(e.target) && !themeDropdown.contains(e.target)) {
                themeDropdown.classList.remove('show');
            }
        });

        document.querySelectorAll('.theme-option').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const newTheme = btn.getAttribute('data-theme');
                applyTheme(newTheme);
                themeDropdown.classList.remove('show');

                if (auth.currentUser) {
                    try {
                        const userRef = doc(db, "users", auth.currentUser.uid);
                        await setDoc(userRef, { theme: newTheme }, { merge: true });
                    } catch (e) {
                        console.error("Error saving theme preference:", e);
                    }
                }
            });
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const urlParams = new URLSearchParams(window.location.search);
                partnerUid = urlParams.get('uid');

                if (!partnerUid) {
                    alert("No user specified to chat with.");
                    window.location.href = 'messages.html';
                    return;
                }

                // --- Block Check ---
                try {
                    const myDocSnap = await getDoc(doc(db, "users", currentUser.uid));
                    const partnerDocSnap = await getDoc(doc(db, "users", partnerUid));
                    if (myDocSnap.exists() && partnerDocSnap.exists()) {
                        const myData = myDocSnap.data();
                        const iHaveBlocked = myData.blockedUsers && myData.blockedUsers.includes(partnerUid);
                        const iAmBlocked = myData.blockedBy && myData.blockedBy.includes(partnerUid);

                        if (iHaveBlocked || iAmBlocked) {
                            document.getElementById('chat-messages').innerHTML = `<div style="text-align:center; color:#aaa; padding: 40px 20px;">${iHaveBlocked ? 'You have blocked this user.' : 'You cannot reply to this conversation.'}</div>`;
                            document.querySelector('.message-input-area').style.display = 'none';
                            document.getElementById('loading-messages').style.display = 'none';
                            loadPartnerProfile(); // Still load their name/pic
                            return; // Stop further execution (listening for messages)
                        }
                    if (iHaveBlocked || iAmBlocked) {
                        const message = iHaveBlocked ? 'You have blocked this user. Unblock them from their profile to send messages.' : 'You cannot reply to this conversation.';
                        document.querySelector('.container').innerHTML = `<div class="chat-header"><button class="back-btn btn-transparent" style="padding: 5px 12px; border-radius: 5px;" onclick="window.history.back()">&#8592;</button></div><div style="text-align:center; color:#aaa; padding: 40px 20px;">${message}</div>`;
                        return; // Stop further execution
                    }
                    }
                } catch (e) {
                    console.error("Error checking block status:", e);
                    // Proceed with caution if block check fails
                }
                // --- End Block Check ---

                conversationId = getConversationId(currentUser.uid, partnerUid);
                
                try {
                    const userDocSnap = await getDoc(doc(db, "users", user.uid));
                    if (userDocSnap.exists() && userDocSnap.data().theme) {
                        applyTheme(userDocSnap.data().theme);
                    }
                } catch(e) { console.error("Error loading theme:", e); }

                loadPartnerProfile();
                listenForConversationUpdates();
                listenForMessages();
                setupTypingListener();
            } else {
                alert("Please login to chat.");
                window.location.href = 'index.html';
            }
        });

        function getConversationId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        async function loadPartnerProfile() {
            const userDoc = await getDoc(doc(db, "users", partnerUid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                document.getElementById('chat-partner-name').innerText = userData.name || "User";
                document.getElementById('chat-partner-pic').src = userData.photoURL || 'https://via.placeholder.com/40';
                const statusEl = document.getElementById('chat-partner-status');
                if (userData.statusMessage) {
                    statusEl.innerText = `"${userData.statusMessage}"`;
                } else {
                    statusEl.innerText = '';
                }
            }
        }

        window.viewPartnerProfile = () => { if(partnerUid) window.location.href = `profile.html?uid=${partnerUid}`; };

        function listenForConversationUpdates() {
            const convRef = doc(db, "conversations", conversationId);
            unsubscribeConv = onSnapshot(convRef, (docSnap) => {
                if (docSnap.exists()) {
                    const convData = docSnap.data();
                    // NEW: Reliable Typing indicator logic using timestamps
                    const partnerTypingTimestamp = convData.typingStatus ? convData.typingStatus[partnerUid] : null;
                    const typingIndicator = document.getElementById('typing-indicator');

                    // Check if the timestamp is recent (e.g., within the last 3 seconds)
                    const isPartnerTyping = partnerTypingTimestamp && (Date.now() - partnerTypingTimestamp.toMillis() < 3000);

                    if (isPartnerTyping) {
                        const partnerName = (document.getElementById('chat-partner-name').innerText || 'User').split(' ')[0];
                        typingIndicator.innerText = `${partnerName} is typing...`; // Corrected template literal
                        typingIndicator.style.display = 'block';
                    } else {
                        typingIndicator.style.display = 'none';
                    }

                    // Mark as read logic
                    markAsRead(convData);
                }
            });
        }

        function listenForMessages() {
            const messagesRef = collection(db, "conversations", conversationId, "messages");
            const q = query(messagesRef, orderBy("timestamp", "asc"));

            unsubscribe = onSnapshot(q, (snapshot) => {
                if (document.hidden) return; // Don't process if tab is not visible

                const loadingIndicator = document.getElementById('loading-messages');
                if (loadingIndicator) {
                    loadingIndicator.style.display = 'none';
                }

                const batch = writeBatch(db);
                let hasUnread = false;

                snapshot.docChanges().forEach(change => {
                    const messageId = change.doc.id;
                    const messageData = change.doc.data();
                    messagesCache.set(messageId, messageData);

                    if (change.type === "added") {
                        renderMessage(messageId, messageData);
                        if (messageData.senderUid === partnerUid && !messageData.isRead) {
                            batch.update(change.doc.ref, { isRead: true });
                            hasUnread = true;
                        }
                    } else if (change.type === "modified") {
                        // Re-render the specific message that was modified (e.g., reaction added, link preview)
                        const existingMsgEl = document.getElementById(`msg-${messageId}`);
                        if (existingMsgEl) {
                            const scrollPos = chatMessages.scrollTop;
                            const isAtBottom = chatMessages.scrollHeight - chatMessages.clientHeight <= chatMessages.scrollTop + 1;
                            
                            const newMsgEl = renderMessage(messageId, messageData, true); // Get new element
                            existingMsgEl.replaceWith(newMsgEl); // Replace in DOM

                            if (isAtBottom) {
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            } else {
                                chatMessages.scrollTop = scrollPos;
                            }
                        }
                    } else if (change.type === "removed") {
                        const msgEl = document.getElementById(`msg-${messageId}`);
                        if (msgEl) msgEl.remove();
                    }
                });

                if (hasUnread) {
                    batch.commit().catch(e => console.error("Error marking messages as read:", e));
                }

                // Only scroll if a new message was added
                if (snapshot.docChanges().some(c => c.type === 'added')) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            });
        }

        function renderMessage(messageId, data, returnElement = false) {
            const isSent = data.senderUid === currentUser.uid;
            const messageClass = isSent ? 'message-sent' : 'message-received';
            const fifteenMinutes = 15 * 60 * 1000; // 15 minutes in milliseconds
            const messageTime = data.timestamp ? data.timestamp.toMillis() : 0;
            const canEdit = isSent && (data.type === 'text' || data.type === 'story_reply') && (Date.now() - messageTime < fifteenMinutes); // Check if message is within 15 mins
            
            // Generate Message Date Separator & Time
            let timeHtml = '';
            if (messageTime) {
                const dateObj = new Date(messageTime);
                const dateString = dateObj.toLocaleDateString();
                
                // Show Date Separator if day changes
                if (lastMessageDate !== dateString) {
                    const separatorDiv = document.createElement('div');
                    separatorDiv.className = 'message-date-separator';
                    const todayString = new Date().toLocaleDateString();
                    const displayDate = dateString === todayString ? 'Today' : dateObj.toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' });
                    separatorDiv.innerHTML = `<span>${displayDate}</span>`;
                    chatMessages.appendChild(separatorDiv);
                    lastMessageDate = dateString;
                }

                const timeString = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                let readReceiptHtml = '';
                if (isSent) {
                    if (data.isRead) {
                        readReceiptHtml = ` <span class="read-receipt" style="color: #4fc3f7;"><i data-lucide="check-check"></i></span>`;
                    } else {
                        // Single grey tick for sent but not read
                        readReceiptHtml = ` <span class="read-receipt" style="color: rgba(255,255,255,0.6);"><i data-lucide="check"></i></span>`;
                    }
                }
                timeHtml = `<span class="message-time">${timeString}${readReceiptHtml}</span>`;
            }

            // --- Reaction Picker HTML ---
            const reactionEmojis = ['❤️', '👍', '😂', '😮', '😢', '🙏'];
            const pickerHTML = `
                <div class="reaction-picker">
                    ${reactionEmojis.map(emoji => `<span onclick="window.toggleReaction('${messageId}', '${emoji}')">${emoji}</span>`).join('')}
                </div>
            `;

            // --- Reactions Display HTML ---
            let reactionsHTML = '';
            if (data.reactions && Object.keys(data.reactions).length > 0) {
                reactionsHTML += '<div class="reactions-display">';
                for (const emoji in data.reactions) {
                    const reactors = data.reactions[emoji];
                    if (reactors && reactors.length > 0) {
                        const userReactedClass = reactors.includes(currentUser.uid) ? 'user-reacted' : '';
                        reactionsHTML += `<span class="reaction-pill ${userReactedClass}" onclick="window.toggleReaction('${messageId}', '${emoji}')">${emoji}&nbsp;${reactors.length}</span>`;
                    }
                }
                reactionsHTML += '</div>';
            }

            let forwardedIndicator = data.forwarded ? '<span class="edited-indicator" style="display: block; margin-bottom: 4px;"><i>Forwarded</i></span>' : '';

            let messageContent = '';

            switch(data.type) {
                case 'image':
                    messageContent = `<img src="${data.content}" alt="Image" onclick="window.openLightbox('${data.content}')">`;
                    break;
                case 'pdf':
                    messageContent = `${forwardedIndicator}
                        <div style="display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">
                            <i data-lucide="file-text" style="color: #ff4757;"></i>
                            <a href="${data.content}" download="document.pdf" target="_blank" style="color: white; text-decoration: none; font-weight: bold;">📄 Download / View PDF</a>
                        </div>`;
                    break;
                case 'youtube':
                    messageContent = `${forwardedIndicator}
                        <div class="youtube-embed">
                            <iframe 
                                src="https://www.youtube.com/embed/${data.content}" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                            </iframe>
                        </div>`;
                    break;
                case 'story_reply':
                    let storyPreviewHtml = '';
                    if (data.storyImage) {
                        storyPreviewHtml = `<div class="story-reply-preview" onclick="window.openLightbox('${data.storyImage}')" title="View Story Image">
                            <img src="${data.storyImage}">
                            <span style="font-size:0.8rem; color:inherit; flex:1; font-style: italic;">Replied to story</span>
                        </div>`;
                    } else if (data.storyMessage) {
                        storyPreviewHtml = `<div class="story-reply-preview text-only">
                            <span style="font-size:0.75rem; color:#aaa; display:block;">Replied to story</span>
                            <span style="font-size:0.85rem; font-style:italic; color: inherit;">"${data.storyMessage}"</span>
                        </div>`;
                    }
                    const tempDivStory = document.createElement('div');
                    tempDivStory.textContent = data.content;
                    let textContentStory = tempDivStory.innerHTML.replace(/\n/g, '<br>');
                    if (data.edited) {
                        textContentStory += ' <span class="edited-indicator">(edited)</span>';
                    }
                    messageContent = forwardedIndicator + storyPreviewHtml + textContentStory;
                    break;
                case 'flick':
                    let titleHtml = data.title ? `<div style="font-size:0.85rem; font-weight:bold; margin-top: 5px;">${data.title}</div>` : '';
                    messageContent = `${forwardedIndicator}
                        <div class="story-reply-preview text-only" style="margin-bottom: 5px; cursor: pointer;" onclick="window.open('index.html?blogId=${data.flickId}', '_self')">
                            <span style="font-size:0.75rem; color:#aaa; display:block;"><i class="fa-solid fa-bolt" style="color:#ff0050;"></i> Shared a Flick</span>
                        </div>
                        <video src="${data.videoUrl}" controls style="max-width: 100%; border-radius: 8px; max-height: 250px; background: #000;"></video>
                        ${titleHtml}`;
                    break;
                case 'text':
                default:
                    // Sanitize text content to prevent HTML injection
                    const tempDiv = document.createElement('div');
                    tempDiv.textContent = data.content;
                    let textContent = tempDiv.innerHTML.replace(/\n/g, '<br>');

                    // NEW: Regex to find and wrap URLs in anchor tags for a basic preview
                    const urlRegex = /(https?:\/\/[^\s<>"']+)/g;
                    textContent = textContent.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer" style="color: #87ceeb; text-decoration: underline;">$1</a>');

                    if (data.edited) {
                        textContent += ' <span class="edited-indicator">(edited)</span>';
                    }
                    messageContent = forwardedIndicator + textContent;

                    // NEW: Render Rich Link Preview if available
                    if (data.linkPreview && data.linkPreview.url) {
                        const p = data.linkPreview;
                        messageContent += `
                            <div class="link-preview">
                                <a href="${p.url}" target="_blank" rel="noopener noreferrer">
                                    ${p.image ? `<img src="${p.image}" class="link-preview-image" alt="Preview">` : ''}
                                    <div class="link-preview-content">
                                        ${p.title ? `<div class="link-preview-title">${p.title}</div>` : ''}
                                        ${p.description ? `<div class="link-preview-desc">${p.description}</div>` : ''}
                                        ${p.siteName ? `<div class="link-preview-sitename">${p.siteName}</div>` : ''}
                                    </div>
                                </a>
                            </div>`;
                    }
                    break;
            }

            const div = document.createElement('div');
            div.className = `message-item ${messageClass}`;
            div.id = `msg-${messageId}`;
            
            let actionButtons = '';
            if (isSent) {
                let editButton = '';
                if (canEdit) {
                    editButton = `<button class="edit-msg-btn" onclick="window.showEditUI('${messageId}')" title="Edit Message"><i data-lucide="pen"></i></button>`; // Edit button
                }
                const deleteButton = `<button class="delete-msg-btn" onclick="window.confirmDeleteMessage('${messageId}')" title="Delete Message"><i data-lucide="trash-2" style="color: rgb(220, 37, 23);"></i></button>`; // Delete button
                actionButtons = editButton + deleteButton;
            }

            const forwardButton = `<button class="forward-msg-btn" onclick='window.showForwardModal("${messageId}")' title="Forward Message"><i data-lucide="corner-up-right"></i></button>`; // Forward button

            if (isSent) {
                div.innerHTML = `${pickerHTML}<div class="message-text">${messageContent}${reactionsHTML}${timeHtml}</div>${actionButtons}${forwardButton}`;
            } else {
                div.innerHTML = `${forwardButton}${pickerHTML}<div class="message-text">${messageContent}${reactionsHTML}${timeHtml}</div>`;
            }

            if (returnElement) {
                return div;
            } else {
                chatMessages.appendChild(div);
            }
        }

        function getYoutubeVideoId(url) {
            const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        window.confirmDeleteMessage = function(messageId) {
            if (confirm("Are you sure you want to delete this message? This action cannot be undone.")) {
                deleteMessage(messageId);
            }
        }

        async function deleteMessage(messageId) {
            if (!currentUser || !conversationId) return;
            const msgRef = doc(db, "conversations", conversationId, "messages", messageId);
            try {
                await deleteDoc(msgRef);
                // The UI will update automatically via the onSnapshot listener
            } catch (e) {
                console.error("Error deleting message:", e);
                alert("Failed to delete message.");
            }
        }

        window.showEditUI = function(messageId) {
            const messageData = messagesCache.get(messageId);
            if (!messageData) return;
            
            currentEditMessageId = messageId;
            document.getElementById('edit-message-input').value = messageData.content;
            document.getElementById('edit-message-modal').style.display = 'flex';
            document.getElementById('edit-message-input').focus();
        }

        document.getElementById('save-edit-btn').addEventListener('click', async () => {
            if (!currentEditMessageId || !conversationId) return;
            
            const messageData = messagesCache.get(currentEditMessageId);
            if (!messageData) return;
            
            const currentText = messageData.content;
            const newText = document.getElementById('edit-message-input').value.trim();

            if (newText !== "" && newText !== currentText) {
                const btn = document.getElementById('save-edit-btn');
                const origText = btn.innerText;
                btn.innerText = 'Saving...';
                btn.disabled = true;

                const msgRef = doc(db, "conversations", conversationId, "messages", currentEditMessageId);

                    await updateDoc(msgRef, {
                        content: newText,
                        edited: true
                    });
                    document.getElementById('edit-message-modal').style.display = 'none';
                } catch (e) {
                    console.error("Error saving edit:", e);
                    alert("Failed to save edit.");
                } finally {
                    btn.innerText = origText;
                    btn.disabled = false;
                }
            } else {
                document.getElementById('edit-message-modal').style.display = 'none';
            }
        });

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // Stop typing indicator immediately on send
            if (typingTimeout) {
                clearTimeout(typingTimeout);
                typingTimeout = null;
            }
            // No need to await this, can happen in the background
            updateTypingStatus(false);

            const videoId = getYoutubeVideoId(text);
            let messagePayload;
            let lastMessageText;

            if (videoId) {
                messagePayload = { type: 'youtube', content: videoId };
                lastMessageText = '[Video]';
            } else {
                messagePayload = { type: 'text', content: text };
                lastMessageText = text;
            }

            // Common properties
            messagePayload.senderUid = currentUser.uid;
            messagePayload.timestamp = serverTimestamp();
            messagePayload.isRead = false; // NEW: Set read status

            messageInput.value = '';

            const convRef = doc(db, "conversations", conversationId);
            const messagesRef = collection(db, "conversations", conversationId, "messages");

            // Add the message first
            await addDoc(messagesRef, messagePayload);

            // Then, update the conversation document. This is more robust.
            // It will create the document if it doesn't exist, or update it if it does.
            // It also ensures participant details are always present.
            try {
                const myProfileSnap = await getDoc(doc(db, "users", currentUser.uid));
                const partnerProfileSnap = await getDoc(doc(db, "users", partnerUid));

                if (!myProfileSnap.exists() || !partnerProfileSnap.exists()) {
                    throw new Error("Could not find user profile to update conversation.");
                }
                const myProfile = myProfileSnap.data();
                const partnerProfile = partnerProfileSnap.data();

                await setDoc(convRef, {
                    participants: [currentUser.uid, partnerUid],
                    participantDetails: {
                        [currentUser.uid]: { name: myProfile.name || "User", photoURL: myProfile.photoURL || null },
                        [partnerUid]: { name: partnerProfile.name || "User", photoURL: partnerProfile.photoURL || null }
                    },
                    lastMessage: {
                        text: lastMessageText,
                        senderUid: currentUser.uid,
                        timestamp: serverTimestamp(),
                        isRead: false
                    }
                }, { merge: true });

            } catch (e) {
                console.error("Error updating conversation document:", e);
                // The message was sent, but the conversation preview might not update.
                // This is a graceful degradation.
            }
        }

        async function markAsRead(convData) {
            if (convData && convData.lastMessage && convData.lastMessage.senderUid !== currentUser.uid && !convData.lastMessage.isRead) {
                const convRef = doc(db, "conversations", conversationId);
                await updateDoc(convRef, { "lastMessage.isRead": true });
            }
        }

        function setupTypingListener() {
            messageInput.addEventListener('input', () => {
                if (typingTimeout) {
                    clearTimeout(typingTimeout);
                } else {
                    // Only send "true" if we weren't already marked as typing
                    updateTypingStatus(true);
                }

                typingTimeout = setTimeout(() => {
                    updateTypingStatus(false);
                    typingTimeout = null;
                }, TYPING_TIMEOUT_DURATION);
            });
        }

        async function updateTypingStatus(isTyping) {
            const convRef = doc(db, "conversations", conversationId);
            try {
                // Using setDoc with merge is safer as it creates the doc if it doesn't exist
                await setDoc(convRef, {
                    typingStatus: {
                        [currentUser.uid]: isTyping ? serverTimestamp() : null
                    }
                }, { merge: true });
            } catch (e) {
                console.error("Error updating typing status:", e);
            }
        }

        // Image sending logic
        attachBtn.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Show a temporary indicator
            sendBtn.disabled = true;
            sendBtn.innerText = 'Sending...';

            try {
                let fileDataUrl;
                let messageType = 'image';
                let lastMessageText = '[Image]';

                if (file.type === 'application/pdf') {
                    if (file.size > 800 * 1024) { // 800KB limit for PDFs
                        alert("PDF file is too large! Maximum allowed size is 800KB.");
                        sendBtn.disabled = false;
                        sendBtn.innerHTML = '<img src="send-icon.png" alt="Send" style="width: 34px; height: 34px;">';
                        imageInput.value = '';
                        return;
                    }
                    fileDataUrl = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                    messageType = 'pdf';
                    lastMessageText = '[PDF Document]';
                } else {
                    fileDataUrl = await compressImage(file);
                }
                
                const messagePayload = {
                    type: messageType,
                    content: fileDataUrl,
                    senderUid: currentUser.uid,
                    isRead: false, // NEW: Set read status
                    timestamp: serverTimestamp()
                };

                const convRef = doc(db, "conversations", conversationId);
                const messagesRef = collection(db, "conversations", conversationId, "messages");
                
                await addDoc(messagesRef, messagePayload);
                await updateDoc(convRef, {
                    lastMessage: { text: lastMessageText, senderUid: currentUser.uid, timestamp: serverTimestamp(), isRead: false }
                });

            } catch (err) {
                console.error("Error sending image:", err);
                alert("Failed to send file.");
            } finally {
                sendBtn.disabled = false;
            sendBtn.innerHTML = '<img src="send-icon.png" alt="Send" style="width: 34px; height: 34px;">';
                imageInput.value = ''; // Reset file input
            }
        });

        // Image compression function from write-blog.html
        function compressImage(file) {
            return new Promise((resolve, reject) => {
                const maxWidth = 800;
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        let quality = 0.8;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        while (dataUrl.length > 135000 && quality > 0.1) { // Compress to ~100KB
                            quality -= 0.1;
                            dataUrl = canvas.toDataURL('image/jpeg', quality);
                        }
                        resolve(dataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // Lightbox functions from index.html
        window.openLightbox = function(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-modal').style.display = "flex";
        };
        window.closeLightbox = function() {
            document.getElementById('lightbox-modal').style.display = "none";
        };

        window.showForwardModal = async function(messageId) {
            const messageData = messagesCache.get(messageId);
            if (!messageData) {
                console.error("Could not find message to forward in cache.");
                alert("Error: Could not forward message.");
                return;
            }
            messageToForward = messageData;
            const modal = document.getElementById('forward-modal');
            const content = document.getElementById('forward-user-list');
            modal.style.display = 'flex';
            content.innerHTML = '<p style="text-align:center; color:#aaa;">Loading conversations...</p>';

            try {
                const q = query(
                    collection(db, "conversations"),
                    where("participants", "array-contains", currentUser.uid)
                );
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    content.innerHTML = '<p style="text-align:center; color:#aaa;">You have no active conversations to forward to.</p>';
                    return;
                }

                content.innerHTML = ''; // Clear loading text
                
                snapshot.forEach(docSnap => {
                    const conversation = docSnap.data();
                    const otherUid = conversation.participants.find(uid => uid !== currentUser.uid);
                    if (!otherUid || !conversation.participantDetails || !conversation.participantDetails[otherUid]) return;

                    const otherUser = conversation.participantDetails[otherUid];
                    
                    const div = document.createElement('div');
                    div.style.cssText = "display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1); cursor:pointer;";
                    div.onclick = () => forwardMessage(otherUid);
                    
                    div.innerHTML = `
                        <img src="${otherUser.photoURL || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:1px solid #555;">
                        <div><strong>${otherUser.name || 'User'}</strong></div>
                    `;
                    content.appendChild(div);
                });

            } catch (e) {
                console.error("Error loading conversation list for forwarding:", e);
                content.innerHTML = '<p style="color:red;">Error loading user list.</p>';
            }
        }

        async function forwardMessage(targetUid) {
            if (!messageToForward || !targetUid) return;

            const targetConversationId = getConversationId(currentUser.uid, targetUid);
            const targetMessagesRef = collection(db, "conversations", targetConversationId, "messages");
            const targetConvRef = doc(db, "conversations", targetConversationId);

            const forwardedPayload = {
                ...messageToForward,
                senderUid: currentUser.uid,
                timestamp: serverTimestamp(),
                forwarded: true,
            };
            delete forwardedPayload.reactions; // Don't carry over reactions

            try {
                await addDoc(targetMessagesRef, forwardedPayload);

                let lastMessageText;
                switch(forwardedPayload.type) {
                    case 'text':
                    case 'story_reply':
                        lastMessageText = forwardedPayload.content;
                        break;
                    case 'image':
                        lastMessageText = '[Image]';
                        break;
                    case 'pdf':
                        lastMessageText = '[PDF Document]';
                        break;
                    case 'youtube':
                        lastMessageText = '[Video]';
                        break;
                    case 'flick':
                        lastMessageText = 'Sent a Flick';
                        break;
                    default:
                        lastMessageText = '[Shared Content]';
                }
                
                const partnerProfileSnap = await getDoc(doc(db, "users", targetUid));
                const partnerName = partnerProfileSnap.exists() ? partnerProfileSnap.data().name : 'User';

                await setDoc(targetConvRef, { lastMessage: { text: lastMessageText, senderUid: currentUser.uid, timestamp: serverTimestamp(), isRead: false } }, { merge: true });

                alert(`Message forwarded to ${partnerName}`);
                document.getElementById('forward-modal').style.display = 'none';
                messageToForward = null;
            } catch (e) {
                console.error("Error forwarding message:", e);
                alert("Failed to forward message.");
            }
        }

        window.toggleReaction = async function(messageId, emoji) {
            if (!currentUser || !conversationId) return;

            const msgRef = doc(db, "conversations", conversationId, "messages", messageId);
            
            try {
                const docSnap = await getDoc(msgRef);
                if (!docSnap.exists()) return;

                const msgData = docSnap.data();
                const reactions = msgData.reactions || {};
                const reactorsForEmoji = reactions[emoji] || [];
                
                const userIndex = reactorsForEmoji.indexOf(currentUser.uid);
                
                let updatePayload;

                if (userIndex > -1) {
                    // User has already reacted with this emoji, so remove reaction
                    updatePayload = { [`reactions.${emoji}`]: arrayRemove(currentUser.uid) };
                } else {
                    // User has not reacted, add reaction
                    updatePayload = { [`reactions.${emoji}`]: arrayUnion(currentUser.uid) };
                }

                await updateDoc(msgRef, updatePayload);
            } catch (e) {
                console.error("Error toggling reaction:", e);
                alert("Failed to react to message.");
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        window.addEventListener('beforeunload', () => {
            if (unsubscribe) unsubscribe();
            if (unsubscribeConv) unsubscribeConv();
        });
    </script>
