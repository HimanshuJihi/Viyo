<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch - Viyou</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fluid Player for VAST Ads -->
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
        .navbar { padding: 15px 20px; background: #1e1e1e; display: flex; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .navbar a { color: #fff; text-decoration: none; font-size: 1.5rem; font-weight: bold; }
        .container { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; max-width: 1400px; margin: auto; }
        .main-content { flex: 1 1 65%; max-width: 100%; }
        .sidebar { flex: 1 1 30%; display: flex; flex-direction: column; gap: 15px; }
        .video-container { width: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; padding-bottom: 56.25%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .video-container iframe, .video-container video, .fluid_video_wrapper { position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important; outline: none; }
        .info { padding: 20px 0; border-bottom: 1px solid #333; }
        .title { font-size: 1.5rem; margin: 0 0 15px 0; font-weight: bold; }
        .author-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .author-info { display: flex; align-items: center; gap: 12px; }
        .author-info img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #87ceeb; cursor: pointer; }
        .actions { display: flex; gap: 10px; }
        .btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .desc-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; color: #ddd; }
        .suggestion-card { display: flex; gap: 10px; cursor: pointer; border-radius: 8px; padding: 5px; transition: background 0.2s; }
        .suggestion-card:hover { background: rgba(255,255,255,0.05); }
        .suggestion-card img { width: 168px; height: 94px; border-radius: 8px; object-fit: cover; }
        .suggestion-info h4 { margin: 0 0 5px 0; font-size: 0.95rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        .suggestion-info p { margin: 0; font-size: 0.85rem; color: #aaa; }
        
        .desc-content { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; transition: all 0.3s ease; }
        .desc-content.expanded { display: block; -webkit-line-clamp: unset; }
        .show-more-btn { background: none; border: none; color: #aaa; cursor: pointer; font-weight: bold; padding: 8px 0 0 0; font-size: 0.9rem; }
        .show-more-btn:hover { color: #fff; }
        .double-tap-anim { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; pointer-events: none; opacity: 0; z-index: 100; transition: opacity 0.3s; }
        .double-tap-left { left: 10%; }
        .double-tap-right { right: 10%; }
        .double-tap-center { left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 5rem; color: #ff0050; background: transparent; padding: 0; border-radius: 0; transition: transform 0.2s ease-out, opacity 0.2s ease-out; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        @media (max-width: 900px) {
            .container { flex-direction: column; padding: 10px; }
            .sidebar { width: 100%; }
            .title { font-size: 1.25rem; }
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4993635171115303"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="navbar">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Viyou</a>
    </div>
    <div class="container">
        <div class="main-content" id="main-content">
            <div style="text-align: center; color: #aaa; padding: 50px;">Loading video...</div>
        </div>
        <div class="sidebar">
            <h3 style="margin: 0; color: #fff;">Up Next</h3>
            <div id="suggestions"><div style="color: #aaa;">Loading suggestions...</div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { firebaseConfig } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('id');

        window.globalAdConfig = {};
        async function loadAdSettings() {
            try {
                const adDoc = await getDoc(doc(db, "settings", "ads"));
                if (adDoc.exists()) { window.globalAdConfig = adDoc.data(); }
            } catch(e) { console.error(e); }
        }

        function getYoutubeVideoId(url) {
            const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        async function loadVideo() {
            if (!blogId) { document.getElementById('main-content').innerHTML = '<div style="padding: 20px;">Video not found.</div>'; return; }
            const docRef = doc(db, "blogs", blogId);
            const snap = await getDoc(docRef);
            if (!snap.exists()) { document.getElementById('main-content').innerHTML = '<div style="padding: 20px;">Video not found.</div>'; return; }

            const blog = snap.data();
            updateDoc(docRef, { views: increment(1) }).catch(e => {}); // Track View

            let mediaHtml = '';
            if (blog.youtubeUrl) {
                const videoId = getYoutubeVideoId(blog.youtubeUrl);
                mediaHtml = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else if (blog.video) {
                mediaHtml = `
                    <video id="watch-video-player" controls playsinline>
                        <source src="${blog.video}" type="video/mp4">
                    </video>`;
            } else {
                mediaHtml = `<div style="padding: 50px; text-align: center; color: #aaa;">No video attached to this post.</div>`;
            }

            const views = (blog.views || 0) + 1;
            const likes = blog.likes || [];
            const likesCount = Array.isArray(likes) ? likes.length : (typeof likes === 'number' ? likes : 0);
            const isLiked = auth.currentUser && Array.isArray(likes) && likes.includes(auth.currentUser.uid);
            
            const skipSelectOptions = [5, 8, 12, 15].map(v => 
                `<option value="${v}" style="color:black;" ${window.skipDuration === v ? 'selected' : ''}>${v}s Skip</option>`
            ).join('');

            const categoryBadge = blog.category ? `<span style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #ddd; font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; display: inline-block;">🏷️ ${blog.category}</span>` : '';

            document.getElementById('main-content').innerHTML = `
                <div class="video-container" id="video-container" onclick="window.handleVideoClick(event)">
                    ${mediaHtml}
                    <div id="dt-left" class="double-tap-anim double-tap-left">⏪ ${window.skipDuration}s</div>
                    <div id="dt-right" class="double-tap-anim double-tap-right">⏩ ${window.skipDuration}s</div>
                    <div id="dt-center" class="double-tap-anim double-tap-center"><i class="fa-solid fa-heart"></i></div>
                </div>
                <div class="info">
                    ${categoryBadge}
                    <h1 class="title">${blog.title}</h1>
                    <div class="author-row">
                        <div class="author-info">
                            <img src="${blog.authorPhoto || 'https://via.placeholder.com/45'}" alt="${blog.author}" onclick="window.location.href='profile.html?uid=${blog.authorUid}'">
                            <div>
                                <strong style="cursor:pointer; font-size: 1.1rem;" onclick="window.location.href='profile.html?uid=${blog.authorUid}'">${blog.author}</strong>
                                <div style="font-size: 0.85rem; color: #aaa;">${views.toLocaleString()} views • ${new Date(blog.date).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="actions">
                            <select id="skip-duration-select" class="btn" style="appearance: none; -webkit-appearance: none; padding-right: 10px; cursor: pointer; text-align: center;" onchange="window.updateSkipDuration(this.value)">
                                ${skipSelectOptions}
                            </select>
                            <button class="btn" id="like-btn-${blogId}" onclick="likeVideo('${blogId}')">
                                <i class="fa-solid fa-heart" style="color: ${isLiked ? '#ff0050' : 'inherit'};"></i> <span id="like-count-display">${likesCount}</span>
                            </button>
                            <button class="btn" onclick="shareVideo()"><i class="fa-solid fa-share"></i> Share</button>
                        </div>
                    </div>
                    <div class="desc-box">
                        <div id="video-description" class="desc-content">${(blog.content || '').replace(/\n/g, '<br>')}</div>
                        <button id="show-more-btn" class="show-more-btn" onclick="toggleDescription()">Show more</button>
                    </div>
                </div>
            `;

            if (blog.video && !blog.youtubeUrl) {
                let adList = [];
                if (window.globalAdConfig && window.globalAdConfig.showAds) {
                    const vastUrl = window.globalAdConfig.vastUrl || 'https://baggymaintenance.com/d/mjFLz.dlGYNGv/Z/GtUO/je/ml9LuiZ/UelXkcPdTXY/5pNtTdchwiNBTmcEtYN/jqkU1vNnzQAf2dMzSSZ/staFWV1Cp_dIDB0exV';
                    adList = [{ roll: 'preRoll', vastTag: vastUrl }];
                }
                fluidPlayer("watch-video-player", {
                    layoutControls: { autoPlay: true, playButtonShowing: true },
                    vastOptions: {
                        adList: adList
                    }
                });
            }
        }

        window.toggleDescription = function() {
            const desc = document.getElementById('video-description');
            const btn = document.getElementById('show-more-btn');
            const isExpanded = desc.classList.toggle('expanded');
            btn.innerText = isExpanded ? 'Show less' : 'Show more';
        };

        window.likeVideo = async (id) => {
            if (!auth.currentUser) { alert('Please log in to like.'); return; }
            const ref = doc(db, "blogs", id);
            
            const likeBtnIcon = document.querySelector('#like-btn-' + id + ' i');
            const likeCountDisplay = document.getElementById('like-count-display');
            if (likeBtnIcon && likeCountDisplay) {
                let currentLikes = parseInt(likeCountDisplay.innerText) || 0;
                const isCurrentlyLiked = likeBtnIcon.style.color === 'rgb(255, 0, 80)' || likeBtnIcon.style.color === '#ff0050';
                
                if (isCurrentlyLiked) {
                    likeBtnIcon.style.color = 'inherit';
                    likeCountDisplay.innerText = Math.max(0, currentLikes - 1);
                } else {
                    likeBtnIcon.style.color = '#ff0050';
                    likeCountDisplay.innerText = currentLikes + 1;
                }
            }

            try {
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    const data = snap.data();
                    let likes = data.likes || [];
                    if (Array.isArray(likes)) {
                        if (!likes.includes(auth.currentUser.uid)) { likes.push(auth.currentUser.uid); }
                        else { likes = likes.filter(uid => uid !== auth.currentUser.uid); }
                        await updateDoc(ref, { likes });
                    }
                }
            } catch(e) { console.error(e); }
        };

        window.shareVideo = () => { navigator.clipboard.writeText(window.location.href); alert('Link copied to clipboard!'); };

        async function loadSuggestions() {
            const q = query(collection(db, "blogs"), orderBy("date", "desc"), limit(20));
            const snap = await getDocs(q);
            const container = document.getElementById('suggestions');
            container.innerHTML = '';
            
            let count = 0;
            snap.forEach(doc => {
                const blog = doc.data();
                if (doc.id === blogId || blog.isFlicker || (!blog.video && !blog.youtubeUrl)) return;
                if (count >= 10) return;
                count++;

                let thumb = blog.thumbnail || 'game-logo.png';
                if (blog.youtubeUrl) {
                    const vidId = getYoutubeVideoId(blog.youtubeUrl);
                    if (vidId) thumb = `https://img.youtube.com/vi/${vidId}/mqdefault.jpg`;
                }

                const div = document.createElement('div');
                div.className = 'suggestion-card';
                div.onclick = () => window.location.href = `watch.html?id=${doc.id}`;
                div.innerHTML = `
                    <img src="${thumb}">
                    <div class="suggestion-info">
                        <h4>${blog.title}</h4>
                        <p>${blog.author}</p>
                        <p>${(blog.views || 0).toLocaleString()} views</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.skipDuration = parseInt(localStorage.getItem('viyou_skip_duration') || '12', 10);
        window.updateSkipDuration = function(val) {
            window.skipDuration = parseInt(val, 10);
            localStorage.setItem('viyou_skip_duration', window.skipDuration);
            const dtLeft = document.getElementById('dt-left');
            const dtRight = document.getElementById('dt-right');
            if(dtLeft) dtLeft.innerText = `⏪ ${window.skipDuration}s`;
            if(dtRight) dtRight.innerText = `⏩ ${window.skipDuration}s`;
        };

        let clickTimer = null;
        window.handleVideoClick = function(e) {
            if (e.target.closest('.fluid_controls_container') || e.target.tagName.toLowerCase() === 'iframe') return;
            
            if (clickTimer) {
                clearTimeout(clickTimer);
                clickTimer = null;
                
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const width = rect.width;
                const vid = document.getElementById('watch-video-player');

                if (x < width / 3) {
                    if (vid) vid.currentTime = Math.max(0, vid.currentTime - window.skipDuration);
                    window.showAnim('dt-left', `⏪ ${window.skipDuration}s`);
                } else if (x > (width * 2) / 3) {
                    if (vid) vid.currentTime = Math.min(vid.duration, vid.currentTime + window.skipDuration);
                    window.showAnim('dt-right', `⏩ ${window.skipDuration}s`);
                } else {
                    if (!auth.currentUser) {
                        alert('Please log in to like.');
                        return;
                    }
                    const likeBtnIcon = document.querySelector('#like-btn-' + blogId + ' i');
                    if (likeBtnIcon) {
                        const isLiked = likeBtnIcon.style.color === 'rgb(255, 0, 80)' || likeBtnIcon.style.color === '#ff0050';
                        if (!isLiked) window.likeVideo(blogId);
                    }
                    
                    const heart = document.getElementById('dt-center');
                    heart.style.transition = 'none';
                    heart.style.transform = 'translate(-50%, -50%) scale(1)';
                    heart.style.opacity = '1';
                    void heart.offsetWidth; // Force Reflow
                    heart.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease-out';
                    heart.style.transform = 'translate(-50%, -50%) scale(1.5)';
                    setTimeout(() => {
                        heart.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
                        heart.style.transform = 'translate(-50%, -50%) scale(2)';
                        heart.style.opacity = '0';
                    }, 500);
                }
            } else {
                clickTimer = setTimeout(() => { clickTimer = null; }, 300);
            }
        };

        window.showAnim = function(id, text) {
            const el = document.getElementById(id);
            if (!el) return;
            if (text) el.innerText = text;
            el.style.opacity = '1';
            setTimeout(() => { el.style.opacity = '0'; }, 800);
        };

        onAuthStateChanged(auth, () => {
            loadAdSettings().then(() => {
                loadVideo();
                loadSuggestions();
            });
        });
    </script>
</body>
</html>
