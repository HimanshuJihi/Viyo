<footer>

    <script type="module">
        import { getFirestore, doc, getDoc, collection, query, orderBy, limit, getDocs, updateDoc, increment, arrayUnion, arrayRemove, addDoc, where, setDoc, serverTimestamp, startAfter } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { db, auth } from "./firebase-config.js";

        // Helper function to escape HTML/XML for XSS prevention
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const blogId = urlParams.get('id');
        let currentBlog = null;
        let vastAdConfig = {};
        let preRollAdConfig = { frequency: 3, activeAds: [] };

        // Start fetching data immediately to cut loading time in half
        const globalVastPromise = loadVastAdConfig();
        const globalPreRollPromise = loadPreRollAdConfig();
        const globalVideoSnapPromise = blogId ? getDoc(doc(db, "blogs", blogId)) : null;

        window.enableYoutubeLinks = true;
        const globalSettingsPromise = getDoc(doc(db, "settings", "general")).then(snap => {
            if(snap.exists() && snap.data().enableYoutubeLinks !== undefined) {
                window.enableYoutubeLinks = snap.data().enableYoutubeLinks;
            }
        }).catch(e=>console.error(e));

        // --- Menu Logic ---
        const mainMenuToggleBtn = document.getElementById('main-menu-toggle');
        const mainMenuDropdown = document.getElementById('main-menu-dropdown');

        mainMenuToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mainMenuDropdown.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (mainMenuDropdown && !mainMenuToggleBtn.contains(e.target) && !mainMenuDropdown.contains(e.target)) {
                mainMenuDropdown.classList.remove('show');
            }
        });
        
        async function trackAdClick(blogIdForClick, isExternal = false) {
            if (!blogIdForClick) return;
            // --- Daily Limit Logic for Click Fraud Prevention ---
            const today = new Date().toDateString();
            let clickData = JSON.parse(localStorage.getItem('ad_click_data') || '{"date":"","count":0}');
            if (clickData.date !== today) {
                clickData = { date: today, count: 0 };
            }
            
            const MAX_CLICKS_PER_DAY = 3; // A reasonable limit
            if (clickData.count >= MAX_CLICKS_PER_DAY) {
                console.log("Daily ad click limit reached. Click ignored to prevent fraud.");
                return;
            }
            
            clickData.count++;
            localStorage.setItem('ad_click_data', JSON.stringify(clickData));
            // ----------------------------------------------------

            try {
                const collectionName = isExternal ? "promotions" : "blogs";
                const docRef = doc(db, collectionName, blogIdForClick);
                await updateDoc(docRef, { adClicks: increment(1) });
                console.log(`Ad click tracked for ${collectionName}:`, blogIdForClick);
            } catch(e) { console.error("Error tracking ad click:", e); }
        }

        function getYoutubeVideoId(url) {
            const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        async function loadVastAdConfig() {
            try {
                const vastDoc = await getDoc(doc(db, "settings", "vastAds"));
                if (vastDoc.exists()) {
                    vastAdConfig = vastDoc.data();
                }
                // Fetch general ad settings to get enablePreRollAds
                const adDoc = await getDoc(doc(db, "settings", "ads"));
                if (adDoc.exists()) {
                    const generalAdSettings = adDoc.data();
                    vastAdConfig.enablePreRollAds = generalAdSettings.enablePreRollAds !== false;
                    vastAdConfig.showAds = generalAdSettings.showAds || false; // Master switch
                }

            } catch (e) {
                console.error("Error loading VAST ad config:", e);
            }
        }

        async function loadPreRollAdConfig() {
            try {
                const promoSettingsSnap = await getDoc(doc(db, "settings", "promotions"));
                if (promoSettingsSnap.exists()) {
                    preRollAdConfig.frequency = promoSettingsSnap.data().prerollFrequency || 3;
                } // Fetch general ad settings to get enablePreRollAds
                const adDoc = await getDoc(doc(db, "settings", "ads"));
                if (adDoc.exists()) {
                    const generalAdSettings = adDoc.data();
                    preRollAdConfig.enablePreRollAds = generalAdSettings.enablePreRollAds !== false;
                    preRollAdConfig.showAds = generalAdSettings.showAds || false; // Master switch
                } else {
                    preRollAdConfig.enablePreRollAds = true; // Default to true if no settings found
                    preRollAdConfig.showAds = false; // Default master switch to off
                }

                const q = query(collection(db, "promotions"), where("status", "==", "approved"), where("type", "==", "preroll"));
                const adSnap = await getDocs(q);
                preRollAdConfig.activeAds = [];
                adSnap.forEach(adDoc => {
                    const adData = adDoc.data();
                    if ((adData.impressions_served || 0) < (adData.impressions_goal || 1)) {
                        preRollAdConfig.activeAds.push({ id: adDoc.id, ...adData }); // Only add if impressions goal not met
                    }
                });
            } catch(e) { console.error("Error loading pre-roll config:", e); }
        }

        async function loadVideo() {
            await globalSettingsPromise;

            if (!blogId) { document.getElementById('main-content').innerHTML = '<div style="padding: 20px;">Video not found.</div>'; return; }
            const docRef = doc(db, "blogs", blogId);
            const snap = await globalVideoSnapPromise; // Wait for pre-fetched data
            if (!snap || !snap.exists()) { document.getElementById('main-content').innerHTML = '<div style="padding: 20px;">Video not found.</div>'; return; }

            const blog = snap.data();
            
            if (!window.enableYoutubeLinks && blog.youtubeUrl) {
                document.getElementById('main-content').innerHTML = '<div style="padding: 50px; text-align: center; color: #aaa; font-size: 1.2rem;">This video is currently unavailable due to platform settings.</div>';
                return;
            }

            currentBlog = { id: blogId, ...blog };
            
            if (auth.currentUser) {
                try {
                    const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
                    if (!userDoc.exists() || !userDoc.data().historyPaused) {
                        await setDoc(doc(db, "users", auth.currentUser.uid, "watchHistory", blogId), {
                            blogId: blogId,
                            viewedAt: serverTimestamp()
                        }, { merge: true });
                    }
                } catch (e) { console.error("Error saving history:", e); }
            }
            
            // Dynamic SEO tags for Google Indexing
            document.title = (blog.title || 'Watch Video') + " - Viyou";
            let canonical = document.querySelector("link[rel='canonical']");
            if (!canonical) {
                canonical = document.createElement('link');
                canonical.setAttribute('rel', 'canonical');
                document.head.appendChild(canonical);
            }
            canonical.setAttribute('href', window.location.origin + window.location.pathname + '?id=' + blogId);

            // Delayed View Count Logic (10 Seconds)
            window.viewAlreadyCounted = false;
            window.countVideoView = function() {
                if (window.viewAlreadyCounted) return;
                
                // --- Max 4 Views Per User/Device Logic ---
                const viewKey = `viyou_view_count_${blogId}`;
                let currentViews = parseInt(localStorage.getItem(viewKey) || '0');
                if (currentViews >= 4) return; // 4 Views Limit Reached
                
                window.viewAlreadyCounted = true;
                localStorage.setItem(viewKey, currentViews + 1); // Update local count

                if (blog.video && !blog.youtubeUrl) {
                    updateDoc(docRef, { views: increment(1), longVideoViews: increment(1) }).catch(e => {});
                } else {
                    updateDoc(docRef, { views: increment(1) }).catch(e => {});
                }
            };

            // --- Ad Decision Logic ---
            let sessionViews = parseInt(sessionStorage.getItem('viyou_video_views') || '0');
            sessionViews++;
            sessionStorage.setItem('viyou_video_views', sessionViews);

            window.userAdImpressionTracked = false;
            let preRollAdToPlay = null;
            
            // VAST ads have priority. Check if it's time to play an ad.
            const isAdTime = (sessionViews % (preRollAdConfig.frequency || 3) === 0);
            const playVast = vastAdConfig.enabled && vastAdConfig.vastUrl && isAdTime;

            if (!playVast && isAdTime) {
                // If not playing a VAST ad, check for internal pre-roll ads.
                let eligibleAds = preRollAdConfig.activeAds.filter(ad => {
                    if (!ad.targetCategories || ad.targetCategories.length === 0) return true; // Legacy ads target all
                    return ad.targetCategories.includes(blog.category || 'Others');
                });

                if (eligibleAds.length > 0) preRollAdToPlay = eligibleAds[Math.floor(Math.random() * eligibleAds.length)];
            }

            let videoSrc = blog.video;
            if (videoSrc) {
                const driveMatch = videoSrc.match(/drive\.google\.com\/file\/d\/(.*?)\/view/);
                if (driveMatch && driveMatch[1]) {
                    videoSrc = `https://viyou-in-backend.onrender.com/api/stream/${driveMatch[1]}`;
                } else if (videoSrc.includes('drive.google.com/uc')) {
                    const ucMatch = videoSrc.match(/[?&]id=([^&]+)/);
                    if (ucMatch && ucMatch[1]) {
                        videoSrc = `https://viyou-in-backend.onrender.com/api/stream/${ucMatch[1]}`;
                    }
                }
            }

            let mediaHtml = '';
            if (blog.youtubeUrl) {
                const videoId = getYoutubeVideoId(blog.youtubeUrl);
                mediaHtml = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                setTimeout(window.countVideoView, 10000); // 10-second timer for YouTube iframe
            } else if (videoSrc) {
                mediaHtml = `
                    <video id="custom-video" playsinline preload="auto"></video>
                    
                    <div id="dt-left" class="yt-skip-anim yt-skip-left">
                        <div class="yt-skip-content">
                            <div class="yt-skip-arrows"><i data-lucide="chevrons-left"></i></div>
                            <span class="yt-skip-text">10 seconds</span>
                        </div>
                    </div>
                    <div id="dt-right" class="yt-skip-anim yt-skip-right">
                        <div class="yt-skip-content">
                            <div class="yt-skip-arrows"><i data-lucide="chevrons-right"></i></div>
                            <span class="yt-skip-text">10 seconds</span>
                        </div>
                    </div>

                    <!-- Pre-Roll Ad Overlay -->
                    <div id="ad-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none;">
                        <div style="position: absolute; top: 15px; left: 15px; background: rgba(245, 158, 11, 0.9); color: black; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; pointer-events: auto;">Ad</div>
                        <button id="ad-action-btn" style="position: absolute; bottom: 85px; left: 15px; background: #0d6efd; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; pointer-events: auto; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5);"><i data-lucide="external-link" style="width: 16px; height: 16px; margin-right: 5px;"></i> Learn More</button>
                        <button id="ad-skip-btn" style="position: absolute; bottom: 85px; right: 15px; background: rgba(0,0,0,0.8); color: white; border: 1px solid rgba(255,255,255,0.5); padding: 8px 15px; border-radius: 6px; cursor: pointer; pointer-events: auto; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">Skip Ad <i data-lucide="skip-forward" style="width: 16px; height: 16px; margin-left: 5px;"></i></button>
                        <div id="ad-countdown" style="position: absolute; bottom: 85px; right: 15px; background: rgba(0,0,0,0.8); color: white; border: 1px solid rgba(255,255,255,0.5); padding: 8px 15px; border-radius: 6px; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">Skip in 5</div>
                    </div>

                    <!-- Custom Controls UI -->
                    <div class="controls">
                        <input type="range" id="progress-bar" class="progress-bar" min="0" max="100" value="0">
                        
                        <div class="control-buttons">
                            <div class="left-controls">
                                <button id="play-pause-btn"><i data-lucide="play"></i></button>
                                <div class="volume-container">
                                    <button id="mute-btn"><i data-lucide="volume-2"></i></button>
                                    <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="1">
                                </div>
                                <div class="time-display">
                                    <span id="current-time">0:00</span> / <span id="duration">0:00</span>
                                </div>
                            </div>
                            
                            <div class="right-controls">
                                <div class="settings-wrapper">
                                    <button id="settings-btn" title="Settings"><i data-lucide="settings"></i></button>
                                    <div id="settings-menu" class="settings-menu">
                                        <!-- Main Settings Panel -->
                                        <div class="menu-panel active" id="panel-main">
                                            <div class="settings-item nav-item" data-target="panel-quality">
                                                <span style="display: flex; align-items: center;"><i data-lucide="sliders-horizontal" style="width: 16px; height: 16px; margin-right: 10px;"></i> Quality</span>
                                                <span style="color: #aaa; font-size: 0.8rem; display: flex; align-items: center;"><span id="current-quality-text">720p</span> <i data-lucide="chevron-right" style="width: 16px; height: 16px; margin-left: 5px;"></i></span>
                                            </div>
                                            <div class="settings-item nav-item" data-target="panel-speed">
                                                <span style="display: flex; align-items: center;"><i data-lucide="play-circle" style="width: 16px; height: 16px; margin-right: 10px;"></i> Playback Speed</span>
                                                <span style="color: #aaa; font-size: 0.8rem; display: flex; align-items: center;"><span id="current-speed-text">Normal</span> <i data-lucide="chevron-right" style="width: 16px; height: 16px; margin-left: 5px;"></i></span>
                                            </div>
                                            <div class="settings-item nav-item" data-target="panel-sleep-timer">
                                                <span style="display: flex; align-items: center;"><i data-lucide="moon" style="width: 16px; height: 16px; margin-right: 10px;"></i> Sleep Timer</span>
                                                <span style="color: #aaa; font-size: 0.8rem; display: flex; align-items: center;"><span id="current-sleep-timer-text">Off</span> <i data-lucide="chevron-right" style="width: 16px; height: 16px; margin-left: 5px;"></i></span>
                                            </div>
                                        </div>

                                        <!-- Quality Selection Panel -->
                                        <div class="menu-panel" id="panel-quality">
                                            <div class="settings-header-back nav-item" data-target="panel-main"><i data-lucide="chevron-left" style="width: 18px; height: 18px; margin-right: 10px;"></i> Quality</div>
                                            <div class="settings-item quality-item" data-quality="1080">1080p</div>
                                            <div class="settings-item quality-item active" data-quality="720">720p <i data-lucide="check" style="width: 14px; height: 14px;"></i></div>
                                            <div class="settings-item quality-item" data-quality="480">480p</div>
                                            <div class="settings-item quality-item" data-quality="360">360p</div>
                                        </div>

                                        <!-- Speed Selection Panel -->
                                        <div class="menu-panel" id="panel-speed">
                                            <div class="settings-header-back nav-item" data-target="panel-main"><i data-lucide="chevron-left" style="width: 18px; height: 18px; margin-right: 10px;"></i> Playback speed</div>
                                            <div class="settings-item speed-item" data-speed="0.25">0.25x</div>
                                            <div class="settings-item speed-item" data-speed="0.5">0.5x</div>
                                            <div class="settings-item speed-item" data-speed="0.75">0.75x</div>
                                            <div class="settings-item speed-item active" data-speed="1">Normal <i data-lucide="check" style="width: 14px; height: 14px;"></i></div>
                                            <div class="settings-item speed-item" data-speed="1.25">1.25x</div>
                                            <div class="settings-item speed-item" data-speed="1.5">1.5x</div>
                                            <div class="settings-item speed-item" data-speed="2">2x</div>
                                        </div>

                                        <!-- Sleep Timer Selection Panel -->
                                        <div class="menu-panel" id="panel-sleep-timer">
                                            <div class="settings-header-back nav-item" data-target="panel-main"><i data-lucide="chevron-left" style="width: 18px; height: 18px; margin-right: 10px;"></i> Sleep Timer</div>
                                            <div class="settings-item sleep-timer-item active" data-duration="0">Off <i data-lucide="check" style="width: 14px; height: 14px;"></i></div>
                                            <div class="settings-item sleep-timer-item" data-duration="5">5 minutes</div>
                                            <div class="settings-item sleep-timer-item" data-duration="10">10 minutes</div>
                                            <div class="settings-item sleep-timer-item" data-duration="15">15 minutes</div>
                                            <div class="settings-item sleep-timer-item" data-duration="30">30 minutes</div>
                                            <div class="settings-item sleep-timer-item" data-duration="60">60 minutes</div>
                                        </div>
                                    </div>
                                </div>
                                <button id="pip-btn" title="Miniplayer (Picture in Picture)"><i data-lucide="picture-in-picture"></i></button>
                                <button id="theater-btn" class="pc-only-btn" title="Theater Mode"><i data-lucide="rectangle-horizontal"></i></button>
                                <button id="fullscreen-btn"><i data-lucide="maximize"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                mediaHtml = `<div style="padding: 50px; text-align: center; color: #aaa;">No video attached to this post.</div>`;
            }

            const views = (blog.views || 0) + 1;
            const likes = blog.likes || [];
            const likesCount = Array.isArray(likes) ? likes.length : (typeof likes === 'number' ? likes : 0);
            const isLiked = auth.currentUser && Array.isArray(likes) && likes.includes(auth.currentUser.uid);            

            const categoryBadge = blog.category ? `<span style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #ddd; font-size: 0.8rem; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; display: inline-block;">🏷️ ${blog.category}</span>` : '';

            // Formatting links in description
            let safeDesc = escapeHTML(blog.content || '');
            const urlRegex = /(https?:\/\/[^\s<>"']+)/g;
            safeDesc = safeDesc.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer" style="color: #87ceeb; text-decoration: underline;">$1</a>');
            safeDesc = safeDesc.replace(/\n/g, '<br>');

            document.getElementById('main-content').innerHTML = `
                <div class="video-container paused" id="video-container">
                    ${mediaHtml}
                    <div id="dt-center" class="double-tap-center"><i data-lucide="heart" class="lucide-fill"></i></div>
                </div>
                <div class="info">
                    ${categoryBadge}
                    <h1 class="title">${blog.title}</h1>
                    <div class="author-row">
                        <div class="author-info">
                            <img src="${blog.authorPhoto || 'https://via.placeholder.com/45'}" alt="${blog.author}" onclick="window.location.href='profile.html?uid=${blog.authorUid}'">
                            <div>
                                <strong style="cursor:pointer; font-size: 1.1rem;" onclick="window.location.href='profile.html?uid=${blog.authorUid}'">${blog.author}</strong>
                                    <div style="font-size: 0.85rem; color: #aaa;">${views.toLocaleString()} views • ${window.timeAgo(blog.date)}</div>
                            </div>
                        </div>
                        <div class="actions">                            
                            <button class="btn" id="like-btn-${blogId}" onclick="likeVideo('${blogId}')">
                                <i data-lucide="heart" class="${isLiked ? 'lucide-fill' : ''}" style="color: ${isLiked ? '#ff0050' : 'inherit'};"></i> <span id="like-count-display">${likesCount}</span>
                            </button>
                            <button class="btn" onclick="shareVideo()"><i data-lucide="share-2"></i> Share</button>
                        </div>
                    </div>
                    <div class="desc-box"> 
                        <div id="video-description" class="desc-content">${safeDesc}</div>
                        <button id="show-more-btn" class="show-more-btn" onclick="toggleDescription()">Show more</button>
                    </div>
                </div>
                <!-- Comments Section -->
                <div id="comments-section" style="margin-top: 30px;">
                    <!-- Comments will be rendered here by JavaScript -->
                </div>
            `;

            // Custom Player JS Init
            if (blog.video && !blog.youtubeUrl) { // Only for custom video player
                const videoElement = document.getElementById('custom-video');
                const adOverlay = document.getElementById('ad-overlay');
                const controlsContainer = document.querySelector('.controls');

                // Play Next Video Logic
                const playNextVideo = () => {
                    const firstSuggestion = document.querySelector('.suggestion-card');
                    if (firstSuggestion) {
                        firstSuggestion.click(); // Autoplays the very first "Up Next" video
                    }
                };

                const playMainVideo = () => {
                    if (adOverlay) adOverlay.style.display = 'none';
                    if (controlsContainer) controlsContainer.style.display = 'flex';
                    videoElement.src = videoSrc;
                    window.isPlayingMainVideo = true;
                    videoElement.play().catch(e => console.log("Main video play blocked", e));
                    videoElement.onended = playNextVideo; // Auto-play next video on end
                    if (window.lucide) lucide.createIcons();
                };
                
                // NEW: VAST Ad Player function
                async function playVastAd(vastUrl) {
                    try {
                        const response = await fetch(vastUrl);
                        if (!response.ok) throw new Error(`VAST request failed: ${response.status}`);
                        const vastString = await response.text();
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(vastString, "text/xml");

                        const mediaFileNode = xmlDoc.querySelector('MediaFile[type="video/mp4"]');
                        const clickThroughNode = xmlDoc.querySelector('ClickThrough');
                        const impressionNodes = xmlDoc.querySelectorAll('Impression');

                        if (!mediaFileNode || !mediaFileNode.textContent) {
                            console.warn("No compatible MP4 MediaFile found in VAST response. Playing main video.");
                            playMainVideo();
                            return;
                        }

                        const adVideoUrl = mediaFileNode.textContent.trim();
                        const clickUrl = clickThroughNode ? clickThroughNode.textContent.trim() : null;

                        // Fire impression trackers
                        impressionNodes.forEach(node => {
                            if (node.textContent) {
                                try { navigator.sendBeacon(node.textContent.trim()); } catch(e) { console.error("Beacon error:", e); }
                            }
                        });
                        
                        // Track Ad View (Impression) for Creator
                        updateDoc(doc(db, "blogs", blogId), { adImpressions: increment(1) }).catch(e => console.error(e));

                        videoElement.src = adVideoUrl;
                        if (adOverlay) adOverlay.style.display = 'block';
                        if (controlsContainer) controlsContainer.style.display = 'none';

                        const adActionBtn = document.getElementById('ad-action-btn');
                        if (adActionBtn && clickUrl) {
                            adActionBtn.style.display = 'block';
                            adActionBtn.onclick = (e) => { e.stopPropagation(); window.open(clickUrl, '_blank'); videoElement.pause(); };
                        } else if (adActionBtn) {
                            adActionBtn.style.display = 'none';
                        }

                        const adSkipBtn = document.getElementById('ad-skip-btn');
                        const adCountdown = document.getElementById('ad-countdown');
                        let skipTimer = 5; // Default skip time
                        if (adCountdown) { adCountdown.style.display = 'block'; adCountdown.innerText = `Skip in ${skipTimer}`; }
                        if (adSkipBtn) adSkipBtn.style.display = 'none';

                        const skipInterval = setInterval(() => { if (--skipTimer <= 0) { clearInterval(skipInterval); if (adCountdown) adCountdown.style.display = 'none'; if (adSkipBtn) adSkipBtn.style.display = 'block'; } else if (adCountdown) adCountdown.innerText = `Skip in ${skipTimer}`; }, 1000);
                        if (adSkipBtn) adSkipBtn.onclick = (e) => { e.stopPropagation(); clearInterval(skipInterval); playMainVideo(); };
                        videoElement.onended = () => { clearInterval(skipInterval); playMainVideo(); };
                        videoElement.play().catch(e => { console.log("VAST Ad autoplay blocked", e); playMainVideo(); });
                    } catch (error) { console.error("Error processing VAST ad:", error); playMainVideo(); }
                }

                if (playVast) {
                    playVastAd(vastAdConfig.vastUrl);
                } else if (preRollAdToPlay && preRollAdToPlay.mediaData) {
                    videoElement.src = preRollAdToPlay.mediaData;
                    if (adOverlay) adOverlay.style.display = 'block';
                    if (controlsContainer) controlsContainer.style.display = 'none';
                    
                    if (!window.userAdImpressionTracked) {
                        updateDoc(doc(db, "promotions", preRollAdToPlay.id), { impressions_served: increment(1) }).catch(e => console.error(e));
                        // Track Ad View (Impression) for Creator
                        updateDoc(docRef, { adImpressions: increment(1) }).catch(e => console.error(e));
                        window.userAdImpressionTracked = true;

                    const adActionBtn = document.getElementById('ad-action-btn');

                    if (adActionBtn) {

                // Get DOM Elements for custom player

                // Play / Pause Logic
                function togglePlay() {
                    if (videoElement.paused) {

                    } else {

                    }
                    lucide.createIcons(); // Refresh icon
                }

                playPauseBtn.addEventListener('click', togglePlay);
                
                // Double Tap to Skip Logic
                let clickTimer = null;
                let lastTapTime = 0;
                const SKIP_SECONDS = 10;

// Changed 'click' to 'pointerup' for much smoother mobile touch response
                videoElement.addEventListener('pointerup', (e) => {                    const adOverlay = document.getElementById('ad-overlay');
                    if (adOverlay && adOverlay.style.display === 'block') {
                        window.open(preRollAdToPlay.targetUrl, '_blank');
                        trackAdClick(preRollAdToPlay.id, true);
                        videoElement.pause();
                        return;
                    }

                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTapTime;

                    if (tapLength > 0 && tapLength < 350) {
                        // --- Double Tap Detected ---
                        clearTimeout(clickTimer);
                        clickTimer = null;
                        
                        const rect = videoElement.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const width = rect.width;

                       // 40% Left = Skip Back, 40% Right = Skip Forward, 20% Center = Like
                        if (x < width * 0.4) {
                            videoElement.currentTime = Math.max(0, videoElement.currentTime - SKIP_SECONDS);
                            showAnim('dt-left');
                        } else if (x > width * 0.6) {
                            videoElement.currentTime = Math.min(videoElement.duration, videoElement.currentTime + SKIP_SECONDS);
                            showAnim('dt-right');
                        } else {
                            // Center area - like functionality
                            showAnim('dt-center');
                            if (typeof window.likeVideo === 'function') window.likeVideo(blogId);
                        }
                        lastTapTime = 0; // Reset to avoid triple-tap triggering again instantly
                    } else {
                // --- Single Tap Detected ---
                lastTapTime = currentTime;
                clickTimer = setTimeout(() => {
                            clickTimer = null;
                    if (e.pointerType === 'touch') {
                        container.classList.toggle('show-controls');
                        if (container._hideControlsTimer) clearTimeout(container._hideControlsTimer);
                        if (container.classList.contains('show-controls')) {
                            container._hideControlsTimer = setTimeout(() => container.classList.remove('show-controls'), 3000);
                        }
                    } else {
                        togglePlay();
                    }
                        }, 350); // Wait 350ms to confirm it's not a double tap
                    }
                });

                function showAnim(id) {
                    const el = document.getElementById(id);
                    if (!el) return;
                    
                    if (id === 'dt-center') {
                        el.style.transition = 'none';
                        el.style.transform = 'translate(-50%, -50%) scale(1)';
                        el.style.opacity = '1';
                        void el.offsetWidth; // Force Reflow
                        el.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease-out';
                        el.style.transform = 'translate(-50%, -50%) scale(1.5)';
                        if (el._animTimer) clearTimeout(el._animTimer);
                        el._animTimer = setTimeout(() => {
                            el.style.transition = 'transform 0.2s ease-in, opacity 0.2s ease-in';
                            el.style.transform = 'translate(-50%, -50%) scale(2)';
                            el.style.opacity = '0';
                        }, 500);
                    } else {
                        el.classList.remove('show');
                        void el.offsetWidth;
                        el.classList.add('show');
                        if (el._animTimer) clearTimeout(el._animTimer);
                        el._animTimer = setTimeout(() => { el.classList.remove('show'); }, 600);
                    }
                }

                // Format Time helper (seconds to MM:SS)
                function formatTime(seconds) {
                    if (isNaN(seconds)) return "0:00";
                    const mins = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }

                // Update Progress Bar and Time
                videoElement.addEventListener('timeupdate', () => {
                    if (window.isPlayingMainVideo && videoElement.currentTime >= 10) {
                        window.countVideoView();
                    }
                    const progress = (videoElement.currentTime / videoElement.duration) * 100;
                    progressBar.value = progress;
            progressBar.style.setProperty('--progress', `${progress || 0}%`);
                    currentTimeDisplay.textContent = formatTime(videoElement.currentTime);
                });

        // Buffer Progress Indicator
        videoElement.addEventListener('progress', () => {
            if (videoElement.duration > 0 && videoElement.buffered.length > 0) {
                const bufferedEnd = videoElement.buffered.end(videoElement.buffered.length - 1);
                const bufferPercent = (bufferedEnd / videoElement.duration) * 100;
                progressBar.style.setProperty('--buffer', `${bufferPercent}%`);
            }
        });

                // Set Duration when video metadata loads
                videoElement.addEventListener('loadedmetadata', () => {
                    durationDisplay.textContent = formatTime(videoElement.duration);
                });

                // Seek Video when Progress Bar is dragged
                progressBar.addEventListener('input', () => {

                    videoElement.currentTime = seekTime;
                });

                // Volume Logic
                volumeSlider.addEventListener('input', () => {
                    videoElement.volume = volumeSlider.value;

                function updateMuteIcon() {
                    if (videoElement.volume === 0 || videoElement.muted) {

                    } else {
                        muteBtn.innerHTML = '<i data-lucide="volume-2"></i>';
                    }
                    lucide.createIcons();
                }

            muteBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                    videoElement.muted = !videoElement.muted;

                        volumeSlider.value = 0;
                    } else {
                        volumeSlider.value = videoElement.volume > 0 ? videoElement.volume : 1;

                    }
                    updateMuteIcon();
                });

                // Settings Menu & Playback Speed Logic
                settingsBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    settingsMenu.classList.toggle('show');
                    
                    // Always open to main panel when toggling menu

                });

                // Sub-menu Navigation Logic
                navItems.forEach(item => {
                    item.addEventListener('click', (e) => {

                        document.getElementById(targetId).classList.add('active');

                // Playback Speed Logic
                speedItems.forEach(item => {
                    item.addEventListener('click', (e) => {

                        speedItems.forEach(i => {

                        item.innerHTML = `${item.innerText} <i data-lucide="check" style="width: 14px; height: 14px;"></i>`;

                        settingsMenu.classList.remove('show');
                        menuPanels.forEach(p => p.classList.remove('active'));
                        document.getElementById('panel-main').classList.add('active');
                    });
                });

                // Video Quality Logic
                qualityItems.forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const quality = item.getAttribute('data-quality');
                        
                        // Save current state
                        const currentTime = videoElement.currentTime;
                        const isPlaying = !videoElement.paused;
                        const currentSpeed = videoElement.playbackRate;

                        // TODO: Update video source based on quality selected
                        // Example: videoElement.src = `bairan_${quality}p.mp4`; 
                        // (Since we only have bairan.MP4 right now, we are simulating the behavior)
                        
                        videoElement.currentTime = currentTime;

                        // Update Main Menu Text

                        settingsMenu.classList.remove('show');
                        menuPanels.forEach(p => p.classList.remove('active'));
                        document.getElementById('panel-main').classList.add('active');
                    });
                });

                // Sleep Timer Logic
                let sleepTimerId = null;
                let sleepTimerEndTime = null;

                function startSleepTimer(durationInMinutes) {
                    stopSleepTimer(); // Clear any existing timer

                    if (durationInMinutes === 0) {
                        currentSleepTimerText.innerText = 'Off';
                        return;
                    }

                    sleepTimerEndTime = Date.now() + (durationInMinutes * 60 * 1000);
                    
                    sleepTimerId = setInterval(() => {
                        const remainingTime = sleepTimerEndTime - Date.now();
                        if (remainingTime <= 0) {
                            stopSleepTimer();
                            videoElement.pause();
                            playPauseBtn.innerHTML = '<i data-lucide="play"></i>';
                            container.classList.add('paused');
                            currentSleepTimerText.innerText = 'Off';
                            alert('Sleep timer ended. Video paused.');
                        } else {
                            const minutes = Math.floor(remainingTime / (60 * 1000));
                            const seconds = Math.floor((remainingTime % (60 * 1000)) / 1000);
                            currentSleepTimerText.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds} remaining`;
                        }
                    }, 1000);
                }

                function stopSleepTimer() {
                    if (sleepTimerId) {
                        clearInterval(sleepTimerId);
                        sleepTimerId = null;
                        sleepTimerEndTime = null;
                    }
                    currentSleepTimerText.innerText = 'Off';
                }

                sleepTimerItems.forEach(item => {
                    item.addEventListener('click', (e) => {

                // Picture-in-Picture (Miniplayer) Logic

                // Fullscreen & Mobile Rotation Logic
            fullscreenBtn.addEventListener('click', async (e) => {

                            // If mobile device, rotate screen to landscape like YouTube
                            if (window.innerWidth <= 768 && screen.orientation && screen.orientation.lock) {
                                await screen.orientation.lock('landscape').catch(e => console.log("Orientation lock blocked:", e));

                        } catch (err) {

                    } else {
                        try {

                        if (window.lucide) window.lucide.createIcons();

                // PC Keyboard Shortcuts Logic
                document.addEventListener('keydown', (e) => {
                    // Ignore shortcuts if typing in an input or textarea (like comments)
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                    switch(e.key.toLowerCase()) {
                        case ' ':
                        case 'k':
                            e.preventDefault();
                            togglePlay();
                            break;
                        case 'f':
                            e.preventDefault();
                            if (fullscreenBtn) fullscreenBtn.click();
                            break;
                        case 't':
                            e.preventDefault();
                            if (theaterBtn) theaterBtn.click();
                            break;
                        case 'p':
                        
                            e.preventDefault();
                            if (pipBtn && pipBtn.style.display !== 'none') pipBtn.click();
                            break;
                        case 'm':
                            e.preventDefault();
                            if (muteBtn) muteBtn.click();
                            break;
                        case 'arrowleft':
                        case 'j':
                            e.preventDefault();
                            videoElement.currentTime = Math.max(0, videoElement.currentTime - SKIP_SECONDS);
                            showAnim('dt-left');
                            break;

        let lastSuggestionDoc = null;
        let isFetchingSuggestions = false;
        let suggestionObserver = null;

        async function loadSuggestions(isLoadMore = false) {
            if (isFetchingSuggestions) return;
            isFetchingSuggestions = true;

            const container = document.getElementById('suggestions');
            let trigger = document.getElementById('suggestions-load-trigger');
            
            if (!isLoadMore) {
                container.innerHTML = '';
                lastSuggestionDoc = null;
            } else {
                if (trigger) trigger.style.display = 'block';
            }

            try {
                let fetchedVideos = [];
                let hasMore = true;
                
                // Fetch in chunks until we find at least 20 videos (ignoring text blogs/flicks)
                while (fetchedVideos.length < 20 && hasMore) {
                    let qConstraints = [orderBy("date", "desc"), limit(50)];
                    if (lastSuggestionDoc) {
                        qConstraints.push(startAfter(lastSuggestionDoc));
                    }
                    const q = query(collection(db, "blogs"), ...qConstraints);
                    const snap = await getDocs(q);
                    
                    if (snap.empty) {
                        hasMore = false;
                        break;
                    }
                    
                    lastSuggestionDoc = snap.docs[snap.docs.length - 1];
                    
                    snap.forEach(docSnap => {
                        const blog = docSnap.data();
                        if (!window.enableYoutubeLinks && blog.youtubeUrl) return;
                        if (docSnap.id === blogId || blog.isFlicker || (!blog.video && !blog.youtubeUrl) || blog.status === 'draft') return;
                        fetchedVideos.push({ id: docSnap.id, ...blog });
                    });
                    
                    if (snap.docs.length < 50) hasMore = false;
                }

                // Move same category videos to top ONLY on the initial load
                if (!isLoadMore && currentBlog && currentBlog.category) {
                    let related = fetchedVideos.filter(b => b.category === currentBlog.category);
                    let others = fetchedVideos.filter(b => b.category !== currentBlog.category);
                    fetchedVideos = [...related, ...others];
                }

                if (fetchedVideos.length === 0 && !isLoadMore) {
                    container.innerHTML = '<div style="color: #aaa;">No suggestions found.</div>';
                } else {
                    fetchedVideos.forEach(blog => {
                    let thumb = blog.thumbnail || 'logo.png';
                    if (blog.youtubeUrl) {
                        const vidId = getYoutubeVideoId(blog.youtubeUrl);
                        if (vidId) thumb = `https://img.youtube.com/vi/${vidId}/mqdefault.jpg`;
                    }

                        let durationHtml = '';
                        if (blog.duration) {
                            const mins = Math.floor(blog.duration / 60);
                            const secs = Math.floor(blog.duration % 60);
                            const durationStr = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                            durationHtml = `<div style="position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); color: white; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; line-height: 1;">${durationStr}</div>`;
                        }

                    const div = document.createElement('div');
                    div.className = 'suggestion-card';
                    div.onclick = () => window.location.href = `watch.html?id=${blog.id}`;
                    div.innerHTML = `
                            <div style="position: relative; width: 168px; height: 94px; flex-shrink: 0;">
                                <img src="${thumb}" style="width: 100%; height: 100%; border-radius: 8px; object-fit: cover;">
                                ${durationHtml}
                            </div>
                            <div class="suggestion-info" style="flex: 1; min-width: 0;">
                            <h4>${blog.title}</h4>
                            <p>${blog.author}</p>
                            <p>${(blog.views || 0).toLocaleString()} views</p>
                            </div>
                    `;
                    container.appendChild(div);
                });
                
                // Setup trigger for Infinite Scroll
                if (hasMore) {
                    if (!trigger) {
                        trigger = document.createElement('div');
                        trigger.id = 'suggestions-load-trigger';
                        trigger.style.cssText = "text-align: center; color: #aaa; padding: 20px; width: 100%;";
                        trigger.innerHTML = '<i data-lucide="loader" class="fa-spin" style="width: 24px; height: 24px;"></i> Loading more...';
                        container.appendChild(trigger);
                        
                        suggestionObserver = new IntersectionObserver((entries) => {
                            if (entries[0].isIntersecting) loadSuggestions(true);
                        }, { rootMargin: '0px 0px 300px 0px' });
                        suggestionObserver.observe(trigger);
                    } else {
                        trigger.style.display = 'block';
                        container.appendChild(trigger); // Always push it to the bottom
                    }
                } else {
                    if (trigger) trigger.style.display = 'none';
                }
            }
            } catch (e) {
                console.error("Error loading suggestions:", e);
                if (!isLoadMore) container.innerHTML = '<div style="color: #aaa;">Error loading suggestions.</div>';
            }
            isFetchingSuggestions = false;
        }

        window.toggleDescription = function() {
            const desc = document.getElementById('video-description');
            const btn = document.getElementById('show-more-btn');
            const isExpanded = desc.classList.toggle('expanded');
            btn.innerText = isExpanded ? 'Show less' : 'Show more';
        };

        window.likeVideo = async (id) => {
            if (!auth.currentUser) {
                alert('Please log in to like.');
                return;
            }
            const ref = doc(db, "blogs", id);
            const likeBtnIcon = document.querySelector('#like-btn-' + id + ' svg') || document.querySelector('#like-btn-' + id + ' i');
            const likeCountDisplay = document.getElementById('like-count-display');

            if (!likeBtnIcon || !likeCountDisplay) return;

            const isCurrentlyLiked = likeBtnIcon.classList.contains('lucide-fill');
            let currentLikes = parseInt(likeCountDisplay.innerText) || 0;

            // Optimistic UI Update
            if (isCurrentlyLiked) {
                likeBtnIcon.style.color = 'inherit';
                likeBtnIcon.classList.remove('lucide-fill');
                likeCountDisplay.innerText = Math.max(0, currentLikes - 1);
            } else {
                likeBtnIcon.style.color = '#ff0050';
                likeBtnIcon.classList.add('lucide-fill');
                likeCountDisplay.innerText = currentLikes + 1;
            }

            // DB Update
            try {
                if (isCurrentlyLiked) {
                    await updateDoc(ref, { likes: arrayRemove(auth.currentUser.uid) });
                } else {
                    await updateDoc(ref, { likes: arrayUnion(auth.currentUser.uid) });
                }
            } catch (e) {
                console.error("Like error:", e);
                alert("Failed to update like status.");
            }
        };

        window.shareVideo = () => { navigator.clipboard.writeText(window.location.href); alert('Link copied to clipboard!'); };

        // --- MODERN COMMENT SYSTEM ---

        async function parseMentions(text) {
            const mentionRegex = /@([\w_]+)/g;
            const mentions = [...new Set([...text.matchAll(mentionRegex)].map(m => m[1].toLowerCase()))];
            let mentionedUids = [];
            let mentionMap = {};
            if (mentions.length > 0) {
                const q = query(collection(db, "users"), where("usernameLower", "in", mentions.slice(0, 30)));
                const usersSnap = await getDocs(q);
                usersSnap.forEach(d => {
                    mentionedUids.push(d.id);
                    mentionMap[d.data().usernameLower] = d.id;
                });
            }
            return { mentionedUids, mentionMap };
        }

        const renderMentionsText = (text, mentionMap) => {
            let safeText = (text || "").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
            if (mentionMap) {
                return safeText.replace(/@([\w_]+)/g, (match, username) => {
                    const uid = mentionMap[username.toLowerCase()];
                    if (uid) return `<a href="profile.html?uid=${uid}" class="mention-link" onclick="event.stopPropagation();">${match}</a>`;
                    return match;
                });
            }
            return safeText;
        };

        window.handleMentionInput = async function(e, dropdownId) {
            const input = e.target;
            const text = input.value;
            const cursorPosition = input.selectionStart;
            const currentWord = text.substring(0, cursorPosition).split(/\s+/).pop();
            const dropdown = document.getElementById(dropdownId);
            if (!dropdown) return;
            
            if (currentWord.startsWith('@') && currentWord.length > 1) {
                const searchTerm = currentWord.substring(1).toLowerCase();
                if (window.mentionTimer) clearTimeout(window.mentionTimer);
                window.mentionTimer = setTimeout(async () => {
                    const q = query(collection(db, "users"), where("usernameLower", ">=", searchTerm), where("usernameLower", "<=", searchTerm + "\uf8ff"), limit(5));
                    const snap = await getDocs(q);
                    if (snap.empty) { dropdown.style.display = 'none'; return; }
                    dropdown.innerHTML = '';
                    snap.forEach(docSnap => {
                        const u = docSnap.data();
                        const div = document.createElement('div');
                        div.className = 'mention-item';
                        div.innerHTML = `<img src="${u.photoURL || 'game-logo.png'}" style="width:25px;height:25px;border-radius:50%;"><div style="font-size:0.85rem;"><strong>${u.name||'User'}</strong> <span style="color:#aaa;">@${u.username}</span></div>`;
                        div.onclick = (event) => {
                            event.stopPropagation();
                            const replaceText = `@${u.username} `;
                            input.value = text.substring(0, cursorPosition - currentWord.length) + replaceText + text.substring(cursorPosition);
                            dropdown.style.display = 'none';
                            input.focus();
                        };
                        dropdown.appendChild(div);
                    });
                    dropdown.style.display = 'block';
                }, 300);
            } else {
                dropdown.style.display = 'none';
            }
        };

        window.renderComments = function() {
            const commentsSection = document.getElementById('comments-section');
            if (!commentsSection || !currentBlog) return;
            const user = auth.currentUser;
            const comments = currentBlog.comments || [];
            const sortedComments = [...comments].sort((a, b) => new Date(b.date) - new Date(a.date));

            let commentsHtml = sortedComments.map(c => {
                const isOwner = user && c.userUid === user.uid;
                const isLiked = user && (c.likes || []).includes(user.uid);
                const authorLiked = (c.likes || []).includes(currentBlog.authorUid);
                const authorLikeBadge = authorLiked ? `<span class="author-liked-badge"><img src="${currentBlog.authorPhoto || 'game-logo.png'}"> Liked by author</span>` : '';
                
                const repliesHtml = (c.replies || []).map(r => {
                    const rIsOwner = user && r.userUid === user.uid;
                    const rIsLiked = user && (r.likes || []).includes(user.uid);
                    const rAuthorLiked = (r.likes || []).includes(currentBlog.authorUid);
                    const rAuthorLikeBadge = rAuthorLiked ? `<span class="author-liked-badge"><img src="${currentBlog.authorPhoto || 'game-logo.png'}"> Liked by author</span>` : '';
                    return `
                    <div class="comment-wrapper" style="margin-bottom: 12px;">
                        <img src="${r.photo || 'logo.png'}" class="comment-avatar" style="width: 28px; height: 28px;" onclick="window.location.href='profile.html?uid=${r.userUid}'">
                        <div class="comment-body">
                            <div class="comment-header">
                                <div>
                                    <span class="comment-author" onclick="window.location.href='profile.html?uid=${r.userUid}'">${r.author}</span>
                                    ${r.userUid === currentBlog.authorUid ? '<span style="background: #555; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; margin-left: 4px;">Author</span>' : ''}
                                </div>
                                <span class="comment-date">${window.timeAgo(r.date)} ${r.isEdited ? '<span style="font-style: italic; font-size: 0.7rem;">(edited)</span>' : ''}</span>
                            </div>
                            <p class="comment-text">${renderMentionsText(r.text, r.mentionMap)}</p>
                            <div class="comment-actions">
                                <button class="comment-action-btn" onclick="window.toggleVideoCommentLike('${c.id}', '${r.id}')" style="color: ${rIsLiked ? '#ff0050' : '#aaa'}"><i data-lucide="heart" class="${rIsLiked ? 'lucide-fill' : ''}"></i> ${(r.likes || []).length || 0}</button>
                                ${rAuthorLikeBadge}
                                ${rIsOwner ? `<button class="comment-action-btn" onclick="window.editVideoReply('${c.id}', '${r.id}')">Edit</button> <button class="comment-action-btn" onclick="window.deleteVideoReply('${c.id}', '${r.id}')">Delete</button>` : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                return `
                <div class="comment-wrapper">
                    <img src="${c.photo || 'logo.png'}" class="comment-avatar" onclick="window.location.href='profile.html?uid=${c.userUid}'">
                    <div class="comment-body">
                        <div class="comment-header">
                            <div>
                                <span class="comment-author" onclick="window.location.href='profile.html?uid=${c.userUid}'">${c.author}</span>
                                ${c.userUid === currentBlog.authorUid ? '<span style="background: #555; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; margin-left: 4px;">Author</span>' : ''}
                            </div>
                                <span class="comment-date">${window.timeAgo(c.date)} ${c.isEdited ? '<span style="font-style: italic; font-size: 0.7rem;">(edited)</span>' : ''}</span>
                        </div>
                        <p class="comment-text">${renderMentionsText(c.text, c.mentionMap)}</p>
                        <div class="comment-actions">
                            <button class="comment-action-btn" onclick="window.toggleVideoCommentLike('${c.id}')" style="color: ${isLiked ? '#ff0050' : '#aaa'}"><i data-lucide="heart" class="${isLiked ? 'lucide-fill' : ''}"></i> ${(c.likes || []).length || 0}</button>
                            <button class="comment-action-btn" onclick="document.getElementById('reply-input-container-${c.id}').style.display='flex'">Reply</button>
                            ${authorLikeBadge}
                            ${isOwner ? `<button class="comment-action-btn" onclick="window.editVideoComment('${c.id}')">Edit</button> <button class="comment-action-btn" onclick="window.deleteVideoComment('${c.id}')">Delete</button>` : ''}
                        </div>
                        <div id="reply-input-container-${c.id}" class="reply-input-container">
                            <div id="reply-mention-dropdown-${c.id}" class="mention-dropdown"></div>
                            <input type="text" id="reply-input-${c.id}" placeholder="Add a reply..." style="flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); color: white; font-size: 0.9rem;" oninput="window.handleMentionInput(event, 'reply-mention-dropdown-${c.id}')" autocomplete="off">
                            <button onclick="window.submitVideoReply('${c.id}')" class="btn" style="background: linear-gradient(135deg, #6366f1, #a855f7); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);">Reply</button>
                        </div>
                        ${c.replies && c.replies.length > 0 ? `<div class="reply-list">${repliesHtml}</div>` : ''}
                    </div>
                </div>`;
            }).join('');

            commentsSection.innerHTML = `
                <div style="background: transparent; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="background: transparent; padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);">
                    <h3 style="font-size: 1.2rem; margin-top: 0; color: #ddd; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 20px;">Comments (${comments.length})</h3>
                    ${user ? `
                    <div style="position: relative; margin-bottom: 30px;">
                        <div id="video-mention-dropdown" class="mention-dropdown"></div>
                        <div style="display: flex; gap: 12px;">
                            <img src="${user.photoURL || 'logo.png'}" class="comment-avatar">
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <input type="text" id="comment-input" placeholder="Add a comment..." style="width: 100%; padding: 12px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); color: white; font-size: 0.95rem; box-sizing: border-box;" oninput="window.handleMentionInput(event, 'video-mention-dropdown')" autocomplete="off">
                                <div style="display: flex; justify-content: flex-end;">
                                    <button onclick="window.addVideoComment()" class="btn" style="background: linear-gradient(135deg, #6366f1, #a855f7); padding: 8px 20px; border-radius: 24px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);">Comment</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    ` : '<p style="text-align:center; color:#aaa; margin-bottom: 30px;">Please <a href="index.html" style="color:#0d6efd;">login</a> to comment.</p>'}
                    <div id="comments-list" style="max-height: 600px; overflow-y: auto; padding-right: 10px;">
                        ${commentsHtml || '<p style="color:#aaa; text-align: center;">No comments yet. Be the first to comment!</p>'}
                    </div>
                </div>
            `;
        };

        window.addVideoComment = async function() {
            if (!auth.currentUser) return;
            const input = document.getElementById('comment-input');
            const text = input.value.trim();
            if (!text) return;

            const { mentionedUids, mentionMap } = await parseMentions(text);
            const newComment = {
                id: Date.now().toString(), author: auth.currentUser.displayName || "User", userUid: auth.currentUser.uid,
                photo: auth.currentUser.photoURL || "logo.png", text, date: new Date().toISOString(),
                likes: [], replies: [], mentionedUids, mentionMap
            };

            if (!currentBlog.comments) currentBlog.comments = [];
            currentBlog.comments.push(newComment);
            window.renderComments();
            try { await updateDoc(doc(db, "blogs", blogId), { comments: arrayUnion(newComment) }); } catch(e) { console.error(e); }
        };

        window.submitVideoReply = async function(commentId) {
            if (!auth.currentUser) return;
            const input = document.getElementById(`reply-input-${commentId}`);
            const text = input.value.trim();
            if (!text) return;

            const { mentionedUids, mentionMap } = await parseMentions(text);
            const newReply = {
                id: Date.now().toString(), author: auth.currentUser.displayName || "User", userUid: auth.currentUser.uid,
                photo: auth.currentUser.photoURL || "logo.png", text, date: new Date().toISOString(),
                likes: [], mentionedUids, mentionMap
            };
            const c = currentBlog.comments.find(x => x.id === commentId);
            if (!c) return;
            if (!c.replies) c.replies = [];
            c.replies.push(newReply);
            window.renderComments();
            try { await updateDoc(doc(db, "blogs", blogId), { comments: currentBlog.comments }); } catch(e) { console.error(e); }
        };

        window.toggleVideoCommentLike = async function(commentId, replyId = null) {
            if (!auth.currentUser) { alert("Please login to like"); return; }
            const uid = auth.currentUser.uid;
            const c = currentBlog.comments.find(x => x.id === commentId);
            let target = replyId ? c?.replies?.find(x => x.id === replyId) : c;
            if (!target) return;
            
            if (!target.likes) target.likes = [];
            const idx = target.likes.indexOf(uid);
            if (idx === -1) target.likes.push(uid); else target.likes.splice(idx, 1);
            window.renderComments();
            try { await updateDoc(doc(db, "blogs", blogId), { comments: currentBlog.comments }); } catch(e) { console.error(e); }
        };

        window.editVideoComment = async function(commentId) {
            const c = currentBlog.comments.find(x => x.id === commentId);
            if (!c || c.userUid !== auth.currentUser.uid) return;
            const newText = prompt("Edit your comment:", c.text);
            if (newText && newText.trim() !== c.text) {
                c.text = newText.trim(); c.isEdited = true; window.renderComments();
                try { await updateDoc(doc(db, "blogs", blogId), { comments: currentBlog.comments }); } catch(e) { console.error(e); }
            }
        };
        window.deleteVideoComment = async function(commentId) {
            if (!confirm("Delete this comment?")) return;
            currentBlog.comments = currentBlog.comments.filter(x => x.id !== commentId); window.renderComments();
            try { await updateDoc(doc(db, "blogs", blogId), { comments: currentBlog.comments }); } catch(e) { console.error(e); }
        };
        window.editVideoReply = async function(commentId, replyId) {
            const c = currentBlog.comments.find(x => x.id === commentId);
            const r = c?.replies?.find(x => x.id === replyId);
            if (!r || r.userUid !== auth.currentUser.uid) return;
            const newText = prompt("Edit your reply:", r.text);
            if (newText && newText.trim() !== r.text) {
                r.text = newText.trim(); r.isEdited = true; window.renderComments();
                try { await updateDoc(doc(db, "blogs", blogId), { comments: currentBlog.comments }); } catch(e) { console.error(e); }
            }
        };
        window.deleteVideoReply = async function(commentId, replyId) {
            if (!confirm("Delete this reply?")) return;
            const c = currentBlog.comments.find(x => x.id === commentId);
            if (c) c.replies = c.replies.filter(x => x.id !== replyId); window.renderComments();
            try { await updateDoc(doc(db, "blogs", blogId), { comments: currentBlog.comments }); } catch(e) { console.error(e); }
        };

        // Add a global click listener to close mention dropdowns when clicking outside
        document.addEventListener('click', function(event) {
            const isMentionInput = event.target.matches('input[oninput*="handleMentionInput"]');
            const isMentionDropdown = event.target.closest('.mention-dropdown');

            // If the click is not on a mention input or within a mention dropdown, hide all dropdowns
            if (!isMentionInput && !isMentionDropdown) {
                document.querySelectorAll('.mention-dropdown').forEach(d => d.style.display = 'none');
            }
        });

        onAuthStateChanged(auth, async () => {
            await Promise.all([globalVastPromise, globalPreRollPromise]);
            loadVideo(); 
            loadSuggestions();
        });
    </script>
     
</body>
</html>
